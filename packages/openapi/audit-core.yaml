openapi: 3.1.0

info:
  title: Axiom Audit Core Module API
  version: 1.0.0
  description: |
    **Audit Core** is the central module in the Axiom platform. It owns engagements,
    controls, evidence, document requests, AI decisions, and the append-only audit log.

    This spec covers the Audit Core module within the Axiom API modular monolith. All
    endpoints are served by a single Go binary alongside other modules (identity, trial
    balance, workpaper, reporting).

    ## Authentication
    Most endpoints require three context values injected by the gateway middleware after
    JWT verification:
    - `X-User-Id` — UUID of the authenticated user
    - `X-Firm-Id` — UUID of the user's firm
    - `X-User-Role` — role of the authenticated user

    **Client Hub** and **Delegation** endpoints use short-lived opaque tokens passed as
    query parameters (`?token=...`). These routes are NOT routed through the API Gateway
    header injection path and do not accept or require `X-User-Id` / `X-Firm-Id` /
    `X-User-Role` headers.

    ## Pagination
    List endpoints that may return large result sets use cursor-based pagination. Pass
    `cursor` and `limit` query parameters; the response includes a `pagination` object
    with `next_cursor` and `has_more`.

    ## User Roles
    `FirmAdmin | Partner | Manager | Staff | EQReviewer | ClientAdmin | ClientUser | ViewOnly`

tags:
  - name: Frameworks
    description: |
      Read-only reference data for audit frameworks (e.g. SOC 2, ISO 27001). Framework
      definitions are global — they are not scoped to a firm. Accessible by all
      authenticated users.

  - name: ControlObjectiveLibrary
    description: |
      Read-only library of reusable control objectives that can be referenced when
      scaffolding engagement controls. Objectives may carry cross-framework mappings.
      Accessible by all authenticated firm users.

  - name: Engagements
    description: |
      Engagements represent a single audit project for a client under a defined framework.
      They progress through a lifecycle: `Planning → Fieldwork → Review → Reporting →
      Finalized → Archived`. Lifecycle transitions are driven via the
      `POST /engagements/{id}/transitions` action endpoint.

  - name: EngagementTeam
    description: |
      Manage the auditor team members assigned to an engagement. Only Partners and Managers
      may add or remove members. All firm users can view team composition.

  - name: EngagementFrameworks
    description: |
      An engagement may be mapped to one or more audit frameworks. Frameworks can be added
      during Planning; evidence satisfaction is tracked per framework.

  - name: ClientAcceptance
    description: |
      Client acceptance records pre-engagement independence checks, conflict-of-interest
      disclosures, and the Partner's formal acceptance signature. Acceptance must be signed
      before the engagement can transition from Planning to Fieldwork.

  - name: QualityReview
    description: |
      Engagement Quality Reviewer (EQR) assignment and sign-off. An EQR must be independent
      of the engagement team. Sign-off unblocks the transition from Review to Reporting when
      required by engagement settings.

  - name: EQRFindings
    description: |
      Findings raised by the EQR during the quality review stage. The engagement team must
      respond to each `RequiredAction` finding and the reviewer must confirm resolution
      before EQR sign-off is permitted.

  - name: Controls
    description: |
      Controls represent individual regulatory requirements being tested within an engagement.
      Each control carries a status (`NotStarted | InProgress | Complete | Exception`), an
      assigned auditor, and links to test procedures and evidence.

  - name: TestProcedures
    description: |
      Test procedures describe the specific audit steps performed to evaluate a control.
      They are nested under controls and link to supporting evidence items.

  - name: Evidence
    description: |
      Evidence items are uploaded documents (PDFs, spreadsheets, images, etc.) tied to a
      client. They are uploaded once and can be linked to multiple controls or procedures
      across engagements. Supports multipart upload.

  - name: EvidenceLinks
    description: |
      A link associates a piece of evidence with a specific control or test procedure within
      an engagement. Creating a link may trigger cross-framework satisfaction logic.

  - name: DocumentRequests
    description: |
      Document requests are structured asks sent to clients through the Client Hub. They
      track requested items, due dates, and fulfillment status. Bulk creation is supported.

  - name: ClientHubTokens
    description: |
      Short-lived access tokens that grant client contacts access to the Client Hub for a
      specific engagement. Tokens can be revoked at any time by the engagement team.

  - name: ClientHub
    description: |
      **Token-authenticated — no API Gateway headers.** Client-facing endpoints for viewing
      and fulfilling document requests. Clients pass a short-lived opaque `token` query
      parameter rather than JWT-derived headers. Clients can also delegate uploads to a
      third party via email.

  - name: Delegation
    description: |
      **Token-authenticated — no API Gateway headers.** Allows a third party who received a
      delegation email to upload documents on behalf of a client. The delegate authenticates
      with a separate short-lived opaque token.

  - name: AIDecisions
    description: |
      Append-only log of every AI-generated decision made within an engagement (e.g. document
      completeness review, control mapping, evidence link suggestion). Supports human-in-the-loop
      review, as required by ISO 42001 and SOC 2.

  - name: Internal
    description: |
      **Internal module endpoints — not exposed to the frontend.** In the modular monolith,
      these are called directly via the audit core module's Go service interface by other
      modules (trial balance, workpaper, reporting). The OpenAPI definitions are retained
      for documentation and as the contract for future service extraction.

  - name: AuditLog
    description: |
      Immutable, append-only record of every significant action taken within the system,
      scoped either to a single engagement or to the entire firm. Required for SOC 2 Type 2
      and ISO 27001 compliance.

  - name: Notifications
    description: |
      In-app notifications delivered to the authenticated user. Notifications are scoped
      to the firm and driven by engagement lifecycle events, document request updates,
      EQR findings, and AI decision reviews.

paths:

  # ---------------------------------------------------------------------------
  # Frameworks
  # ---------------------------------------------------------------------------

  /api/v1/frameworks:
    get:
      operationId: listFrameworks
      summary: List audit frameworks
      description: |
        Returns all audit frameworks known to the system (e.g. SOC 2 Type 2, ISO 27001,
        ISO 42001). This list is global — it is NOT filtered by firm. Deprecated frameworks
        are excluded by default.

        **Access:** All authenticated firm users.
      tags:
        - Frameworks
      parameters:
        - $ref: './common.yaml#/components/parameters/X-User-Id'
        - $ref: './common.yaml#/components/parameters/X-Firm-Id'
        - $ref: './common.yaml#/components/parameters/X-User-Role'
        - name: governing_body
          in: query
          required: false
          description: Filter by governing body (e.g. `AICPA`, `ISO`, `PCAOB`).
          schema:
            type: string
        - name: include_deprecated
          in: query
          required: false
          description: When `true`, include deprecated frameworks in the response.
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Array of frameworks. Not paginated — the full list is returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FrameworkListResponse'
        '401':
          $ref: './common.yaml#/components/responses/Unauthorized'
        '500':
          $ref: './common.yaml#/components/responses/InternalServerError'

  /api/v1/frameworks/{frameworkId}:
    get:
      operationId: getFramework
      summary: Get a framework
      description: |
        Returns full detail for a single audit framework including its description,
        governing body, version, and effective date.

        **Access:** All authenticated firm users.
      tags:
        - Frameworks
      parameters:
        - $ref: './common.yaml#/components/parameters/X-User-Id'
        - $ref: './common.yaml#/components/parameters/X-Firm-Id'
        - $ref: './common.yaml#/components/parameters/X-User-Role'
        - name: frameworkId
          in: path
          required: true
          description: UUID of the framework.
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Framework detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FrameworkResponse'
        '401':
          $ref: './common.yaml#/components/responses/Unauthorized'
        '404':
          $ref: './common.yaml#/components/responses/NotFound'
        '500':
          $ref: './common.yaml#/components/responses/InternalServerError'

  /api/v1/frameworks/{frameworkId}/requirements:
    get:
      operationId: listFrameworkRequirements
      summary: List requirements for a framework
      description: |
        Returns the ordered list of requirements (criteria) for the specified framework.
        Requirements are returned in display order as defined by the governing body.

        **Access:** All authenticated firm users.
      tags:
        - Frameworks
      parameters:
        - $ref: './common.yaml#/components/parameters/X-User-Id'
        - $ref: './common.yaml#/components/parameters/X-Firm-Id'
        - $ref: './common.yaml#/components/parameters/X-User-Role'
        - name: frameworkId
          in: path
          required: true
          description: UUID of the framework.
          schema:
            type: string
            format: uuid
        - name: category
          in: query
          required: false
          description: |
            Filter by requirement category (e.g. `CC` for Common Criteria in SOC 2,
            `A` for Availability).
          schema:
            type: string
      responses:
        '200':
          description: Ordered array of framework requirements.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FrameworkRequirementListResponse'
        '401':
          $ref: './common.yaml#/components/responses/Unauthorized'
        '404':
          $ref: './common.yaml#/components/responses/NotFound'
        '500':
          $ref: './common.yaml#/components/responses/InternalServerError'

  # ---------------------------------------------------------------------------
  # Control Objective Library
  # ---------------------------------------------------------------------------

  /api/v1/control-objective-library:
    get:
      operationId: listControlObjectives
      summary: List control objectives from the library
      description: |
        Returns paginated control objectives from the firm-level library. Each objective
        may include cross-framework mappings. Used when scaffolding controls for a new
        engagement.

        **Access:** All authenticated firm users.
      tags:
        - ControlObjectiveLibrary
      parameters:
        - $ref: './common.yaml#/components/parameters/X-User-Id'
        - $ref: './common.yaml#/components/parameters/X-Firm-Id'
        - $ref: './common.yaml#/components/parameters/X-User-Role'
        - $ref: './common.yaml#/components/parameters/CursorParam'
        - $ref: './common.yaml#/components/parameters/LimitParam'
        - name: search
          in: query
          required: false
          description: Full-text search over objective title and description.
          schema:
            type: string
        - name: tags
          in: query
          required: false
          description: Comma-separated list of tags to filter by (AND logic).
          schema:
            type: string
      responses:
        '200':
          description: Paginated list of control objectives.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ControlObjectiveListResponse'
        '401':
          $ref: './common.yaml#/components/responses/Unauthorized'
        '500':
          $ref: './common.yaml#/components/responses/InternalServerError'

  /api/v1/control-objective-library/{objectiveId}:
    get:
      operationId: getControlObjective
      summary: Get a control objective
      description: |
        Returns a single control objective with full detail including cross-framework
        requirement mappings.

        **Access:** All authenticated firm users.
      tags:
        - ControlObjectiveLibrary
      parameters:
        - $ref: './common.yaml#/components/parameters/X-User-Id'
        - $ref: './common.yaml#/components/parameters/X-Firm-Id'
        - $ref: './common.yaml#/components/parameters/X-User-Role'
        - name: objectiveId
          in: path
          required: true
          description: UUID of the control objective.
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Control objective with framework mappings.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ControlObjectiveResponse'
        '401':
          $ref: './common.yaml#/components/responses/Unauthorized'
        '404':
          $ref: './common.yaml#/components/responses/NotFound'
        '500':
          $ref: './common.yaml#/components/responses/InternalServerError'

  # ---------------------------------------------------------------------------
  # Engagements
  # ---------------------------------------------------------------------------

  /api/v1/engagements:
    get:
      operationId: listEngagements
      summary: List engagements
      description: |
        Returns a paginated list of engagement summaries visible to the authenticated user.
        Row-level security in `axiom_db` ensures users only see engagements belonging to
        their firm. Staff members only see engagements they are assigned to.

        **Access:** All authenticated firm users (filtered by RLS).
      tags:
        - Engagements
      parameters:
        - $ref: './common.yaml#/components/parameters/X-User-Id'
        - $ref: './common.yaml#/components/parameters/X-Firm-Id'
        - $ref: './common.yaml#/components/parameters/X-User-Role'
        - $ref: './common.yaml#/components/parameters/CursorParam'
        - $ref: './common.yaml#/components/parameters/LimitParam'
        - name: status
          in: query
          required: false
          description: Filter by engagement lifecycle status.
          schema:
            type: string
            enum:
              - Planning
              - Fieldwork
              - Review
              - Reporting
              - Finalized
              - Archived
        - name: client_id
          in: query
          required: false
          description: Filter by client UUID.
          schema:
            type: string
            format: uuid
        - name: engagement_type
          in: query
          required: false
          description: Filter by engagement type (e.g. `SOC2`, `ISO27001`, `Financial`).
          schema:
            type: string
      responses:
        '200':
          description: Paginated list of engagement summaries.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EngagementListResponse'
        '401':
          $ref: './common.yaml#/components/responses/Unauthorized'
        '500':
          $ref: './common.yaml#/components/responses/InternalServerError'

    post:
      operationId: createEngagement
      summary: Create an engagement
      description: |
        Creates a new engagement in `Planning` status. The service automatically scaffolds
        controls from the selected framework and the firm's control objective library.
        The creating user is recorded as the engagement owner.

        **Access:** `Partner`, `Manager`.
      tags:
        - Engagements
      parameters:
        - $ref: './common.yaml#/components/parameters/X-User-Id'
        - $ref: './common.yaml#/components/parameters/X-Firm-Id'
        - $ref: './common.yaml#/components/parameters/X-User-Role'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEngagementRequest'
      responses:
        '201':
          description: Engagement created. Returns the new engagement detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EngagementResponse'
        '400':
          $ref: './common.yaml#/components/responses/BadRequest'
        '401':
          $ref: './common.yaml#/components/responses/Unauthorized'
        '403':
          $ref: './common.yaml#/components/responses/Forbidden'
        '422':
          $ref: './common.yaml#/components/responses/UnprocessableEntity'
        '500':
          $ref: './common.yaml#/components/responses/InternalServerError'

  /api/v1/engagements/{engagementId}:
    get:
      operationId: getEngagement
      summary: Get an engagement
      description: |
        Returns full engagement detail including client info, assigned team, framework
        mappings, and current lifecycle status.

        **Access:** All firm users with RLS access to this engagement.
      tags:
        - Engagements
      parameters:
        - $ref: './common.yaml#/components/parameters/X-User-Id'
        - $ref: './common.yaml#/components/parameters/X-Firm-Id'
        - $ref: './common.yaml#/components/parameters/X-User-Role'
        - name: engagementId
          in: path
          required: true
          description: UUID of the engagement.
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Engagement detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EngagementResponse'
        '401':
          $ref: './common.yaml#/components/responses/Unauthorized'
        '404':
          $ref: './common.yaml#/components/responses/NotFound'
        '500':
          $ref: './common.yaml#/components/responses/InternalServerError'

    patch:
      operationId: updateEngagement
      summary: Update an engagement
      description: |
        Partially updates engagement metadata (name, period dates, description, settings).
        Updates are only permitted while the engagement is in `Planning` status.
        Attempting to update a `Fieldwork` or later engagement returns 422.

        **Access:** `Partner`, `Manager`.
      tags:
        - Engagements
      parameters:
        - $ref: './common.yaml#/components/parameters/X-User-Id'
        - $ref: './common.yaml#/components/parameters/X-Firm-Id'
        - $ref: './common.yaml#/components/parameters/X-User-Role'
        - name: engagementId
          in: path
          required: true
          description: UUID of the engagement.
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateEngagementRequest'
      responses:
        '200':
          description: Updated engagement detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EngagementResponse'
        '400':
          $ref: './common.yaml#/components/responses/BadRequest'
        '401':
          $ref: './common.yaml#/components/responses/Unauthorized'
        '403':
          $ref: './common.yaml#/components/responses/Forbidden'
        '404':
          $ref: './common.yaml#/components/responses/NotFound'
        '422':
          $ref: './common.yaml#/components/responses/UnprocessableEntity'
        '500':
          $ref: './common.yaml#/components/responses/InternalServerError'

  /api/v1/engagements/{engagementId}/transitions:
    post:
      operationId: transitionEngagement
      summary: Transition engagement lifecycle status
      description: |
        Advances or reverses the engagement lifecycle status. The service validates all
        guard conditions before applying the transition. If any guard fails, the endpoint
        returns `422 Unprocessable Entity` with a list of unmet conditions.

        ### Forward transitions
        | From | To | Guard conditions |
        |---|---|---|
        | `Planning` | `Fieldwork` | `ClientAcceptance.accepted_at` is populated; performed by `Partner`. |
        | `Fieldwork` | `Review` | All controls are in `Complete` or `Exception` status. |
        | `Review` | `Reporting` | All `ReviewNote` items are resolved; EQR has signed off (where `eqr_required = true`). |
        | `Reporting` | `Finalized` | The linked `Report` has `status = Issued`. |
        | `Finalized` | `Archived` | System-initiated when `assembly_deadline` has elapsed. |

        ### Reverse transitions (manual correction)
        | From | To | Permitted roles |
        |---|---|---|
        | `Fieldwork` | `Planning` | `Partner` |
        | `Review` | `Fieldwork` | `Manager`, `Partner` |
        | `Reporting` | `Review` | `Partner` |

        ### Emergency transition
        | From | To | Permitted roles |
        |---|---|---|
        | Any | `Archived` | `FirmAdmin` |

        **Access:** Role-dependent per transition table above.
      tags:
        - Engagements
      parameters:
        - $ref: './common.yaml#/components/parameters/X-User-Id'
        - $ref: './common.yaml#/components/parameters/X-Firm-Id'
        - $ref: './common.yaml#/components/parameters/X-User-Role'
        - name: engagementId
          in: path
          required: true
          description: UUID of the engagement.
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EngagementTransitionRequest'
      responses:
        '200':
          description: Transition applied successfully. Returns updated engagement.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EngagementResponse'
        '400':
          $ref: './common.yaml#/components/responses/BadRequest'
        '401':
          $ref: './common.yaml#/components/responses/Unauthorized'
        '403':
          $ref: './common.yaml#/components/responses/Forbidden'
        '404':
          $ref: './common.yaml#/components/responses/NotFound'
        '422':
          description: |
            One or more guard conditions were not met. The `details` array lists each
            unmet condition with a machine-readable `code` and a human-readable `reason`.
          content:
            application/json:
              schema:
                $ref: './common.yaml#/components/schemas/ErrorResponse'
        '500':
          $ref: './common.yaml#/components/responses/InternalServerError'

  # ---------------------------------------------------------------------------
  # Engagement Team
  # ---------------------------------------------------------------------------

  /api/v1/engagements/{engagementId}/team:
    get:
      operationId: listEngagementTeam
      summary: List engagement team members
      description: |
        Returns the list of auditors assigned to this engagement including their role
        and assignment date.

        **Access:** All firm users with RLS access to this engagement.
      tags:
        - EngagementTeam
      parameters:
        - $ref: './common.yaml#/components/parameters/X-User-Id'
        - $ref: './common.yaml#/components/parameters/X-Firm-Id'
        - $ref: './common.yaml#/components/parameters/X-User-Role'
        - name: engagementId
          in: path
          required: true
          description: UUID of the engagement.
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Array of team members.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamMemberListResponse'
        '401':
          $ref: './common.yaml#/components/responses/Unauthorized'
        '404':
          $ref: './common.yaml#/components/responses/NotFound'
        '500':
          $ref: './common.yaml#/components/responses/InternalServerError'

    post:
      operationId: addTeamMember
      summary: Add a team member to an engagement
      description: |
        Assigns an auditor from the firm to this engagement. The user must belong to the
        same firm. Duplicate assignments are rejected with `409 Conflict`.

        **Access:** `Partner`, `Manager`.
      tags:
        - EngagementTeam
      parameters:
        - $ref: './common.yaml#/components/parameters/X-User-Id'
        - $ref: './common.yaml#/components/parameters/X-Firm-Id'
        - $ref: './common.yaml#/components/parameters/X-User-Role'
        - name: engagementId
          in: path
          required: true
          description: UUID of the engagement.
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddTeamMemberRequest'
      responses:
        '201':
          description: Team member added.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamMemberResponse'
        '400':
          $ref: './common.yaml#/components/responses/BadRequest'
        '401':
          $ref: './common.yaml#/components/responses/Unauthorized'
        '403':
          $ref: './common.yaml#/components/responses/Forbidden'
        '404':
          $ref: './common.yaml#/components/responses/NotFound'
        '409':
          $ref: './common.yaml#/components/responses/Conflict'
        '500':
          $ref: './common.yaml#/components/responses/InternalServerError'

  /api/v1/engagements/{engagementId}/team/{memberId}:
    delete:
      operationId: removeTeamMember
      summary: Remove a team member from an engagement
      description: |
        Removes an auditor from the engagement team. The member's historical contributions
        (controls, workpapers) are preserved. Removing a member who is the sole Partner
        is rejected with `422`.

        **Access:** `Partner`, `Manager`.
      tags:
        - EngagementTeam
      parameters:
        - $ref: './common.yaml#/components/parameters/X-User-Id'
        - $ref: './common.yaml#/components/parameters/X-Firm-Id'
        - $ref: './common.yaml#/components/parameters/X-User-Role'
        - name: engagementId
          in: path
          required: true
          description: UUID of the engagement.
          schema:
            type: string
            format: uuid
        - name: memberId
          in: path
          required: true
          description: UUID of the team member assignment record.
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Team member removed. No content returned.
        '401':
          $ref: './common.yaml#/components/responses/Unauthorized'
        '403':
          $ref: './common.yaml#/components/responses/Forbidden'
        '404':
          $ref: './common.yaml#/components/responses/NotFound'
        '422':
          $ref: './common.yaml#/components/responses/UnprocessableEntity'
        '500':
          $ref: './common.yaml#/components/responses/InternalServerError'

  # ---------------------------------------------------------------------------
  # Engagement Frameworks
  # ---------------------------------------------------------------------------

  /api/v1/engagements/{engagementId}/frameworks:
    get:
      operationId: listEngagementFrameworks
      summary: List frameworks mapped to an engagement
      description: |
        Returns all audit frameworks associated with this engagement. Each entry includes
        the framework reference and any engagement-specific scope notes.

        **Access:** All firm users with RLS access to this engagement.
      tags:
        - EngagementFrameworks
      parameters:
        - $ref: './common.yaml#/components/parameters/X-User-Id'
        - $ref: './common.yaml#/components/parameters/X-Firm-Id'
        - $ref: './common.yaml#/components/parameters/X-User-Role'
        - name: engagementId
          in: path
          required: true
          description: UUID of the engagement.
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Array of engagement framework mappings.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EngagementFrameworkListResponse'
        '401':
          $ref: './common.yaml#/components/responses/Unauthorized'
        '404':
          $ref: './common.yaml#/components/responses/NotFound'
        '500':
          $ref: './common.yaml#/components/responses/InternalServerError'

    post:
      operationId: addEngagementFramework
      summary: Add a framework to an engagement
      description: |
        Maps an additional audit framework to this engagement. Adding a framework may
        trigger scaffolding of additional controls. Only permitted during `Planning` status.

        **Access:** `Partner`, `Manager`.
      tags:
        - EngagementFrameworks
      parameters:
        - $ref: './common.yaml#/components/parameters/X-User-Id'
        - $ref: './common.yaml#/components/parameters/X-Firm-Id'
        - $ref: './common.yaml#/components/parameters/X-User-Role'
        - name: engagementId
          in: path
          required: true
          description: UUID of the engagement.
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddEngagementFrameworkRequest'
      responses:
        '201':
          description: Framework added to engagement.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EngagementFrameworkResponse'
        '400':
          $ref: './common.yaml#/components/responses/BadRequest'
        '401':
          $ref: './common.yaml#/components/responses/Unauthorized'
        '403':
          $ref: './common.yaml#/components/responses/Forbidden'
        '404':
          $ref: './common.yaml#/components/responses/NotFound'
        '409':
          $ref: './common.yaml#/components/responses/Conflict'
        '422':
          $ref: './common.yaml#/components/responses/UnprocessableEntity'
        '500':
          $ref: './common.yaml#/components/responses/InternalServerError'

  /api/v1/engagements/{engagementId}/frameworks/{engagementFrameworkId}:
    delete:
      operationId: removeEngagementFramework
      summary: Remove a framework from an engagement
      description: |
        Removes a framework mapping from this engagement. Only permitted during `Planning`
        status. If controls were scaffolded from this framework and have recorded evidence,
        the operation is rejected with `422`.

        **Access:** `Partner`, `Manager`.
      tags:
        - EngagementFrameworks
      parameters:
        - $ref: './common.yaml#/components/parameters/X-User-Id'
        - $ref: './common.yaml#/components/parameters/X-Firm-Id'
        - $ref: './common.yaml#/components/parameters/X-User-Role'
        - name: engagementId
          in: path
          required: true
          description: UUID of the engagement.
          schema:
            type: string
            format: uuid
        - name: engagementFrameworkId
          in: path
          required: true
          description: UUID of the engagement-framework mapping record.
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Framework removed. No content returned.
        '401':
          $ref: './common.yaml#/components/responses/Unauthorized'
        '403':
          $ref: './common.yaml#/components/responses/Forbidden'
        '404':
          $ref: './common.yaml#/components/responses/NotFound'
        '422':
          $ref: './common.yaml#/components/responses/UnprocessableEntity'
        '500':
          $ref: './common.yaml#/components/responses/InternalServerError'

  # ---------------------------------------------------------------------------
  # Client Acceptance
  # ---------------------------------------------------------------------------

  /api/v1/engagements/{engagementId}/client-acceptance:
    get:
      operationId: getClientAcceptance
      summary: Get client acceptance record
      description: |
        Returns the client acceptance record for this engagement, including independence
        checks, conflict-of-interest disclosures, and signature status.

        **Access:** All firm users with RLS access to this engagement.
      tags:
        - ClientAcceptance
      parameters:
        - $ref: './common.yaml#/components/parameters/X-User-Id'
        - $ref: './common.yaml#/components/parameters/X-Firm-Id'
        - $ref: './common.yaml#/components/parameters/X-User-Role'
        - name: engagementId
          in: path
          required: true
          description: UUID of the engagement.
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Client acceptance record.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientAcceptanceResponse'
        '401':
          $ref: './common.yaml#/components/responses/Unauthorized'
        '404':
          $ref: './common.yaml#/components/responses/NotFound'
        '500':
          $ref: './common.yaml#/components/responses/InternalServerError'

    patch:
      operationId: updateClientAcceptance
      summary: Update client acceptance record
      description: |
        Updates the client acceptance record fields (independence checks, disclosures,
        client contact details). Only permitted before the record has been signed
        (`accepted_at` is null). Attempting to update a signed record returns `422`.

        **Access:** `Partner`, `Manager`.
      tags:
        - ClientAcceptance
      parameters:
        - $ref: './common.yaml#/components/parameters/X-User-Id'
        - $ref: './common.yaml#/components/parameters/X-Firm-Id'
        - $ref: './common.yaml#/components/parameters/X-User-Role'
        - name: engagementId
          in: path
          required: true
          description: UUID of the engagement.
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateClientAcceptanceRequest'
      responses:
        '200':
          description: Updated client acceptance record.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientAcceptanceResponse'
        '400':
          $ref: './common.yaml#/components/responses/BadRequest'
        '401':
          $ref: './common.yaml#/components/responses/Unauthorized'
        '403':
          $ref: './common.yaml#/components/responses/Forbidden'
        '404':
          $ref: './common.yaml#/components/responses/NotFound'
        '422':
          $ref: './common.yaml#/components/responses/UnprocessableEntity'
        '500':
          $ref: './common.yaml#/components/responses/InternalServerError'

  /api/v1/engagements/{engagementId}/client-acceptance/sign:
    post:
      operationId: signClientAcceptance
      summary: Sign client acceptance
      description: |
        Partner formally accepts the engagement by signing the client acceptance record.
        Sets `accepted_at` to the current timestamp and `accepted_by` to the Partner's
        user ID. Once signed, the record is immutable and the engagement may be
        transitioned to `Fieldwork`.

        **Access:** `Partner` only.
      tags:
        - ClientAcceptance
      parameters:
        - $ref: './common.yaml#/components/parameters/X-User-Id'
        - $ref: './common.yaml#/components/parameters/X-Firm-Id'
        - $ref: './common.yaml#/components/parameters/X-User-Role'
        - name: engagementId
          in: path
          required: true
          description: UUID of the engagement.
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Signed client acceptance record.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientAcceptanceResponse'
        '401':
          $ref: './common.yaml#/components/responses/Unauthorized'
        '403':
          $ref: './common.yaml#/components/responses/Forbidden'
        '404':
          $ref: './common.yaml#/components/responses/NotFound'
        '422':
          $ref: './common.yaml#/components/responses/UnprocessableEntity'
        '500':
          $ref: './common.yaml#/components/responses/InternalServerError'

  # ---------------------------------------------------------------------------
  # Quality Review (EQR)
  # ---------------------------------------------------------------------------

  /api/v1/engagements/{engagementId}/quality-review:
    get:
      operationId: getQualityReview
      summary: Get quality review record
      description: |
        Returns the Engagement Quality Reviewer (EQR) record for this engagement, including
        the assigned reviewer, scope notes, conclusion, and sign-off status.

        **Access:** All firm users with RLS access to this engagement.
      tags:
        - QualityReview
      parameters:
        - $ref: './common.yaml#/components/parameters/X-User-Id'
        - $ref: './common.yaml#/components/parameters/X-Firm-Id'
        - $ref: './common.yaml#/components/parameters/X-User-Role'
        - name: engagementId
          in: path
          required: true
          description: UUID of the engagement.
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Quality review record.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QualityReviewResponse'
        '401':
          $ref: './common.yaml#/components/responses/Unauthorized'
        '404':
          $ref: './common.yaml#/components/responses/NotFound'
        '500':
          $ref: './common.yaml#/components/responses/InternalServerError'

    post:
      operationId: assignQualityReviewer
      summary: Assign an EQR to an engagement
      description: |
        Assigns an Engagement Quality Reviewer to the engagement. The system validates
        that the nominated reviewer is independent (i.e. not a member of the engagement
        team and not involved in the period being audited). Returns `422` if independence
        validation fails.

        Only applicable when `eqr_required = true` on the engagement.

        **Access:** `Partner`.
      tags:
        - QualityReview
      parameters:
        - $ref: './common.yaml#/components/parameters/X-User-Id'
        - $ref: './common.yaml#/components/parameters/X-Firm-Id'
        - $ref: './common.yaml#/components/parameters/X-User-Role'
        - name: engagementId
          in: path
          required: true
          description: UUID of the engagement.
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignEQRRequest'
      responses:
        '201':
          description: EQR assigned. Returns the quality review record.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QualityReviewResponse'
        '400':
          $ref: './common.yaml#/components/responses/BadRequest'
        '401':
          $ref: './common.yaml#/components/responses/Unauthorized'
        '403':
          $ref: './common.yaml#/components/responses/Forbidden'
        '404':
          $ref: './common.yaml#/components/responses/NotFound'
        '422':
          $ref: './common.yaml#/components/responses/UnprocessableEntity'
        '500':
          $ref: './common.yaml#/components/responses/InternalServerError'

    patch:
      operationId: updateQualityReview
      summary: Update quality review notes and conclusion
      description: |
        Allows the assigned EQR to update their scope notes and conclusion on the quality
        review record. Only the assigned reviewer may update these fields.

        **Access:** `EQReviewer` (assigned reviewer only).
      tags:
        - QualityReview
      parameters:
        - $ref: './common.yaml#/components/parameters/X-User-Id'
        - $ref: './common.yaml#/components/parameters/X-Firm-Id'
        - $ref: './common.yaml#/components/parameters/X-User-Role'
        - name: engagementId
          in: path
          required: true
          description: UUID of the engagement.
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateQualityReviewRequest'
      responses:
        '200':
          description: Updated quality review record.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QualityReviewResponse'
        '400':
          $ref: './common.yaml#/components/responses/BadRequest'
        '401':
          $ref: './common.yaml#/components/responses/Unauthorized'
        '403':
          $ref: './common.yaml#/components/responses/Forbidden'
        '404':
          $ref: './common.yaml#/components/responses/NotFound'
        '422':
          $ref: './common.yaml#/components/responses/UnprocessableEntity'
        '500':
          $ref: './common.yaml#/components/responses/InternalServerError'

  /api/v1/engagements/{engagementId}/quality-review/sign-off:
    post:
      operationId: signOffQualityReview
      summary: EQR sign-off
      description: |
        The assigned EQR formally signs off the quality review. Before sign-off is
        permitted, all findings with `action_type = RequiredAction` must have been
        responded to by the team AND confirmed by the reviewer. Attempting sign-off with
        unresolved required-action findings returns `422` with a list of blocking
        finding IDs.

        Once signed off, `signed_off_at` and `signed_off_by` are set and the record
        becomes immutable.

        **Access:** `EQReviewer` (assigned reviewer only).
      tags:
        - QualityReview
      parameters:
        - $ref: './common.yaml#/components/parameters/X-User-Id'
        - $ref: './common.yaml#/components/parameters/X-Firm-Id'
        - $ref: './common.yaml#/components/parameters/X-User-Role'
        - name: engagementId
          in: path
          required: true
          description: UUID of the engagement.
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: EQR signed off. Returns updated quality review record.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QualityReviewResponse'
        '401':
          $ref: './common.yaml#/components/responses/Unauthorized'
        '403':
          $ref: './common.yaml#/components/responses/Forbidden'
        '404':
          $ref: './common.yaml#/components/responses/NotFound'
        '422':
          $ref: './common.yaml#/components/responses/UnprocessableEntity'
        '500':
          $ref: './common.yaml#/components/responses/InternalServerError'

  # ---------------------------------------------------------------------------
  # EQR Findings
  # ---------------------------------------------------------------------------

  /api/v1/engagements/{engagementId}/quality-review/findings:
    get:
      operationId: listEQRFindings
      summary: List EQR findings
      description: |
        Returns all findings raised by the EQR for this engagement. Findings may be of
        type `Observation` (informational) or `RequiredAction` (must be resolved before
        sign-off).

        **Access:** All firm users with RLS access to this engagement.
      tags:
        - EQRFindings
      parameters:
        - $ref: './common.yaml#/components/parameters/X-User-Id'
        - $ref: './common.yaml#/components/parameters/X-Firm-Id'
        - $ref: './common.yaml#/components/parameters/X-User-Role'
        - name: engagementId
          in: path
          required: true
          description: UUID of the engagement.
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Array of EQR findings.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EQRFindingListResponse'
        '401':
          $ref: './common.yaml#/components/responses/Unauthorized'
        '404':
          $ref: './common.yaml#/components/responses/NotFound'
        '500':
          $ref: './common.yaml#/components/responses/InternalServerError'

    post:
      operationId: createEQRFinding
      summary: Create an EQR finding
      description: |
        The assigned EQR creates a new finding against the engagement. Findings should
        reference a specific control, workpaper, or area of concern.

        **Access:** `EQReviewer` (assigned reviewer only).
      tags:
        - EQRFindings
      parameters:
        - $ref: './common.yaml#/components/parameters/X-User-Id'
        - $ref: './common.yaml#/components/parameters/X-Firm-Id'
        - $ref: './common.yaml#/components/parameters/X-User-Role'
        - name: engagementId
          in: path
          required: true
          description: UUID of the engagement.
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEQRFindingRequest'
      responses:
        '201':
          description: Finding created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EQRFindingResponse'
        '400':
          $ref: './common.yaml#/components/responses/BadRequest'
        '401':
          $ref: './common.yaml#/components/responses/Unauthorized'
        '403':
          $ref: './common.yaml#/components/responses/Forbidden'
        '404':
          $ref: './common.yaml#/components/responses/NotFound'
        '500':
          $ref: './common.yaml#/components/responses/InternalServerError'

  /api/v1/engagements/{engagementId}/quality-review/findings/{findingId}:
    patch:
      operationId: updateEQRFinding
      summary: Update an EQR finding
      description: |
        Allows the assigned EQR to update the description, action type, or referenced
        resource of a finding. Updates are not permitted after the finding has been
        confirmed.

        **Access:** `EQReviewer` (assigned reviewer only).
      tags:
        - EQRFindings
      parameters:
        - $ref: './common.yaml#/components/parameters/X-User-Id'
        - $ref: './common.yaml#/components/parameters/X-Firm-Id'
        - $ref: './common.yaml#/components/parameters/X-User-Role'
        - name: engagementId
          in: path
          required: true
          description: UUID of the engagement.
          schema:
            type: string
            format: uuid
        - name: findingId
          in: path
          required: true
          description: UUID of the EQR finding.
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateEQRFindingRequest'
      responses:
        '200':
          description: Updated EQR finding.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EQRFindingResponse'
        '400':
          $ref: './common.yaml#/components/responses/BadRequest'
        '401':
          $ref: './common.yaml#/components/responses/Unauthorized'
        '403':
          $ref: './common.yaml#/components/responses/Forbidden'
        '404':
          $ref: './common.yaml#/components/responses/NotFound'
        '422':
          $ref: './common.yaml#/components/responses/UnprocessableEntity'
        '500':
          $ref: './common.yaml#/components/responses/InternalServerError'

  /api/v1/engagements/{engagementId}/quality-review/findings/{findingId}/respond:
    post:
      operationId: respondToEQRFinding
      summary: Respond to an EQR finding
      description: |
        The engagement team submits a response to an EQR finding. For `RequiredAction`
        findings, this response is a prerequisite for the reviewer's confirmation and
        ultimately for EQR sign-off.

        **Access:** `Partner`, `Manager`, `Staff` (engagement team members).
      tags:
        - EQRFindings
      parameters:
        - $ref: './common.yaml#/components/parameters/X-User-Id'
        - $ref: './common.yaml#/components/parameters/X-Firm-Id'
        - $ref: './common.yaml#/components/parameters/X-User-Role'
        - name: engagementId
          in: path
          required: true
          description: UUID of the engagement.
          schema:
            type: string
            format: uuid
        - name: findingId
          in: path
          required: true
          description: UUID of the EQR finding.
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RespondToEQRFindingRequest'
      responses:
        '200':
          description: Finding with team response recorded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EQRFindingResponse'
        '400':
          $ref: './common.yaml#/components/responses/BadRequest'
        '401':
          $ref: './common.yaml#/components/responses/Unauthorized'
        '403':
          $ref: './common.yaml#/components/responses/Forbidden'
        '404':
          $ref: './common.yaml#/components/responses/NotFound'
        '500':
          $ref: './common.yaml#/components/responses/InternalServerError'

  /api/v1/engagements/{engagementId}/quality-review/findings/{findingId}/confirm:
    post:
      operationId: confirmEQRFinding
      summary: Confirm resolution of an EQR finding
      description: |
        The assigned EQR confirms that the team's response adequately addresses the
        finding. Confirmation is only available after a team response has been recorded.
        Confirmed `RequiredAction` findings no longer block EQR sign-off.

        **Access:** `EQReviewer` (assigned reviewer only).
      tags:
        - EQRFindings
      parameters:
        - $ref: './common.yaml#/components/parameters/X-User-Id'
        - $ref: './common.yaml#/components/parameters/X-Firm-Id'
        - $ref: './common.yaml#/components/parameters/X-User-Role'
        - name: engagementId
          in: path
          required: true
          description: UUID of the engagement.
          schema:
            type: string
            format: uuid
        - name: findingId
          in: path
          required: true
          description: UUID of the EQR finding.
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Finding confirmed. Returns updated finding.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EQRFindingResponse'
        '401':
          $ref: './common.yaml#/components/responses/Unauthorized'
        '403':
          $ref: './common.yaml#/components/responses/Forbidden'
        '404':
          $ref: './common.yaml#/components/responses/NotFound'
        '422':
          $ref: './common.yaml#/components/responses/UnprocessableEntity'
        '500':
          $ref: './common.yaml#/components/responses/InternalServerError'

  # ---------------------------------------------------------------------------
  # Controls
  # ---------------------------------------------------------------------------

  /api/v1/engagements/{engagementId}/controls:
    get:
      operationId: listControls
      summary: List controls for an engagement
      description: |
        Returns a paginated list of controls for the engagement. Supports filtering by
        status, assigned auditor, and key-control flag. Each item includes a summary
        of procedure and evidence counts.

        **Access:** All firm users with RLS access to this engagement.
      tags:
        - Controls
      parameters:
        - $ref: './common.yaml#/components/parameters/X-User-Id'
        - $ref: './common.yaml#/components/parameters/X-Firm-Id'
        - $ref: './common.yaml#/components/parameters/X-User-Role'
        - $ref: './common.yaml#/components/parameters/CursorParam'
        - $ref: './common.yaml#/components/parameters/LimitParam'
        - name: engagementId
          in: path
          required: true
          description: UUID of the engagement.
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          required: false
          description: Filter by control status.
          schema:
            type: string
            enum:
              - NotStarted
              - InProgress
              - Complete
              - Exception
        - name: auditor_assigned_to_id
          in: query
          required: false
          description: Filter by the UUID of the assigned auditor.
          schema:
            type: string
            format: uuid
        - name: is_key_control
          in: query
          required: false
          description: When `true`, return only key controls.
          schema:
            type: boolean
      responses:
        '200':
          description: Paginated list of controls.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ControlListResponse'
        '401':
          $ref: './common.yaml#/components/responses/Unauthorized'
        '404':
          $ref: './common.yaml#/components/responses/NotFound'
        '500':
          $ref: './common.yaml#/components/responses/InternalServerError'

  /api/v1/engagements/{engagementId}/controls/{controlId}:
    get:
      operationId: getControl
      summary: Get a control
      description: |
        Returns full control detail including the framework requirement chain (from
        requirement up through framework), all associated test procedures, and evidence
        link summaries.

        **Access:** All firm users with RLS access to this engagement.
      tags:
        - Controls
      parameters:
        - $ref: './common.yaml#/components/parameters/X-User-Id'
        - $ref: './common.yaml#/components/parameters/X-Firm-Id'
        - $ref: './common.yaml#/components/parameters/X-User-Role'
        - name: engagementId
          in: path
          required: true
          description: UUID of the engagement.
          schema:
            type: string
            format: uuid
        - name: controlId
          in: path
          required: true
          description: UUID of the control.
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Control detail with procedures, evidence links, and framework chain.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ControlDetailResponse'
        '401':
          $ref: './common.yaml#/components/responses/Unauthorized'
        '404':
          $ref: './common.yaml#/components/responses/NotFound'
        '500':
          $ref: './common.yaml#/components/responses/InternalServerError'

    patch:
      operationId: updateControl
      summary: Update a control
      description: |
        Partially updates a control — e.g. status, assigned auditor, risk rating,
        auditor notes, or key-control flag. Status changes trigger audit log entries
        and may emit notifications to the engagement team.

        **Access:** `Partner`, `Manager`, `Staff` (engagement team).
      tags:
        - Controls
      parameters:
        - $ref: './common.yaml#/components/parameters/X-User-Id'
        - $ref: './common.yaml#/components/parameters/X-Firm-Id'
        - $ref: './common.yaml#/components/parameters/X-User-Role'
        - name: engagementId
          in: path
          required: true
          description: UUID of the engagement.
          schema:
            type: string
            format: uuid
        - name: controlId
          in: path
          required: true
          description: UUID of the control.
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateControlRequest'
      responses:
        '200':
          description: Updated control.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ControlDetailResponse'
        '400':
          $ref: './common.yaml#/components/responses/BadRequest'
        '401':
