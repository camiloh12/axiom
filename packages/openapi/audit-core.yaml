  # ---------------------------------------------------------------------------
  # Evidence
  # ---------------------------------------------------------------------------

  /api/v1/evidence:
    get:
      operationId: listEvidence
      summary: List evidence items
      description: |
        Returns a paginated list of evidence items for a given client. `client_id` is
        required to prevent inadvertent cross-client data exposure. Optionally filter by
        engagement, source type, or full-text search over file name and description.

        **Access:** All firm users with access to the specified client.
      tags:
        - Evidence
      parameters:
        - $ref: './common.yaml#/components/parameters/X-User-Id'
        - $ref: './common.yaml#/components/parameters/X-Firm-Id'
        - $ref: './common.yaml#/components/parameters/X-User-Role'
        - $ref: './common.yaml#/components/parameters/CursorParam'
        - $ref: './common.yaml#/components/parameters/LimitParam'
        - name: client_id
          in: query
          required: true
          description: UUID of the client. Required.
          schema:
            type: string
            format: uuid
        - name: engagement_id
          in: query
          required: false
          description: Filter to evidence used in a specific engagement.
          schema:
            type: string
            format: uuid
        - name: search
          in: query
          required: false
          description: Full-text search over file name and description.
          schema:
            type: string
        - name: source_type
          in: query
          required: false
          description: |
            Filter by how the evidence was sourced (e.g. `ClientUpload`, `AuditorUpload`,
            `DocumentRequest`, `APIIntegration`).
          schema:
            type: string
      responses:
        '200':
          description: Paginated list of evidence items.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EvidenceListResponse'
        '400':
          $ref: './common.yaml#/components/responses/BadRequest'
        '401':
          $ref: './common.yaml#/components/responses/Unauthorized'
        '500':
          $ref: './common.yaml#/components/responses/InternalServerError'

    post:
      operationId: uploadEvidence
      summary: Upload an evidence item
      description: |
        Uploads a new evidence file. The file is stored in S3 (server-side encrypted with
        KMS). A `document_processing` job is enqueued to extract text and metadata from
        PDFs using the Document Processing Service (pdfplumber + Tesseract).

        The request must be `multipart/form-data`.

        **Access:** `Partner`, `Manager`, `Staff`.
      tags:
        - Evidence
      parameters:
        - $ref: './common.yaml#/components/parameters/X-User-Id'
        - $ref: './common.yaml#/components/parameters/X-Firm-Id'
        - $ref: './common.yaml#/components/parameters/X-User-Role'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
                - client_id
                - source_type
              properties:
                file:
                  type: string
                  format: binary
                  description: The evidence file to upload (PDF, XLSX, CSV, image, etc.).
                client_id:
                  type: string
                  format: uuid
                  description: UUID of the client this evidence belongs to.
                source_type:
                  type: string
                  description: How this evidence was sourced.
                  enum:
                    - AuditorUpload
                    - ClientUpload
                    - DocumentRequest
                    - APIIntegration
                description:
                  type: string
                  description: Optional human-readable description of the evidence item.
      responses:
        '201':
          description: Evidence item created. Processing may be asynchronous.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EvidenceResponse'
        '400':
          $ref: './common.yaml#/components/responses/BadRequest'
        '401':
          $ref: './common.yaml#/components/responses/Unauthorized'
        '403':
          $ref: './common.yaml#/components/responses/Forbidden'
        '422':
          $ref: './common.yaml#/components/responses/UnprocessableEntity'
        '500':
          $ref: './common.yaml#/components/responses/InternalServerError'

  /api/v1/evidence/{evidenceId}:
    get:
      operationId: getEvidence
      summary: Get an evidence item
      description: |
        Returns metadata for a single evidence item including extraction status,
        file size, MIME type, and S3 key reference. Does not return file content —
        use the `/download` sub-resource for a presigned URL.

        **Access:** All firm users with access to the evidence item's client.
      tags:
        - Evidence
      parameters:
        - $ref: './common.yaml#/components/parameters/X-User-Id'
        - $ref: './common.yaml#/components/parameters/X-Firm-Id'
        - $ref: './common.yaml#/components/parameters/X-User-Role'
        - name: evidenceId
          in: path
          required: true
          description: UUID of the evidence item.
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Evidence item metadata.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EvidenceResponse'
        '401':
          $ref: './common.yaml#/components/responses/Unauthorized'
        '404':
          $ref: './common.yaml#/components/responses/NotFound'
        '500':
          $ref: './common.yaml#/components/responses/InternalServerError'

  /api/v1/evidence/{evidenceId}/download:
    get:
      operationId: getEvidenceDownloadUrl
      summary: Get a presigned download URL for an evidence item
      description: |
        Generates and returns a time-limited AWS S3 presigned URL that the client can
        use to download the evidence file directly from S3. The URL expires after 15
        minutes. All download requests are recorded in the audit log.

        **Access:** All firm users with access to the evidence item's client.
      tags:
        - Evidence
      parameters:
        - $ref: './common.yaml#/components/parameters/X-User-Id'
        - $ref: './common.yaml#/components/parameters/X-Firm-Id'
        - $ref: './common.yaml#/components/parameters/X-User-Role'
        - name: evidenceId
          in: path
          required: true
          description: UUID of the evidence item.
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Presigned download URL.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EvidenceDownloadUrlResponse'
        '401':
          $ref: './common.yaml#/components/responses/Unauthorized'
        '404':
          $ref: './common.yaml#/components/responses/NotFound'
        '500':
          $ref: './common.yaml#/components/responses/InternalServerError'

  # ---------------------------------------------------------------------------
  # Evidence Links
  # ---------------------------------------------------------------------------

  /api/v1/engagements/{engagementId}/evidence-links:
    get:
      operationId: listEvidenceLinks
      summary: List evidence links for an engagement
      description: |
        Returns a paginated list of evidence links within this engagement. Filter by
        `control_id` or `test_procedure_id` to narrow results.

        **Access:** All firm users with RLS access to this engagement.
      tags:
        - EvidenceLinks
      parameters:
        - $ref: './common.yaml#/components/parameters/X-User-Id'
        - $ref: './common.yaml#/components/parameters/X-Firm-Id'
        - $ref: './common.yaml#/components/parameters/X-User-Role'
        - $ref: './common.yaml#/components/parameters/CursorParam'
        - $ref: './common.yaml#/components/parameters/LimitParam'
        - name: engagementId
          in: path
          required: true
          description: UUID of the engagement.
          schema:
            type: string
            format: uuid
        - name: control_id
          in: query
          required: false
          description: Filter to links associated with a specific control.
          schema:
            type: string
            format: uuid
        - name: test_procedure_id
          in: query
          required: false
          description: Filter to links associated with a specific test procedure.
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Paginated list of evidence links.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EvidenceLinkListResponse'
        '401':
          $ref: './common.yaml#/components/responses/Unauthorized'
        '404':
          $ref: './common.yaml#/components/responses/NotFound'
        '500':
          $ref: './common.yaml#/components/responses/InternalServerError'

    post:
      operationId: createEvidenceLink
      summary: Link evidence to a control or test procedure
      description: |
        Associates an evidence item with a control or test procedure in this engagement.
        The evidence item must belong to the same client as the engagement.

        After linking, the service runs cross-framework satisfaction logic: if the linked
        control maps to requirements across multiple frameworks, other controls satisfying
        the same requirement may be automatically marked as satisfied. The response includes
        a `cross_framework_satisfied` array of control IDs that were updated.

        **Access:** `Partner`, `Manager`, `Staff` (engagement team).
      tags:
        - EvidenceLinks
      parameters:
        - $ref: './common.yaml#/components/parameters/X-User-Id'
        - $ref: './common.yaml#/components/parameters/X-Firm-Id'
        - $ref: './common.yaml#/components/parameters/X-User-Role'
        - name: engagementId
          in: path
          required: true
          description: UUID of the engagement.
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEvidenceLinkRequest'
      responses:
        '201':
          description: Evidence link created, with cross-framework satisfaction results.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EvidenceLinkResponse'
        '400':
          $ref: './common.yaml#/components/responses/BadRequest'
        '401':
          $ref: './common.yaml#/components/responses/Unauthorized'
        '403':
          $ref: './common.yaml#/components/responses/Forbidden'
        '404':
          $ref: './common.yaml#/components/responses/NotFound'
        '409':
          $ref: './common.yaml#/components/responses/Conflict'
        '422':
          $ref: './common.yaml#/components/responses/UnprocessableEntity'
        '500':
          $ref: './common.yaml#/components/responses/InternalServerError'

  /api/v1/engagements/{engagementId}/evidence-links/{linkId}:
    delete:
      operationId: deleteEvidenceLink
      summary: Remove an evidence link
      description: |
        Removes the association between an evidence item and a control or test procedure.
        Deletion is not permitted after the engagement has been `Finalized` or `Archived`,
        as the audit trail must remain intact. Returns `422` if attempted on a finalized
        engagement.

        **Access:** `Partner`, `Manager`, `Staff` (engagement team).
      tags:
        - EvidenceLinks
      parameters:
        - $ref: './common.yaml#/components/parameters/X-User-Id'
        - $ref: './common.yaml#/components/parameters/X-Firm-Id'
        - $ref: './common.yaml#/components/parameters/X-User-Role'
        - name: engagementId
          in: path
          required: true
          description: UUID of the engagement.
          schema:
            type: string
            format: uuid
        - name: linkId
          in: path
          required: true
          description: UUID of the evidence link.
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Evidence link removed. No content returned.
        '401':
          $ref: './common.yaml#/components/responses/Unauthorized'
        '403':
          $ref: './common.yaml#/components/responses/Forbidden'
        '404':
          $ref: './common.yaml#/components/responses/NotFound'
        '422':
          $ref: './common.yaml#/components/responses/UnprocessableEntity'
        '500':
          $ref: './common.yaml#/components/responses/InternalServerError'

  # ---------------------------------------------------------------------------
  # Document Requests
  # ---------------------------------------------------------------------------

  /api/v1/engagements/{engagementId}/document-requests:
    get:
      operationId: listDocumentRequests
      summary: List document requests for an engagement
      description: |
        Returns a paginated list of document requests. Filter by status, assigned client
        contact, or linked control.

        **Access:** All firm users with RLS access to this engagement.
      tags:
        - DocumentRequests
      parameters:
        - $ref: './common.yaml#/components/parameters/X-User-Id'
        - $ref: './common.yaml#/components/parameters/X-Firm-Id'
        - $ref: './common.yaml#/components/parameters/X-User-Role'
        - $ref: './common.yaml#/components/parameters/CursorParam'
        - $ref: './common.yaml#/components/parameters/LimitParam'
        - name: engagementId
          in: path
          required: true
          description: UUID of the engagement.
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          required: false
          description: Filter by document request status.
          schema:
            type: string
            enum:
              - Draft
              - Sent
              - Fulfilled
              - Rejected
              - Overdue
        - name: assigned_to_id
          in: query
          required: false
          description: Filter by the UUID of the assigned client contact.
          schema:
            type: string
            format: uuid
        - name: control_id
          in: query
          required: false
          description: Filter by linked control UUID.
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Paginated list of document requests.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentRequestListResponse'
        '401':
          $ref: './common.yaml#/components/responses/Unauthorized'
        '404':
          $ref: './common.yaml#/components/responses/NotFound'
        '500':
          $ref: './common.yaml#/components/responses/InternalServerError'

    post:
      operationId: createDocumentRequest
      summary: Create a document request
      description: |
        Creates a new document request in `Draft` status. The request must be explicitly
        sent via the `/send` action before it is visible to the client in the Client Hub.

        **Access:** `Partner`, `Manager`, `Staff`.
      tags:
        - DocumentRequests
      parameters:
        - $ref: './common.yaml#/components/parameters/X-User-Id'
        - $ref: './common.yaml#/components/parameters/X-Firm-Id'
        - $ref: './common.yaml#/components/parameters/X-User-Role'
        - name: engagementId
          in: path
          required: true
          description: UUID of the engagement.
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDocumentRequestRequest'
      responses:
        '201':
          description: Document request created in Draft status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentRequestResponse'
        '400':
          $ref: './common.yaml#/components/responses/BadRequest'
        '401':
          $ref: './common.yaml#/components/responses/Unauthorized'
        '403':
          $ref: './common.yaml#/components/responses/Forbidden'
        '404':
          $ref: './common.yaml#/components/responses/NotFound'
        '500':
          $ref: './common.yaml#/components/responses/InternalServerError'

  /api/v1/engagements/{engagementId}/document-requests/bulk:
    post:
      operationId: bulkCreateDocumentRequests
      summary: Bulk create document requests
      description: |
        Creates multiple document requests in a single request. All items are created in
        `Draft` status. Items that fail validation are rejected individually; successful
        items are still created. The response includes per-item results.

        **Access:** `Partner`, `Manager`, `Staff`.
      tags:
        - DocumentRequests
      parameters:
        - $ref: './common.yaml#/components/parameters/X-User-Id'
        - $ref: './common.yaml#/components/parameters/X-Firm-Id'
        - $ref: './common.yaml#/components/parameters/X-User-Role'
        - name: engagementId
          in: path
          required: true
          description: UUID of the engagement.
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkCreateDocumentRequestsRequest'
      responses:
        '201':
          description: Bulk creation results with per-item status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkCreateDocumentRequestsResponse'
        '400':
          $ref: './common.yaml#/components/responses/BadRequest'
        '401':
          $ref: './common.yaml#/components/responses/Unauthorized'
        '403':
          $ref: './common.yaml#/components/responses/Forbidden'
        '404':
          $ref: './common.yaml#/components/responses/NotFound'
        '500':
          $ref: './common.yaml#/components/responses/InternalServerError'

  /api/v1/engagements/{engagementId}/document-requests/{requestId}:
    get:
      operationId: getDocumentRequest
      summary: Get a document request
      description: |
        Returns full detail for a single document request including linked control,
        assigned client contact, fulfillment history, and uploaded files.

        **Access:** All firm users with RLS access to this engagement.
      tags:
        - DocumentRequests
      parameters:
        - $ref: './common.yaml#/components/parameters/X-User-Id'
        - $ref: './common.yaml#/components/parameters/X-Firm-Id'
        - $ref: './common.yaml#/components/parameters/X-User-Role'
        - name: engagementId
          in: path
          required: true
          description: UUID of the engagement.
          schema:
            type: string
            format: uuid
        - name: requestId
          in: path
          required: true
          description: UUID of the document request.
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Document request detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentRequestResponse'
        '401':
          $ref: './common.yaml#/components/responses/Unauthorized'
        '404':
          $ref: './common.yaml#/components/responses/NotFound'
        '500':
          $ref: './common.yaml#/components/responses/InternalServerError'

    patch:
      operationId: updateDocumentRequest
      summary: Update a document request
      description: |
        Partially updates a document request. Only permitted while the request is in
        `Draft` status. Attempting to update a `Sent` or later request returns `422`.

        **Access:** `Partner`, `Manager`, `Staff`.
      tags:
        - DocumentRequests
      parameters:
        - $ref: './common.yaml#/components/parameters/X-User-Id'
        - $ref: './common.yaml#/components/parameters/X-Firm-Id'
        - $ref: './common.yaml#/components/parameters/X-User-Role'
        - name: engagementId
          in: path
          required: true
          description: UUID of the engagement.
          schema:
            type: string
            format: uuid
        - name: requestId
          in: path
          required: true
          description: UUID of the document request.
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDocumentRequestRequest'
      responses:
        '200':
          description: Updated document request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentRequestResponse'
        '400':
          $ref: './common.yaml#/components/responses/BadRequest'
        '401':
          $ref: './common.yaml#/components/responses/Unauthorized'
        '403':
          $ref: './common.yaml#/components/responses/Forbidden'
        '404':
          $ref: './common.yaml#/components/responses/NotFound'
        '422':
          $ref: './common.yaml#/components/responses/UnprocessableEntity'
        '500':
          $ref: './common.yaml#/components/responses/InternalServerError'

  /api/v1/engagements/{engagementId}/document-requests/{requestId}/send:
    post:
      operationId: sendDocumentRequest
      summary: Send a document request to the client
      description: |
        Transitions the document request from `Draft` to `Sent`. An email notification
        is sent to the assigned client contact (via AWS SES) with a link to the Client
        Hub. The request becomes visible in the Client Hub immediately.

        **Access:** `Partner`, `Manager`, `Staff`.
      tags:
        - DocumentRequests
      parameters:
        - $ref: './common.yaml#/components/parameters/X-User-Id'
        - $ref: './common.yaml#/components/parameters/X-Firm-Id'
        - $ref: './common.yaml#/components/parameters/X-User-Role'
        - name: engagementId
          in: path
          required: true
          description: UUID of the engagement.
          schema:
            type: string
            format: uuid
        - name: requestId
          in: path
          required: true
          description: UUID of the document request.
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Document request sent. Returns updated request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentRequestResponse'
        '401':
          $ref: './common.yaml#/components/responses/Unauthorized'
        '403':
          $ref: './common.yaml#/components/responses/Forbidden'
        '404':
          $ref: './common.yaml#/components/responses/NotFound'
        '422':
          $ref: './common.yaml#/components/responses/UnprocessableEntity'
        '500':
          $ref: './common.yaml#/components/responses/InternalServerError'

  /api/v1/engagements/{engagementId}/document-requests/{requestId}/accept:
    post:
      operationId: acceptDocumentRequest
      summary: Accept a fulfilled document request
      description: |
        The auditor team accepts the documents submitted by the client, transitioning
        the request to `Fulfilled`. Accepted uploads are automatically linked as evidence
        items. A River background job processes any PDFs.

        **Access:** `Partner`, `Manager`, `Staff`.
      tags:
        - DocumentRequests
      parameters:
        - $ref: './common.yaml#/components/parameters/X-User-Id'
        - $ref: './common.yaml#/components/parameters/X-Firm-Id'
        - $ref: './common.yaml#/components/parameters/X-User-Role'
        - name: engagementId
          in: path
          required: true
          description: UUID of the engagement.
          schema:
            type: string
            format: uuid
        - name: requestId
          in: path
          required: true
          description: UUID of the document request.
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Document request accepted. Returns updated request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentRequestResponse'
        '401':
          $ref: './common.yaml#/components/responses/Unauthorized'
        '403':
          $ref: './common.yaml#/components/responses/Forbidden'
        '404':
          $ref: './common.yaml#/components/responses/NotFound'
        '422':
          $ref: './common.yaml#/components/responses/UnprocessableEntity'
        '500':
          $ref: './common.yaml#/components/responses/InternalServerError'

  /api/v1/engagements/{engagementId}/document-requests/{requestId}/reject:
    post:
      operationId: rejectDocumentRequest
      summary: Reject a fulfilled document request
      description: |
        The auditor team rejects the submitted documents (e.g. wrong files, insufficient
        detail). The request transitions back to `Sent` and the client is notified via
        email with the provided rejection reason. The client may re-upload.

        **Access:** `Partner`, `Manager`, `Staff`.
      tags:
        - DocumentRequests
      parameters:
        - $ref: './common.yaml#/components/parameters/X-User-Id'
        - $ref: './common.yaml#/components/parameters/X-Firm-Id'
        - $ref: './common.yaml#/components/parameters/X-User-Role'
        - name: engagementId
          in: path
          required: true
          description: UUID of the engagement.
          schema:
            type: string
            format: uuid
        - name: requestId
          in: path
          required: true
          description: UUID of the document request.
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - reason
              properties:
                reason:
                  type: string
                  description: |
                    Human-readable explanation for the rejection, communicated to the
                    client via email notification.
                  minLength: 1
                  maxLength: 1000
      responses:
        '200':
          description: Document request rejected. Returns updated request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentRequestResponse'
        '400':
          $ref: './common.yaml#/components/responses/BadRequest'
        '401':
          $ref: './common.yaml#/components/responses/Unauthorized'
        '403':
          $ref: './common.yaml#/components/responses/Forbidden'
        '404':
          $ref: './common.yaml#/components/responses/NotFound'
        '422':
          $ref: './common.yaml#/components/responses/UnprocessableEntity'
        '500':
          $ref: './common.yaml#/components/responses/InternalServerError'

  # ---------------------------------------------------------------------------
  # Client Hub Tokens
  # ---------------------------------------------------------------------------

  /api/v1/engagements/{engagementId}/client-hub-tokens:
    post:
      operationId: createClientHubToken
      summary: Create a Client Hub access token
      description: |
        Issues a short-lived opaque token that grants a specified client contact access
        to the Client Hub for this engagement. The token is delivered to the client by
        the caller (typically embedded in an email). Tokens expire after a configurable
        TTL (default 7 days). Multiple active tokens may exist simultaneously.

        **Access:** `Partner`, `Manager`, `Staff`.
      tags:
        - ClientHubTokens
      parameters:
        - $ref: './common.yaml#/components/parameters/X-User-Id'
        - $ref: './common.yaml#/components/parameters/X-Firm-Id'
        - $ref: './common.yaml#/components/parameters/X-User-Role'
        - name: engagementId
          in: path
          required: true
          description: UUID of the engagement.
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - client_id
              properties:
                client_id:
                  type: string
                  format: uuid
                  description: UUID of the client contact who will use this token.
      responses:
        '201':
          description: Token created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientHubTokenResponse'
        '400':
          $ref: './common.yaml#/components/responses/BadRequest'
        '401':
          $ref: './common.yaml#/components/responses/Unauthorized'
        '403':
          $ref: './common.yaml#/components/responses/Forbidden'
        '404':
          $ref: './common.yaml#/components/responses/NotFound'
        '500':
          $ref: './common.yaml#/components/responses/InternalServerError'

  /api/v1/engagements/{engagementId}/client-hub-tokens/{tokenId}/revoke:
    post:
      operationId: revokeClientHubToken
      summary: Revoke a Client Hub access token
      description: |
        Immediately invalidates the specified token. Any in-flight Client Hub session
        using this token will receive `401` on its next request. Revocation is recorded
        in the audit log.

        **Access:** `Partner`, `Manager`, `Staff`.
      tags:
        - ClientHubTokens
      parameters:
        - $ref: './common.yaml#/components/parameters/X-User-Id'
        - $ref: './common.yaml#/components/parameters/X-Firm-Id'
        - $ref: './common.yaml#/components/parameters/X-User-Role'
        - name: engagementId
          in: path
          required: true
          description: UUID of the engagement.
          schema:
            type: string
            format: uuid
        - name: tokenId
          in: path
          required: true
          description: UUID of the Client Hub token to revoke.
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Token revoked. No content returned.
        '401':
          $ref: './common.yaml#/components/responses/Unauthorized'
        '403':
          $ref: './common.yaml#/components/responses/Forbidden'
        '404':
          $ref: './common.yaml#/components/responses/NotFound'
        '500':
          $ref: './common.yaml#/components/responses/InternalServerError'

  # ---------------------------------------------------------------------------
  # Client Hub (token-authenticated, no gateway headers)
  # ---------------------------------------------------------------------------

  /api/v1/client-hub/validate:
    get:
      operationId: validateClientHubToken
      summary: Validate a Client Hub token
      description: |
        **Token-authenticated.** Validates a Client Hub access token and returns the
        associated engagement and client information. The frontend calls this on load
        to establish session context. Returns `401` if the token is expired, revoked,
        or not found.

        This endpoint does NOT require `X-User-Id`, `X-Firm-Id`, or `X-User-Role`
        headers. It is not routed through the API Gateway JWT injection path.
      tags:
        - ClientHub
      parameters:
        - name: token
          in: query
          required: true
          description: Opaque Client Hub access token.
          schema:
            type: string
      responses:
        '200':
          description: Token is valid. Returns session context.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientHubSessionResponse'
        '401':
          $ref: './common.yaml#/components/responses/Unauthorized'
        '500':
          $ref: './common.yaml#/components/responses/InternalServerError'

  /api/v1/client-hub/requests:
    get:
      operationId: listClientHubRequests
      summary: List document requests visible to the client
      description: |
        **Token-authenticated.** Returns the paginated list of document requests that
        the client contact can see and fulfill via the Client Hub. Only `Sent`, `Overdue`,
        and `Rejected` requests are returned (i.e. those requiring client action).

        This endpoint does NOT require `X-User-Id`, `X-Firm-Id`, or `X-User-Role`
        headers. It is not routed through the API Gateway JWT injection path.
      tags:
        - ClientHub
      parameters:
        - name: token
          in: query
          required: true
          description: Opaque Client Hub access token.
          schema:
            type: string
        - name: status
          in: query
          required: false
          description: Filter by document request status.
          schema:
            type: string
            enum:
              - Sent
              - Overdue
              - Rejected
        - $ref: './common.yaml#/components/parameters/CursorParam'
        - $ref: './common.yaml#/components/parameters/LimitParam'
      responses:
        '200':
          description: Paginated list of document requests for the client.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientHubRequestListResponse'
        '401':
          $ref: './common.yaml#/components/responses/Unauthorized'
        '500':
          $ref: './common.yaml#/components/responses/InternalServerError'

  /api/v1/client-hub/requests/{requestId}/upload:
    post:
      operationId: clientHubUpload
      summary: Upload documents to fulfill a request
      description: |
        **Token-authenticated.** Allows the client to upload one or more files to fulfill
        a document request. The request transitions to an internally tracked state pending
        auditor acceptance. The client may upload multiple times before the auditor
        accepts or rejects.

        The request must be `multipart/form-data` with the token passed as a query
        parameter. This endpoint does NOT require `X-User-Id`, `X-Firm-Id`, or
        `X-User-Role` headers.
      tags:
        - ClientHub
      parameters:
        - name: token
          in: query
          required: true
          description: Opaque Client Hub access token.
          schema:
            type: string
        - name: requestId
          in: path
          required: true
          description: UUID of the document request to fulfill.
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: |
                    The file to upload. Multiple files may be uploaded by repeating
                    this field.
                notes:
                  type: string
                  description: Optional notes from the client accompanying the upload.
                  maxLength: 2000
      responses:
        '201':
          description: Upload received. Returns the updated document request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientHubUploadResponse'
        '400':
          $ref: './common.yaml#/components/responses/BadRequest'
        '401':
          $ref: './common.yaml#/components/responses/Unauthorized'
        '404':
          $ref: './common.yaml#/components/responses/NotFound'
        '422':
          $ref: './common.yaml#/components/responses/UnprocessableEntity'
        '500':
          $ref: './common.yaml#/components/responses/InternalServerError'

  /api/v1/client-hub/requests/{requestId}/delegate:
    post:
      operationId: delegateDocumentRequest
      summary: Delegate a document request to a third party
      description: |
        **Token-authenticated.** Allows the client to delegate fulfillment of a document
        request to a third party (e.g. an accountant or colleague). An email is sent to
        the `delegate_email` with a unique delegation token. The delegate can then upload
        via the Delegation endpoints without needing a Client Hub token.

        This endpoint does NOT require `X-User-Id`, `X-Firm-Id`, or `X-User-Role`
        headers.
      tags:
        - ClientHub
      parameters:
        - name: requestId
          in: path
          required: true
          description: UUID of the document request to delegate.
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - token
                - delegate_email
              properties:
                token:
                  type: string
                  description: Opaque Client Hub access token.
                delegate_email:
                  type: string
                  format: email
                  description: Email address of the delegate who will receive upload access.
                custom_message:
                  type: string
                  description: Optional custom message included in the delegation email.
                  maxLength: 2000
      responses:
        '201':
          description: Delegation created. Delegate email dispatched via SES.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DelegationResponse'
        '400':
          $ref: './common.yaml#/components/responses/BadRequest'
        '401':
          $ref: './common.yaml#/components/responses/Unauthorized'
        '404':
          $ref: './common.yaml#/components/responses/NotFound'
        '422':
          $ref: './common.yaml#/components/responses/UnprocessableEntity'
        '500':
          $ref: './common.yaml#/components/responses/InternalServerError'

  # ---------------------------------------------------------------------------
  # Delegation (token-authenticated, no gateway headers)
  # ---------------------------------------------------------------------------

  /api/v1/delegation/validate:
    get:
      operationId: validateDelegationToken
      summary: Validate a delegation token
      description: |
        **Token-authenticated.** Validates a delegation token issued via the Client Hub
        delegate flow and returns context about the document request the delegate is
        authorized to fulfill.

        This endpoint does NOT require `X-User-Id`, `X-Firm-Id`, or `X-User-Role`
        headers. It is not routed through the API Gateway JWT injection path.
      tags:
        - Delegation
      parameters:
        - name: token
          in: query
          required: true
          description: Opaque delegation token received via email.
          schema:
            type: string
      responses:
        '200':
          description: Delegation token is valid. Returns delegation context.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DelegationSessionResponse'
        '401':
          $ref: './common.yaml#/components/responses/Unauthorized'
        '500':
          $ref: './common.yaml#/components/responses/InternalServerError'

  /api/v1/delegation/upload:
    post:
      operationId: delegationUpload
      summary: Upload documents as a delegate
      description: |
        **Token-authenticated.** Allows a third-party delegate to upload files against
        the document request they were delegated. The token identifies both the delegate
        and the specific request. Upload behavior is identical to the Client Hub upload.

        The request must be `multipart/form-data` with the token passed as a query
        parameter. This endpoint does NOT require `X-User-Id`, `X-Firm-Id`, or
        `X-User-Role` headers.
      tags:
        - Delegation
      parameters:
        - name: token
          in: query
          required: true
          description: Opaque delegation token received via email.
          schema:
            type: string
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: |
                    The file to upload. Multiple files may be uploaded by repeating
                    this field.
                notes:
                  type: string
                  description: Optional notes from the delegate accompanying the upload.
                  maxLength: 2000
      responses:
        '201':
          description: Upload received. Returns updated document request summary.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientHubUploadResponse'
        '400':
          $ref: './common.yaml#/components/responses/BadRequest'
        '401':
          $ref: './common.yaml#/components/responses/Unauthorized'
        '422':
          $ref: './common.yaml#/components/responses/UnprocessableEntity'
        '500':
          $ref: './common.yaml#/components/responses/InternalServerError'

  # ---------------------------------------------------------------------------
  # AI Decisions
  # ---------------------------------------------------------------------------

  /api/v1/engagements/{engagementId}/ai-decisions:
    get:
      operationId: listEngagementAIDecisions
      summary: List AI decisions for an engagement
      description: |
        Returns a paginated list of AI decisions made within this engagement. Decisions
        are recorded for every AI inference (document completeness review, control mapping,
        trial balance account mapping, evidence link suggestion, risk category suggestion,
        workpaper narrative draft, anomaly detection, report section draft) to satisfy
        ISO 42001 human-in-the-loop and explainability requirements.

        **Access:** All firm users with RLS access to this engagement.
      tags:
        - AIDecisions
      parameters:
        - $ref: './common.yaml#/components/parameters/X-User-Id'
        - $ref: './common.yaml#/components/parameters/X-Firm-Id'
        - $ref: './common.yaml#/components/parameters/X-User-Role'
        - $ref: './common.yaml#/components/parameters/CursorParam'
        - $ref: './common.yaml#/components/parameters/LimitParam'
        - name: engagementId
          in: path
          required: true
          description: UUID of the engagement.
          schema:
            type: string
            format: uuid
        - name: context_type
          in: query
          required: false
          description: |
            Filter by the type of context the decision was made in
            (e.g. `ControlRisk`, `EvidenceSufficiency`, `SamplingSelection`).
          schema:
            type: string
        - name: review_action
          in: query
          required: false
          description: Filter by the human reviewer's disposition (`Pending`, `Accepted`, `Modified`, `Rejected`).
          schema:
            $ref: '#/components/schemas/AIReviewAction'
      responses:
        '200':
          description: Paginated list of AI decisions.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AIDecisionListResponse'
        '401':
          $ref: './common.yaml#/components/responses/Unauthorized'
        '404':
          $ref: './common.yaml#/components/responses/NotFound'
        '500':
          $ref: './common.yaml#/components/responses/InternalServerError'

  /api/v1/ai-decisions/{decisionId}:
    get:
      operationId: getAIDecision
      summary: Get an AI decision
      description: |
        Returns full detail for a single AI decision including the model ID, prompt
        context, raw output, confidence score, human review status, and override rationale
        (if overridden).

        **Access:** All firm users with RLS access to the engagement the decision belongs to.
      tags:
        - AIDecisions
      parameters:
        - $ref: './common.yaml#/components/parameters/X-User-Id'
        - $ref: './common.yaml#/components/parameters/X-Firm-Id'
        - $ref: './common.yaml#/components/parameters/X-User-Role'
        - name: decisionId
          in: path
          required: true
          description: UUID of the AI decision.
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: AI decision detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AIDecisionDetailResponse'
        '401':
          $ref: './common.yaml#/components/responses/Unauthorized'
        '404':
          $ref: './common.yaml#/components/responses/NotFound'
        '500':
          $ref: './common.yaml#/components/responses/InternalServerError'

  /api/v1/ai-decisions/{decisionId}/review:
    post:
      operationId: reviewAIDecision
      summary: Review an AI decision
      description: |
        Records a human reviewer's disposition of an AI decision (`Accepted`, `Modified`,
        or `Rejected`). When `review_action = Modified`, `accepted_value` is required. The
        review is appended to the decision record; the original AI output is never modified.
        This fulfills ISO 42001 §6.4 human oversight requirements.

        **Access:** `Partner`, `Manager`, `EQReviewer`.
      tags:
        - AIDecisions
      parameters:
        - $ref: './common.yaml#/components/parameters/X-User-Id'
        - $ref: './common.yaml#/components/parameters/X-Firm-Id'
        - $ref: './common.yaml#/components/parameters/X-User-Role'
        - name: decisionId
          in: path
          required: true
          description: UUID of the AI decision.
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReviewAIDecisionRequest'
      responses:
        '200':
          description: Review recorded. Returns updated AI decision.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AIDecisionDetailResponse'
        '400':
          $ref: './common.yaml#/components/responses/BadRequest'
        '401':
          $ref: './common.yaml#/components/responses/Unauthorized'
        '403':
          $ref: './common.yaml#/components/responses/Forbidden'
        '404':
          $ref: './common.yaml#/components/responses/NotFound'
        '409':
          $ref: './common.yaml#/components/responses/Conflict'
        '500':
          $ref: './common.yaml#/components/responses/InternalServerError'

  # ---------------------------------------------------------------------------
  # Internal: Cross-Service AI Decision Creation
  # ---------------------------------------------------------------------------

  /internal/ai-decisions:
    post:
      operationId: createAIDecisionInternal
      summary: Create an AI decision record (internal service-to-service)
      description: |
        **Internal module endpoint.** Used by the trial balance, workpaper, and reporting
        modules to create `AIDecision` records in `axiom_db` after executing AI features
        (Features 3, 4, 7, 8). In the monolith, called via Go service interface
        (`http://audit-core/internal/ai-decisions`).

        Authentication: internal service header (`X-Internal-Service`), not JWT. Requests
        without a valid internal service header are rejected with 403.

        The calling service provides the full AIDecision payload. Audit Core persists the
        record and returns the generated `id` so the caller can reference it (e.g.,
        `trial_balance_accounts.ai_decision_id`).
      tags:
        - Internal
      parameters:
        - name: X-Internal-Service
          in: header
          required: true
          description: Identifier of the calling service (e.g., `trial-balance`, `workpaper`, `reporting`).
          schema:
            type: string
            enum:
              - trial-balance
              - workpaper
              - reporting
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAIDecisionInternalRequest'
      responses:
        '201':
          description: AI decision record created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AIDecisionDetailResponse'
        '400':
          $ref: './common.yaml#/components/responses/BadRequest'
        '403':
          $ref: './common.yaml#/components/responses/Forbidden'
        '500':
          $ref: './common.yaml#/components/responses/InternalServerError'

  # ---------------------------------------------------------------------------
  # Audit Log
  # ---------------------------------------------------------------------------

  /api/v1/engagements/{engagementId}/audit-log:
    get:
      operationId: listEngagementAuditLog
      summary: List audit log entries for an engagement
      description: |
        Returns a paginated, chronological list of audit log entries scoped to a single
        engagement. The log is append-only and immutable — entries cannot be modified or
        deleted. Supports filtering by action, resource type, and actor.

        Required for SOC 2 Type 2 CC7 (System Operations) and ISO 27001 A.12.4
        (Logging and Monitoring) compliance.

        **Access:** All firm users with RLS access to this engagement.
      tags:
        - AuditLog
      parameters:
        - $ref: './common.yaml#/components/parameters/X-User-Id'
        - $ref: './common.yaml#/components/parameters/X-Firm-Id'
        - $ref: './common.yaml#/components/parameters/X-User-Role'
        - $ref: './common.yaml#/components/parameters/CursorParam'
        - $ref: './common.yaml#/components/parameters/LimitParam'
        - name: engagementId
          in: path
          required: true
          description: UUID of the engagement.
          schema:
            type: string
            format: uuid
        - name: action
          in: query
          required: false
          description: Filter by action verb (e.g. `control.status_changed`, `evidence.uploaded`).
          schema:
            type: string
        - name: resource_type
          in: query
          required: false
          description: Filter by resource type (e.g. `Control`, `Evidence`, `DocumentRequest`).
          schema:
            type: string
        - name: actor_id
          in: query
          required: false
          description: Filter by the UUID of the user who performed the action.
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Paginated audit log entries.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditLogListResponse'
        '401':
          $ref: './common.yaml#/components/responses/Unauthorized'
        '404':
          $ref: './common.yaml#/components/responses/NotFound'
        '500':
          $ref: './common.yaml#/components/responses/InternalServerError'

  /api/v1/audit-log:
    get:
      operationId: listFirmAuditLog
      summary: List firm-level audit log entries
      description: |
        Returns a paginated, chronological list of audit log entries across the entire
        firm. Scoped to the `X-Firm-Id` in the request. Supports date range filtering
        in addition to action, resource type, and actor filters.

        Intended for `FirmAdmin` compliance reporting and export. Results are ordered
        newest-first.

        **Access:** `FirmAdmin`, `Partner`.
      tags:
        - AuditLog
      parameters:
        - $ref: './common.yaml#/components/parameters/X-User-Id'
        - $ref: './common.yaml#/components/parameters/X-Firm-Id'
        - $ref: './common.yaml#/components/parameters/X-User-Role'
        - $ref: './common.yaml#/components/parameters/CursorParam'
        - $ref: './common.yaml#/components/parameters/LimitParam'
        - name: action
          in: query
          required: false
          description: Filter by action verb.
          schema:
            type: string
        - name: resource_type
          in: query
          required: false
          description: Filter by resource type.
          schema:
            type: string
        - name: actor_id
          in: query
          required: false
          description: Filter by the UUID of the actor.
          schema:
            type: string
            format: uuid
        - name: from_date
          in: query
          required: false
          description: ISO 8601 datetime lower bound (inclusive) for `created_at`.
          schema:
            type: string
            format: date-time
        - name: to_date
          in: query
          required: false
          description: ISO 8601 datetime upper bound (inclusive) for `created_at`.
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Paginated firm-level audit log entries.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditLogListResponse'
        '401':
          $ref: './common.yaml#/components/responses/Unauthorized'
        '403':
          $ref: './common.yaml#/components/responses/Forbidden'
        '500':
          $ref: './common.yaml#/components/responses/InternalServerError'

  # ---------------------------------------------------------------------------
  # Notifications
  # ---------------------------------------------------------------------------

  /api/v1/notifications:
    get:
      operationId: listNotifications
      summary: List notifications for the authenticated user
      description: |
        Returns a paginated list of in-app notifications for the authenticated user,
        scoped to their firm. Notifications are generated by engagement lifecycle events,
        document request state changes, EQR findings, and AI decision reviews. Results
        are ordered newest-first.

        **Access:** All authenticated firm users (own notifications only).
      tags:
        - Notifications
      parameters:
        - $ref: './common.yaml#/components/parameters/X-User-Id'
        - $ref: './common.yaml#/components/parameters/X-Firm-Id'
        - $ref: './common.yaml#/components/parameters/X-User-Role'
        - $ref: './common.yaml#/components/parameters/CursorParam'
        - $ref: './common.yaml#/components/parameters/LimitParam'
        - name: is_read
          in: query
          required: false
          description: |
            When `false`, return only unread notifications. When `true`, return only
            read notifications. Omit to return all.
          schema:
            type: boolean
        - name: notification_type
          in: query
          required: false
          description: |
            Filter by notification type
            (e.g. `EngagementStatusChanged`, `DocumentRequestSent`, `EQRFindingCreated`).
          schema:
            type: string
      responses:
        '200':
          description: Paginated list of notifications.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationListResponse'
        '401':
          $ref: './common.yaml#/components/responses/Unauthorized'
        '500':
          $ref: './common.yaml#/components/responses/InternalServerError'

  /api/v1/notifications/{notificationId}/read:
    post:
      operationId: markNotificationRead
      summary: Mark a notification as read
      description: |
        Marks a single notification as read. Returns `404` if the notification does not
        belong to the authenticated user. Idempotent — marking an already-read
        notification is a no-op.

        **Access:** All authenticated firm users (own notifications only).
      tags:
        - Notifications
      parameters:
        - $ref: './common.yaml#/components/parameters/X-User-Id'
        - $ref: './common.yaml#/components/parameters/X-Firm-Id'
        - $ref: './common.yaml#/components/parameters/X-User-Role'
        - name: notificationId
          in: path
          required: true
          description: UUID of the notification.
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Notification marked as read. No content returned.
        '401':
          $ref: './common.yaml#/components/responses/Unauthorized'
        '404':
          $ref: './common.yaml#/components/responses/NotFound'
        '500':
          $ref: './common.yaml#/components/responses/InternalServerError'

  /api/v1/notifications/read-all:
    post:
      operationId: markAllNotificationsRead
      summary: Mark all notifications as read
      description: |
        Marks all unread notifications for the authenticated user as read in a single
        operation. Idempotent.

        **Access:** All authenticated firm users (own notifications only).
      tags:
        - Notifications
      parameters:
        - $ref: './common.yaml#/components/parameters/X-User-Id'
        - $ref: './common.yaml#/components/parameters/X-Firm-Id'
        - $ref: './common.yaml#/components/parameters/X-User-Role'
      responses:
        '204':
          description: All notifications marked as read. No content returned.
        '401':
          $ref: './common.yaml#/components/responses/Unauthorized'
        '500':
          $ref: './common.yaml#/components/responses/InternalServerError'

components:
  schemas:

    # -------------------------------------------------------------------------
    # Enums
    # -------------------------------------------------------------------------

    EngagementType:
      type: string
      description: The regulatory or assurance framework category for the engagement.
      enum:
        - FinancialAudit_Private
        - FinancialAudit_Public
        - SOC1
        - SOC2
        - ISO27001
        - HIPAA
        - AgreedUponProcedures
        - Advisory
      examples:
        - SOC2

    EngagementStatus:
      type: string
      description: The current lifecycle phase of the engagement.
      enum:
        - Planning
        - Fieldwork
        - Review
        - Reporting
        - Finalized
        - Archived
      examples:
        - Fieldwork

    ControlStatus:
      type: string
      description: The testing status of an individual control.
      enum:
        - NotStarted
        - InProgress
        - Complete
        - Exception
        - NotApplicable
      examples:
        - InProgress

    ProcedureType:
      type: string
      description: The audit methodology type for a test procedure.
      enum:
        - Inquiry
        - Observation
        - InspectionOfDocument
        - Reperformance
        - Analytics
      examples:
        - InspectionOfDocument

    ProcedureStatus:
      type: string
      description: The current completion status of a test procedure.
      enum:
        - NotStarted
        - InProgress
        - Complete
        - Exception
      examples:
        - Complete

    SamplingMethod:
      type: string
      description: The statistical method used to select the sample from the population.
      enum:
        - Systematic
        - Random
        - MonetaryUnit
      examples:
        - Random

    EvidenceSource:
      type: string
      description: How the evidence item was obtained.
      enum:
        - ClientUpload
        - CloudIntegration
        - APIImport
        - AuditorGenerated
      examples:
        - ClientUpload

    ExtractionStatus:
      type: string
      description: The status of automated text extraction for an evidence item.
      enum:
        - Pending
        - Complete
        - Failed
      examples:
        - Complete

    DocRequestStatus:
      type: string
      description: The lifecycle status of a document request.
      enum:
        - Pending
        - Submitted
        - InReview
        - Accepted
        - Rejected
        - Overdue
      examples:
        - Pending

    HubTokenStatus:
      type: string
      description: The current validity status of a client hub token.
      enum:
        - Active
        - Expired
        - Revoked
      examples:
        - Active

    DelegationTokenStatus:
      type: string
      description: The current status of a document request delegation token.
      enum:
        - Active
        - Used
        - Expired
      examples:
        - Active

    EQRStatus:
      type: string
      description: The progress status of an engagement quality review.
      enum:
        - Assigned
        - InProgress
        - Complete
      examples:
        - InProgress

    EQRConclusion:
      type: string
      description: The final conclusion reached by the EQR reviewer.
      enum:
        - Satisfied
        - SatisfiedWithConcerns
        - NotSatisfied
      examples:
        - Satisfied

    FindingSeverity:
      type: string
      description: The severity level of an EQR finding.
      enum:
        - Observation
        - Recommendation
        - RequiredAction
      examples:
        - Recommendation

    FindingStatus:
      type: string
      description: The resolution status of an EQR finding.
      enum:
        - Pending
        - Addressed
        - Confirmed
      examples:
        - Pending

    AIContextType:
      type: string
      description: |
        The type of AI-assisted analysis or generation that produced this decision.
        Maps to the eight AI features defined in the AI Architecture Design spec.
      enum:
        - ControlMapping
        - RiskCategorySuggestion
        - TrialBalanceMapping
        - DocumentCompleteness
        - EvidenceLinkSuggestion
        - WorkpaperDraft
        - ReportSectionDraft
        - AnomalyDetection
      examples:
        - EvidenceLinkSuggestion

    AIReviewAction:
      type: string
      description: The human reviewer's disposition of an AI decision.
      enum:
        - Pending
        - Accepted
        - Modified
        - Rejected
      examples:
        - Accepted

    ActorType:
      type: string
      description: The category of actor that performed an auditable action.
      enum:
        - User
        - System
        - AIAgent
      examples:
        - User

    NotificationType:
      type: string
      description: The category of event that triggered a notification.
      enum:
        - EngagementAssignment
        - ReviewNoteAdded
        - ReviewNoteResolved
        - DocumentRequestStatus
        - PhaseTransition
        - EQRNotification
        - ReminderEscalation
        - ArchivalConfirmation
        - RetentionWarning
      examples:
        - DocumentRequestStatus

    DeliveryChannel:
      type: string
      description: How the notification was or will be delivered to the recipient.
      enum:
        - InApp
        - Email
        - Both
      examples:
        - Both

    EngagementRole:
      type: string
      description: The role of a team member within a specific engagement.
      enum:
        - Partner
        - Manager
        - Staff
      examples:
        - Manager

    # -------------------------------------------------------------------------
    # Framework & Library
    # -------------------------------------------------------------------------

    Framework:
      type: object
      description: A regulatory or assurance framework (e.g., SOC 2, ISO 27001) that defines the requirements for an engagement.
      required:
        - id
        - name
        - version
        - effective_date
        - governing_body
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for the framework.
          examples:
            - "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
        name:
          type: string
          description: Full name of the framework.
          examples:
            - "SOC 2 Type II"
        version:
          type: string
          description: Version or edition of the framework.
          examples:
            - "2017"
        effective_date:
          type: string
          format: date
          description: Date from which this framework version is effective.
          examples:
            - "2017-09-01"
        deprecated_at:
          type:
            - string
            - "null"
          format: date
          description: Date on which this framework version was superseded or retired. Null if still current.
          examples:
            - null
        governing_body:
          type: string
          description: The standards body or organization that owns this framework.
          examples:
            - "AICPA"

    FrameworkRequirement:
      type: object
      description: An individual requirement or criterion within a framework (e.g., CC6.1 in SOC 2).
      required:
        - id
        - framework_id
        - identifier
        - title
        - description
        - category
        - sort_order
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for this requirement.
          examples:
            - "b2c3d4e5-f6a7-8901-bcde-f12345678901"
        framework_id:
          type: string
          format: uuid
          description: The framework this requirement belongs to.
          examples:
            - "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
        identifier:
          type: string
          description: The short code used to reference this requirement within its framework.
          examples:
            - "CC6.1"
        title:
          type: string
          description: Brief title of the requirement.
          examples:
            - "Logical and Physical Access Controls"
        description:
          type: string
          description: Full text of the requirement as stated by the governing body.
          examples:
            - "The entity implements logical access security software, infrastructure, and architectures over protected information assets..."
        category:
          type: string
          description: The grouping or domain category within the framework.
          examples:
            - "Common Criteria"
        sort_order:
          type: integer
          description: Display ordering within the framework for consistent presentation.
          examples:
            - 61

    ControlObjectiveLibraryItem:
      type: object
      description: A reusable control objective from the firm's library, independent of any specific framework.
      required:
        - id
        - name
        - description
        - tags
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for this library item.
          examples:
            - "c3d4e5f6-a7b8-9012-cdef-123456789012"
        name:
          type: string
          description: Short name of the control objective.
          examples:
            - "Multi-Factor Authentication Enforcement"
        description:
          type: string
          description: Detailed description of what this control objective covers.
          examples:
            - "Ensure all privileged and user accounts require MFA for system access."
        tags:
          type: array
          description: Searchable tags for categorization and discovery.
          items:
            type: string
          examples:
            - ["access-control", "authentication", "identity"]

    ControlObjectiveLibraryMapping:
      type: object
      description: Maps a library control objective to a specific framework requirement, enabling reuse across frameworks.
      required:
        - id
        - library_objective_id
        - framework_requirement_id
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for this mapping.
          examples:
            - "d4e5f6a7-b8c9-0123-defa-234567890123"
        library_objective_id:
          type: string
          format: uuid
          description: The control objective library item being mapped.
          examples:
            - "c3d4e5f6-a7b8-9012-cdef-123456789012"
        framework_requirement_id:
          type: string
          format: uuid
          description: The framework requirement this objective satisfies.
          examples:
            - "b2c3d4e5-f6a7-8901-bcde-f12345678901"

    # -------------------------------------------------------------------------
    # Engagement
    # -------------------------------------------------------------------------

    Engagement:
      type: object
      description: An audit or assurance engagement representing a single project for a client over a defined period.
      required:
        - id
        - firm_id
        - client_id
        - name
        - engagement_type
        - primary_framework_id
        - period_start
        - period_end
        - status
        - created_at
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for the engagement.
          examples:
            - "e5f6a7b8-c9d0-1234-efab-345678901234"
        firm_id:
          type: string
          format: uuid
          description: The audit firm conducting this engagement.
          examples:
            - "f6a7b8c9-d0e1-2345-fabc-456789012345"
        client_id:
          type: string
          format: uuid
          description: The client organization being audited.
          examples:
            - "a7b8c9d0-e1f2-3456-abcd-567890123456"
        name:
          type: string
          description: Human-readable name for the engagement.
          examples:
            - "Acme Corp SOC 2 Type II — FY2025"
        engagement_type:
          $ref: '#/components/schemas/EngagementType'
        primary_framework_id:
          type: string
          format: uuid
          description: The primary framework governing this engagement.
          examples:
            - "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
        period_start:
          type: string
          format: date
          description: Start of the audit period.
          examples:
            - "2025-01-01"
        period_end:
          type: string
          format: date
          description: End of the audit period.
          examples:
            - "2025-12-31"
        status:
          $ref: '#/components/schemas/EngagementStatus'
        prior_engagement_id:
          type:
            - string
            - "null"
          format: uuid
          description: The previous engagement for rollforward purposes. Null for first-year engagements.
          examples:
            - null
        methodology_template_id:
          type:
            - string
            - "null"
          format: uuid
          description: The methodology template used to scaffold this engagement. Null if built from scratch.
          examples:
            - null
        report_issued_at:
          type:
            - string
            - "null"
          format: date-time
          description: When the final report was issued. Null until the Reporting phase is complete.
          examples:
            - null
        assembly_deadline:
          type:
            - string
            - "null"
          format: date
          description: Target date for completing file assembly. Null if not set.
          examples:
            - "2026-03-31"
        retention_deadline:
          type:
            - string
            - "null"
          format: date
          description: Date after which the engagement file may be destroyed per retention policy. Null until set.
          examples:
            - "2032-12-31"
        finalized_at:
          type:
            - string
            - "null"
          format: date-time
          description: Timestamp when the engagement status was set to Finalized.
          examples:
            - null
        archived_at:
          type:
            - string
            - "null"
          format: date-time
          description: Timestamp when the engagement was archived.
          examples:
            - null
        created_at:
          type: string
          format: date-time
          description: Timestamp when the engagement was created.
          examples:
            - "2025-01-15T09:00:00Z"

    EngagementSummary:
      allOf:
        - $ref: '#/components/schemas/Engagement'
        - type: object
          description: Engagement with aggregated dashboard counts for quick status overview.
          required:
            - controls_total
            - controls_complete
            - controls_with_exceptions
            - open_document_requests
            - team_member_count
          properties:
            controls_total:
              type: integer
              description: Total number of controls in scope for this engagement.
              examples:
                - 42
            controls_complete:
              type: integer
              description: Number of controls with status Complete.
              examples:
                - 30
            controls_with_exceptions:
              type: integer
              description: Number of controls with status Exception.
              examples:
                - 2
            open_document_requests:
              type: integer
              description: Number of document requests with status Pending, Submitted, InReview, or Overdue.
              examples:
                - 5
            team_member_count:
              type: integer
              description: Number of active team members assigned to this engagement.
              examples:
                - 4

    EngagementTeamMember:
      type: object
      description: A user's assignment to a specific engagement with a defined role.
      required:
        - id
        - engagement_id
        - user_id
        - engagement_role
        - assigned_at
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for this team assignment.
          examples:
            - "b8c9d0e1-f2a3-4567-bcde-678901234567"
        engagement_id:
          type: string
          format: uuid
          description: The engagement this assignment belongs to.
          examples:
            - "e5f6a7b8-c9d0-1234-efab-345678901234"
        user_id:
          type: string
          format: uuid
          description: The user being assigned to the engagement.
          examples:
            - "c9d0e1f2-a3b4-5678-cdef-789012345678"
        engagement_role:
          $ref: '#/components/schemas/EngagementRole'
        assigned_at:
          type: string
          format: date-time
          description: Timestamp when this team member was added to the engagement.
          examples:
            - "2025-01-15T09:05:00Z"
        removed_at:
          type:
            - string
            - "null"
          format: date-time
          description: Timestamp when this team member was removed. Null if still active.
          examples:
            - null

    EngagementFramework:
      type: object
      description: A framework associated with an engagement, supporting multi-framework engagements.
      required:
        - id
        - engagement_id
        - framework_id
        - framework_version
        - is_primary
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for this engagement-framework association.
          examples:
            - "d0e1f2a3-b4c5-6789-defa-890123456789"
        engagement_id:
          type: string
          format: uuid
          description: The engagement this association belongs to.
          examples:
            - "e5f6a7b8-c9d0-1234-efab-345678901234"
        framework_id:
          type: string
          format: uuid
          description: The framework being associated.
          examples:
            - "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
        framework_version:
          type: string
          description: The specific version of the framework in use for this engagement.
          examples:
            - "2017"
        is_primary:
          type: boolean
          description: Whether this is the primary framework for the engagement. Exactly one framework per engagement must be primary.
          examples:
            - true

    # -------------------------------------------------------------------------
    # Client Acceptance
    # -------------------------------------------------------------------------

    ClientAcceptance:
      type: object
      description: Pre-engagement client acceptance documentation including quality risk assessment and independence confirmation.
      required:
        - id
        - engagement_id
        - quality_risks_identified
        - firm_responses
        - independence_confirmed
        - created_at
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for the client acceptance record.
          examples:
            - "e1f2a3b4-c5d6-7890-efab-901234567890"
        engagement_id:
          type: string
          format: uuid
          description: The engagement this acceptance record belongs to.
          examples:
            - "e5f6a7b8-c9d0-1234-efab-345678901234"
        quality_risks_identified:
          type: object
          description: Structured set of quality risk factors identified during the acceptance process. Keys are risk identifiers, values are boolean or descriptive assessments.
          examples:
            - {"litigation_history": false, "management_integrity_concerns": false, "prior_auditor_issues": true}
        firm_responses:
          type: object
          description: The firm's documented responses to each identified quality risk.
          examples:
            - {"prior_auditor_issues": "Reviewed predecessor auditor communications; no reportable matters identified."}
        independence_confirmed:
          type: boolean
          description: Whether the engagement partner has confirmed firm independence from the client.
          examples:
            - true
        independence_confirmed_by_id:
          type:
            - string
            - "null"
          format: uuid
          description: The user who confirmed independence. Null until confirmed.
          examples:
            - null
        accepted_by_id:
          type:
            - string
            - "null"
          format: uuid
          description: The user who formally accepted the client. Null until accepted.
          examples:
            - null
        accepted_at:
          type:
            - string
            - "null"
          format: date-time
          description: Timestamp of formal client acceptance. Null until accepted.
          examples:
            - "2025-01-14T16:00:00Z"
        created_at:
          type: string
          format: date-time
          description: Timestamp when this record was created.
          examples:
            - "2025-01-10T10:00:00Z"

    # -------------------------------------------------------------------------
    # Engagement Quality Review (EQR)
    # -------------------------------------------------------------------------

    EngagementQualityReview:
      type: object
      description: An independent quality review of the engagement conducted by an EQR reviewer before the report is issued.
      required:
        - id
        - engagement_id
        - reviewer_id
        - status
        - created_at
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for this EQR.
          examples:
            - "f2a3b4c5-d6e7-8901-fabc-012345678901"
        engagement_id:
          type: string
          format: uuid
          description: The engagement under review.
          examples:
            - "e5f6a7b8-c9d0-1234-efab-345678901234"
        reviewer_id:
          type: string
          format: uuid
          description: The user assigned as the EQR reviewer.
          examples:
            - "a3b4c5d6-e7f8-9012-abcd-123456789012"
        independence_documented_at:
          type:
            - string
            - "null"
          format: date-time
          description: When the reviewer documented their independence from the engagement. Null until documented.
          examples:
            - "2026-01-05T11:00:00Z"
        status:
          $ref: '#/components/schemas/EQRStatus'
        scope_notes:
          type:
            - string
            - "null"
          description: Reviewer's notes on the scope and approach of the quality review. Null until added.
          examples:
            - null
        conclusion:
          oneOf:
            - $ref: '#/components/schemas/EQRConclusion'
            - type: "null"
          description: The reviewer's final conclusion. Null until the review is complete.
        signed_off_at:
          type:
            - string
            - "null"
          format: date-time
          description: Timestamp of the reviewer's final sign-off. Null until complete.
          examples:
            - null
        created_at:
          type: string
          format: date-time
          description: Timestamp when the EQR was assigned.
          examples:
            - "2026-01-03T09:00:00Z"

    EQRFinding:
      type: object
      description: A specific finding raised by the EQR reviewer that requires a team response.
      required:
        - id
        - eqr_id
        - description
        - severity
        - status
        - created_at
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for this finding.
          examples:
            - "a4b5c6d7-e8f9-0123-abcd-234567890123"
        eqr_id:
          type: string
          format: uuid
          description: The EQR this finding belongs to.
          examples:
            - "f2a3b4c5-d6e7-8901-fabc-012345678901"
        description:
          type: string
          description: Detailed description of the finding.
          examples:
            - "Test procedure for CC6.1 lacks sufficient documentation of the sample selection rationale."
        severity:
          $ref: '#/components/schemas/FindingSeverity'
        status:
          $ref: '#/components/schemas/FindingStatus'
        team_response:
          type:
            - string
            - "null"
          description: The engagement team's written response to this finding. Null until responded.
          examples:
            - null
        responded_at:
          type:
            - string
            - "null"
          format: date-time
          description: Timestamp of the team's response. Null until responded.
          examples:
            - null
        confirmed_by_id:
          type:
            - string
            - "null"
          format: uuid
          description: The reviewer who confirmed the finding as addressed. Null until confirmed.
          examples:
            - null
        confirmed_at:
          type:
            - string
            - "null"
          format: date-time
          description: Timestamp of the reviewer's confirmation. Null until confirmed.
          examples:
            - null
        created_at:
          type: string
          format: date-time
          description: Timestamp when this finding was raised.
          examples:
            - "2026-01-06T14:00:00Z"

    # -------------------------------------------------------------------------
    # Controls
    # -------------------------------------------------------------------------

    Control:
      type: object
      description: A specific control being tested within an engagement, derived from a firm control objective.
      required:
        - id
        - engagement_id
        - firm_control_objective_id
        - description
        - status
        - is_key_control
        - created_at
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for this control instance.
          examples:
            - "b5c6d7e8-f9a0-1234-bcde-345678901234"
        engagement_id:
          type: string
          format: uuid
          description: The engagement this control belongs to.
          examples:
            - "e5f6a7b8-c9d0-1234-efab-345678901234"
        firm_control_objective_id:
          type: string
          format: uuid
          description: The firm library control objective this control is based on.
          examples:
            - "c3d4e5f6-a7b8-9012-cdef-123456789012"
        description:
          type: string
          description: The specific description of this control as tailored for the engagement.
          examples:
            - "Multi-factor authentication is required for all user accounts accessing production systems."
        control_owner_id:
          type:
            - string
            - "null"
          format: uuid
          description: The client-side owner responsible for this control. Null if unassigned.
          examples:
            - null
        auditor_assigned_to_id:
          type:
            - string
            - "null"
          format: uuid
          description: The auditor responsible for testing this control. Null if unassigned.
          examples:
            - null
        status:
          $ref: '#/components/schemas/ControlStatus'
        is_key_control:
          type: boolean
          description: Whether this is designated as a key control requiring more rigorous testing.
          examples:
            - true
        prior_control_id:
          type:
            - string
            - "null"
          format: uuid
          description: The corresponding control from the prior year engagement, for rollforward context. Null for new controls.
          examples:
            - null
        created_at:
          type: string
          format: date-time
          description: Timestamp when this control was added to the engagement.
          examples:
            - "2025-01-15T09:10:00Z"

    ControlDetail:
      allOf:
        - $ref: '#/components/schemas/Control'
        - type: object
          description: Control with fully resolved test procedures, evidence links, and mapped framework requirements.
          required:
            - test_procedures
            - evidence_links
            - framework_requirements
          properties:
            test_procedures:
              type: array
              description: All test procedures designed to test this control.
              items:
                $ref: '#/components/schemas/TestProcedure'
            evidence_links:
              type: array
              description: All evidence items linked to test procedures under this control.
              items:
                $ref: '#/components/schemas/EvidenceLink'
            framework_requirements:
              type: array
              description: Framework requirements satisfied by this control, resolved via the control objective library mappings.
              items:
                $ref: '#/components/schemas/FrameworkRequirement'

    # -------------------------------------------------------------------------
    # Test Procedures
    # -------------------------------------------------------------------------

    TestProcedure:
      type: object
      description: A specific audit procedure performed to test a control, including sampling details and results.
      required:
        - id
        - control_id
        - procedure_type
        - description
        - status
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for this test procedure.
          examples:
            - "c6d7e8f9-a0b1-2345-cdef-456789012345"
        control_id:
          type: string
          format: uuid
          description: The control this procedure tests.
          examples:
            - "b5c6d7e8-f9a0-1234-bcde-345678901234"
        procedure_type:
          $ref: '#/components/schemas/ProcedureType'
        description:
          type: string
          description: Description of what is being tested and how.
          examples:
            - "Inspect a sample of access provisioning tickets to confirm MFA was enabled prior to system access being granted."
        expected_result:
          type:
            - string
            - "null"
          description: The expected outcome if the control is operating effectively.
          examples:
            - "All sampled tickets show MFA enabled before access grant date."
        population_size:
          type:
            - integer
            - "null"
          description: Total number of items in the population from which the sample was drawn. Null for non-sampling procedures.
          examples:
            - 1250
        sample_size:
          type:
            - integer
            - "null"
          description: Number of items selected for testing. Null for non-sampling procedures.
          examples:
            - 25
        sampling_method:
          oneOf:
            - $ref: '#/components/schemas/SamplingMethod'
            - type: "null"
          description: The statistical method used to select the sample. Null for non-sampling procedures.
        result:
          type:
            - string
            - "null"
          description: The auditor's documented result of performing the procedure.
          examples:
            - null
        exceptions_noted:
          type:
            - string
            - "null"
          description: Description of any exceptions found during testing. Null if no exceptions.
          examples:
            - null
        conclusion:
          type:
            - string
            - "null"
          description: The auditor's conclusion drawn from the procedure results.
          examples:
            - null
        performed_by_id:
          type:
            - string
            - "null"
          format: uuid
          description: The auditor who performed this procedure. Null until assigned or completed.
          examples:
            - null
        performed_at:
          type:
            - string
            - "null"
          format: date-time
          description: Timestamp when the procedure was performed. Null until completed.
          examples:
            - null
        reviewed_by_id:
          type:
            - string
            - "null"
          format: uuid
          description: The auditor who reviewed this procedure. Null until reviewed.
          examples:
            - null
        reviewed_at:
          type:
            - string
            - "null"
          format: date-time
          description: Timestamp when the procedure was reviewed. Null until reviewed.
          examples:
            - null
        status:
          $ref: '#/components/schemas/ProcedureStatus'
        prior_procedure_id:
          type:
            - string
            - "null"
          format: uuid
          description: The corresponding procedure from the prior engagement for rollforward context. Null for new procedures.
          examples:
            - null

    # -------------------------------------------------------------------------
    # Evidence
    # -------------------------------------------------------------------------

    EvidenceItem:
      type: object
      description: A file or extracted document stored as evidence for one or more audit procedures.
      required:
        - id
        - firm_id
        - client_id
        - filename
        - storage_path
        - content_type
        - file_size_bytes
        - uploaded_by_id
        - uploaded_at
        - source_type
        - extraction_status
        - is_sensitive
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for this evidence item.
          examples:
            - "d7e8f9a0-b1c2-3456-defa-567890123456"
        firm_id:
          type: string
          format: uuid
          description: The audit firm that owns this evidence item.
          examples:
            - "f6a7b8c9-d0e1-2345-fabc-456789012345"
        client_id:
          type: string
          format: uuid
          description: The client this evidence relates to.
          examples:
            - "a7b8c9d0-e1f2-3456-abcd-567890123456"
        filename:
          type: string
          description: Original filename as uploaded.
          examples:
            - "access_provisioning_log_Q4_2025.pdf"
        storage_path:
          type: string
          description: Internal S3 object key for the stored file. Not a public URL.
          examples:
            - "evidence/f6a7b8c9/a7b8c9d0/d7e8f9a0-b1c2-3456-defa-567890123456"
        content_type:
          type: string
          description: MIME type of the file.
          examples:
            - "application/pdf"
        file_size_bytes:
          type: integer
          description: Size of the file in bytes.
          examples:
            - 245760
        uploaded_by_id:
          type: string
          format: uuid
          description: The user who uploaded this evidence item.
          examples:
            - "c9d0e1f2-a3b4-5678-cdef-789012345678"
        uploaded_at:
          type: string
          format: date-time
          description: Timestamp when the file was uploaded.
          examples:
            - "2025-06-15T14:30:00Z"
        source_type:
          $ref: '#/components/schemas/EvidenceSource'
        source_integration:
          type:
            - string
            - "null"
          description: Identifier of the cloud integration or API source if not a direct upload.
          examples:
            - null
        extracted_text:
          type:
            - string
            - "null"
          description: Text extracted from the document by the document processing service. Null until extraction completes or if not applicable.
          examples:
            - null
        extraction_status:
          $ref: '#/components/schemas/ExtractionStatus'
        is_sensitive:
          type: boolean
          description: Whether this evidence is flagged as containing sensitive or PII data requiring restricted access.
          examples:
            - false

    EvidenceLink:
      type: object
      description: Association between an evidence item and a test procedure, optionally suggested by AI.
      required:
        - id
        - evidence_item_id
        - test_procedure_id
        - linked_by_id
        - linked_at
        - ai_suggested
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for this evidence link.
          examples:
            - "e8f9a0b1-c2d3-4567-efab-678901234567"
        evidence_item_id:
          type: string
          format: uuid
          description: The evidence item being linked.
          examples:
            - "d7e8f9a0-b1c2-3456-defa-567890123456"
        test_procedure_id:
          type: string
          format: uuid
          description: The test procedure this evidence supports.
          examples:
            - "c6d7e8f9-a0b1-2345-cdef-456789012345"
        linked_by_id:
          type: string
          format: uuid
          description: The user who created this link (or system if AI-initiated and auto-accepted).
          examples:
            - "c9d0e1f2-a3b4-5678-cdef-789012345678"
        linked_at:
          type: string
          format: date-time
          description: Timestamp when the link was established.
          examples:
            - "2025-06-16T09:00:00Z"
        notes:
          type:
            - string
            - "null"
          description: Optional notes explaining why this evidence satisfies the procedure.
          examples:
            - "Pages 4-7 show the full access provisioning log for the sample period."
        ai_suggested:
          type: boolean
          description: Whether this link was originally suggested by the AI evidence suggestion system.
          examples:
            - false
        ai_decision_id:
          type:
            - string
            - "null"
          format: uuid
          description: The AI decision that produced this suggestion, if ai_suggested is true.
          examples:
            - null

    EvidenceLinkWithSatisfaction:
      allOf:
        - $ref: '#/components/schemas/EvidenceLink'
        - type: object
          description: Evidence link extended with the framework requirements it satisfies via the linked procedure's control.
          required:
            - satisfied_framework_requirements
          properties:
            satisfied_framework_requirements:
              type: array
              description: Framework requirements satisfied by the linked test procedure's control, through which this evidence provides coverage.
              items:
                $ref: '#/components/schemas/FrameworkRequirement'

    DownloadUrlResponse:
      type: object
      description: A pre-signed URL for downloading an evidence item directly from S3.
      required:
        - url
        - expires_in
      properties:
        url:
          type: string
          format: uri
          description: Pre-signed S3 URL valid for the specified duration.
          examples:
            - "https://axiom-evidence.s3.amazonaws.com/evidence/...?X-Amz-Signature=..."
        expires_in:
          type: integer
          description: Number of seconds until the URL expires.
          examples:
            - 300

    # -------------------------------------------------------------------------
    # Document Requests
    # -------------------------------------------------------------------------

    DocumentRequest:
      type: object
      description: A request to a client for a specific document or piece of evidence needed for the audit.
      required:
        - id
        - engagement_id
        - title
        - instructions
        - status
        - reminder_count
        - created_at
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for this document request.
          examples:
            - "f9a0b1c2-d3e4-5678-fabc-789012345678"
        engagement_id:
          type: string
          format: uuid
          description: The engagement this request belongs to.
          examples:
            - "e5f6a7b8-c9d0-1234-efab-345678901234"
        control_id:
          type:
            - string
            - "null"
          format: uuid
          description: The control this request relates to. Null if not tied to a specific control.
          examples:
            - "b5c6d7e8-f9a0-1234-bcde-345678901234"
        test_procedure_id:
          type:
            - string
            - "null"
          format: uuid
          description: The specific test procedure this request will fulfill. Null if not tied to a procedure.
          examples:
            - null
        assigned_to_id:
          type:
            - string
            - "null"
          format: uuid
          description: The client user responsible for fulfilling this request. Null if unassigned.
          examples:
            - null
        title:
          type: string
          description: Short title describing what is being requested.
          examples:
            - "Access Provisioning Logs — Q4 2025"
        instructions:
          type: string
          description: Detailed instructions explaining exactly what the client needs to provide.
          examples:
            - "Please provide all access provisioning records for the period October 1 through December 31, 2025. Include the requester, approver, date, and system for each request."
        due_date:
          type:
            - string
            - "null"
          format: date
          description: Date by which the client should submit this document. Null if no deadline set.
          examples:
            - "2026-01-31"
        status:
          $ref: '#/components/schemas/DocRequestStatus'
        reminder_count:
          type: integer
          description: Number of reminder notifications sent to the client for this request.
          examples:
            - 0
        last_reminder_sent_at:
          type:
            - string
            - "null"
          format: date-time
          description: Timestamp of the most recent reminder. Null if no reminders sent.
          examples:
            - null
        fulfilled_by_evidence_item_id:
          type:
            - string
            - "null"
          format: uuid
          description: The evidence item uploaded by the client that fulfilled this request. Null until accepted.
          examples:
            - null
        sent_at:
          type:
            - string
            - "null"
          format: date-time
          description: Timestamp when the request was sent to the client via the Client Hub. Null until sent.
          examples:
            - null
        created_at:
          type: string
          format: date-time
          description: Timestamp when this request was created.
          examples:
            - "2025-12-01T10:00:00Z"

    DocumentRequestClientView:
      type: object
      description: A limited view of a document request exposed to client users via the Client Hub. Excludes internal engagement details.
      required:
        - id
        - title
        - instructions
        - status
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for the document request.
          examples:
            - "f9a0b1c2-d3e4-5678-fabc-789012345678"
        title:
          type: string
          description: Short title describing what is being requested.
          examples:
            - "Access Provisioning Logs — Q4 2025"
        instructions:
          type: string
          description: Detailed instructions for fulfilling the request.
          examples:
            - "Please provide all access provisioning records for the period October 1 through December 31, 2025."
        due_date:
          type:
            - string
            - "null"
          format: date
          description: Date by which the document should be submitted. Null if no deadline.
          examples:
            - "2026-01-31"
        status:
          $ref: '#/components/schemas/DocRequestStatus'

    # -------------------------------------------------------------------------
    # Client Hub
    # -------------------------------------------------------------------------

    ClientHubToken:
      type: object
      description: A secure token granting a client access to the Client Hub portal. The token_hash is never returned; token_url is provided instead.
      required:
        - id
        - engagement_id
        - client_id
        - valid_until
        - created_by_id
        - status
        - created_at
        - token_url
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for this token.
          examples:
            - "a0b1c2d3-e4f5-6789-abcd-890123456789"
        engagement_id:
          type: string
          format: uuid
          description: The engagement this token grants access to.
          examples:
            - "e5f6a7b8-c9d0-1234-efab-345678901234"
        client_id:
          type: string
          format: uuid
          description: The client organization this token is issued to.
          examples:
            - "a7b8c9d0-e1f2-3456-abcd-567890123456"
        token_url:
          type: string
          format: uri
          description: The full URL containing the token that is sent to the client. Never expose the raw token_hash.
          examples:
            - "https://app.axiom.io/hub?token=abc123xyz"
        valid_until:
          type: string
          format: date-time
          description: Expiry timestamp for this token.
          examples:
            - "2026-03-31T23:59:59Z"
        created_by_id:
          type: string
          format: uuid
          description: The auditor who generated this token.
          examples:
            - "c9d0e1f2-a3b4-5678-cdef-789012345678"
        status:
          $ref: '#/components/schemas/HubTokenStatus'
        created_at:
          type: string
          format: date-time
          description: Timestamp when this token was created.
          examples:
            - "2025-12-01T08:00:00Z"

    ClientHubValidation:
      type: object
      description: Engagement context returned when a client validates their hub token, confirming what they have access to.
      required:
        - engagement_name
        - period_start
        - period_end
        - firm_name
        - outstanding_request_count
      properties:
        engagement_name:
          type: string
          description: Name of the engagement the client is accessing.
          examples:
            - "Acme Corp SOC 2 Type II — FY2025"
        period_start:
          type: string
          format: date
          description: Start of the audit period.
          examples:
            - "2025-01-01"
        period_end:
          type: string
          format: date
          description: End of the audit period.
          examples:
            - "2025-12-31"
        firm_name:
          type: string
          description: Name of the audit firm conducting the engagement.
          examples:
            - "Grant & Thornton Assurance LLP"
        outstanding_request_count:
          type: integer
          description: Number of document requests currently awaiting client action.
          examples:
            - 3

    DelegationValidation:
      type: object
      description: Document request context returned when a delegate validates their delegation token.
      required:
        - request_title
        - instructions
      properties:
        request_title:
          type: string
          description: The title of the document request being delegated.
          examples:
            - "Access Provisioning Logs — Q4 2025"
        instructions:
          type: string
          description: Full instructions for what the delegate needs to provide.
          examples:
            - "Please provide all access provisioning records for the period October 1 through December 31, 2025."

    # -------------------------------------------------------------------------
    # AI Decisions
    # -------------------------------------------------------------------------

    AIDecision:
      type: object
      description: A logged AI-generated suggestion or output, with human review tracking for human-in-the-loop compliance.
      required:
        - id
        - firm_id
        - context_type
        - context_id
        - context_table
        - model_id
        - raw_output
        - review_action
        - created_at
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for this AI decision.
          examples:
            - "b1c2d3e4-f5a6-7890-bcde-901234567890"
        firm_id:
          type: string
          format: uuid
          description: The firm in whose context this AI decision was made.
          examples:
            - "f6a7b8c9-d0e1-2345-fabc-456789012345"
        engagement_id:
          type:
            - string
            - "null"
          format: uuid
          description: The engagement this decision relates to. Null for firm-level decisions not tied to a specific engagement.
          examples:
            - "e5f6a7b8-c9d0-1234-efab-345678901234"
        context_type:
          $ref: '#/components/schemas/AIContextType'
        context_id:
          type: string
          format: uuid
          description: The UUID of the specific resource (control, procedure, etc.) this decision was made for.
          examples:
            - "c6d7e8f9-a0b1-2345-cdef-456789012345"
        context_table:
          type: string
          description: The database table name of the resource identified by context_id.
          examples:
            - "test_procedures"
        model_id:
          type: string
          description: The Bedrock model identifier used to generate this decision.
          examples:
            - "anthropic.claude-3-5-sonnet-20241022-v2:0"
        input_token_count:
          type:
            - integer
            - "null"
          description: Number of tokens in the input prompt. Null if not recorded.
          examples:
            - 2048
        output_token_count:
          type:
            - integer
            - "null"
          description: Number of tokens in the model's output. Null if not recorded.
          examples:
            - 512
        raw_output:
          type: object
          description: The complete structured output from the model, stored for audit trail purposes.
        suggested_value:
          type:
            - string
            - "null"
          description: The primary suggested value extracted from the model output. Null for outputs without a single extractable suggestion.
          examples:
            - "CC6.1"
        confidence:
          type:
            - number
            - "null"
          minimum: 0
          maximum: 1
          description: Model's confidence score for the suggestion, between 0 and 1. Null if not provided.
          examples:
            - 0.87
        explanation:
          type:
            - string
            - "null"
          description: Human-readable explanation of why the model made this suggestion.
          examples:
            - "The evidence document contains access provisioning records matching the control's scope and period."
        review_action:
          $ref: '#/components/schemas/AIReviewAction'
        accepted_value:
          type:
            - string
            - "null"
          description: The value actually applied after human review. May differ from suggested_value if the reviewer modified it.
          examples:
            - null
        reviewed_by_id:
          type:
            - string
            - "null"
          format: uuid
          description: The user who reviewed this AI decision. Null until reviewed.
          examples:
            - null
        reviewed_at:
          type:
            - string
            - "null"
          format: date-time
          description: Timestamp of the human review. Null until reviewed.
          examples:
            - null
        created_at:
          type: string
          format: date-time
          description: Timestamp when this AI decision was recorded.
          examples:
            - "2025-06-16T08:45:00Z"

    # -------------------------------------------------------------------------
    # Audit Log
    # -------------------------------------------------------------------------

    AuditLogEntry:
      type: object
      description: An immutable record of a state-changing event in the system, for compliance and forensic purposes.
      required:
        - id
        - firm_id
        - actor_type
        - action
        - resource_type
        - occurred_at
      properties:
        id:
          type: integer
          description: Sequential integer identifier. Not a UUID — provides strict ordering guarantees for the append-only log.
          examples:
            - 100042
        firm_id:
          type: string
          format: uuid
          description: The firm whose data was affected by this event.
          examples:
            - "f6a7b8c9-d0e1-2345-fabc-456789012345"
        actor_id:
          type:
            - string
            - "null"
          format: uuid
          description: The user or system actor that performed the action. Null for anonymous or system-initiated events.
          examples:
            - "c9d0e1f2-a3b4-5678-cdef-789012345678"
        actor_type:
          $ref: '#/components/schemas/ActorType'
        action:
          type: string
          description: A dot-separated action identifier (e.g., engagement.status.transitioned, control.updated).
          examples:
            - "engagement.status.transitioned"
        resource_type:
          type: string
          description: The type of resource affected by this action.
          examples:
            - "engagement"
        resource_id:
          type:
            - string
            - "null"
          format: uuid
          description: The UUID of the affected resource. Null for bulk or non-specific operations.
          examples:
            - "e5f6a7b8-c9d0-1234-efab-345678901234"
        old_value:
          type:
            - object
            - "null"
          description: Snapshot of the relevant resource state before the action. Null for creation events.
          examples:
            - {"status": "Planning"}
        new_value:
          type:
            - object
            - "null"
          description: Snapshot of the relevant resource state after the action. Null for deletion events.
          examples:
            - {"status": "Fieldwork"}
        ip_address:
          type:
            - string
            - "null"
          description: IP address of the request that triggered this event. Null for system-initiated events.
          examples:
            - "203.0.113.42"
        user_agent:
          type:
            - string
            - "null"
          description: User-Agent header from the request that triggered this event. Null for system-initiated events.
          examples:
            - "Mozilla/5.0 (Macintosh; Intel Mac OS X 10_15_7)..."
        occurred_at:
          type: string
          format: date-time
          description: Timestamp when the event occurred.
          examples:
            - "2025-02-01T10:30:00Z"

    # -------------------------------------------------------------------------
    # Notifications
    # -------------------------------------------------------------------------

    Notification:
      type: object
      description: A notification sent to a user about an event relevant to their work.
      required:
        - id
        - firm_id
        - recipient_id
        - notification_type
        - title
        - is_read
        - delivery_channel
        - created_at
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for this notification.
          examples:
            - "c2d3e4f5-a6b7-8901-cdef-012345678901"
        firm_id:
          type: string
          format: uuid
          description: The firm this notification belongs to.
          examples:
            - "f6a7b8c9-d0e1-2345-fabc-456789012345"
        recipient_id:
          type: string
          format: uuid
          description: The user who should receive this notification.
          examples:
            - "c9d0e1f2-a3b4-5678-cdef-789012345678"
        notification_type:
          $ref: '#/components/schemas/NotificationType'
        title:
          type: string
          description: Short notification title suitable for display in an in-app notification list or email subject.
          examples:
            - "Document Request Submitted: Access Provisioning Logs — Q4 2025"
        body:
          type:
            - string
            - "null"
          description: Optional longer body text for the notification. Null for title-only notifications.
          examples:
            - "Acme Corp has submitted the requested document. Please review and accept or reject it."
        deep_link:
          type:
            - string
            - "null"
          description: Frontend route the user should be taken to when clicking this notification. Null if not applicable.
          examples:
            - "/engagements/e5f6a7b8-c9d0-1234-efab-345678901234/document-requests/f9a0b1c2-d3e4-5678-fabc-789012345678"
        is_read:
          type: boolean
          description: Whether the recipient has read this notification.
          examples:
            - false
        delivery_channel:
          $ref: '#/components/schemas/DeliveryChannel'
        created_at:
          type: string
          format: date-time
          description: Timestamp when this notification was created.
          examples:
            - "2026-01-10T14:22:00Z"

    # -------------------------------------------------------------------------
    # Utility / Mixed Response Schemas
    # -------------------------------------------------------------------------

    ScaffoldSummary:
      type: object
      description: Summary of items scaffolded when creating an engagement from a methodology template.
      required:
        - control_count
        - procedure_count
        - workpaper_count
      properties:
        control_count:
          type: integer
          description: Number of controls created from the template.
          examples:
            - 42
        procedure_count:
          type: integer
          description: Number of test procedures created from the template.
          examples:
            - 118
        workpaper_count:
          type: integer
          description: Number of workpapers created from the template.
          examples:
            - 20

    TransitionGuardFailure:
      type: object
      description: Details of a failed engagement lifecycle transition due to an unmet guard condition.
      required:
        - guard
        - message
      properties:
        guard:
          type: string
          description: Machine-readable identifier for the guard condition that was not met.
          examples:
            - "ALL_CONTROLS_COMPLETE"
        message:
          type: string
          description: Human-readable explanation of why the transition was blocked.
          examples:
            - "2 controls are still in progress. All controls must be Complete or NotApplicable before transitioning to Review."
        blocking_items:
          type: array
          description: Specific items blocking the transition, if applicable.
          items:
            type: object
            required:
              - id
              - description
            properties:
              id:
                type: string
                format: uuid
                description: UUID of the blocking item.
                examples:
                  - "b5c6d7e8-f9a0-1234-bcde-345678901234"
              description:
                type: string
                description: Human-readable description of why this specific item is blocking.
                examples:
                  - "Control 'MFA Enforcement' has status InProgress."

    # -------------------------------------------------------------------------
    # Request Schemas
    # -------------------------------------------------------------------------

    CreateEngagementRequest:
      type: object
      description: Request body for creating a new engagement.
      required:
        - name
        - engagement_type
        - client_id
        - primary_framework_id
        - period_start
        - period_end
        - team_members
      properties:
        name:
          type: string
          description: Human-readable name for the engagement.
          examples:
            - "Acme Corp SOC 2 Type II — FY2025"
        engagement_type:
          $ref: '#/components/schemas/EngagementType'
        client_id:
          type: string
          format: uuid
          description: The client organization to be audited.
          examples:
            - "a7b8c9d0-e1f2-3456-abcd-567890123456"
        primary_framework_id:
          type: string
          format: uuid
          description: The primary framework governing this engagement.
          examples:
            - "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
        period_start:
          type: string
          format: date
          description: Start of the audit period.
          examples:
            - "2025-01-01"
        period_end:
          type: string
          format: date
          description: End of the audit period.
          examples:
            - "2025-12-31"
        methodology_template_id:
          type: string
          format: uuid
          description: Optional methodology template to scaffold controls, procedures, and workpapers from.
          examples:
            - null
        prior_engagement_id:
          type: string
          format: uuid
          description: Optional prior engagement for rollforward context.
          examples:
            - null
        team_members:
          type: array
          description: Initial team member assignments for this engagement.
          minItems: 1
          items:
            type: object
            required:
              - user_id
              - engagement_role
            properties:
              user_id:
                type: string
                format: uuid
                description: The user to assign.
                examples:
                  - "c9d0e1f2-a3b4-5678-cdef-789012345678"
              engagement_role:
                $ref: '#/components/schemas/EngagementRole'
        additional_framework_ids:
          type: array
          description: Optional additional frameworks to associate with this engagement (e.g., for dual-reporting engagements).
          items:
            type: string
            format: uuid

    UpdateEngagementRequest:
      type: object
      description: Request body for updating mutable engagement fields. At least one field must be provided.
      minProperties: 1
      properties:
        name:
          type: string
          description: Updated name for the engagement.
          examples:
            - "Acme Corp SOC 2 Type II — FY2025 (Revised)"
        period_start:
          type: string
          format: date
          description: Updated start of the audit period.
          examples:
            - "2025-01-01"
        period_end:
          type: string
          format: date
          description: Updated end of the audit period.
          examples:
            - "2025-12-31"

    EngagementTransitionRequest:
      type: object
      description: Request body for transitioning an engagement to a new lifecycle status.
      required:
        - target_status
      properties:
        target_status:
          $ref: '#/components/schemas/EngagementStatus'
        reason:
          type: string
          description: Explanation for the transition. Required for reverse transitions (e.g., moving back from Review to Fieldwork).
          examples:
            - "Additional evidence required for CC6.1 before review can proceed."

    AddTeamMemberRequest:
      type: object
      description: Request body for adding a team member to an engagement.
      required:
        - user_id
        - engagement_role
      properties:
        user_id:
          type: string
          format: uuid
          description: The user to add to the engagement team.
          examples:
            - "c9d0e1f2-a3b4-5678-cdef-789012345678"
        engagement_role:
          $ref: '#/components/schemas/EngagementRole'

    AddEngagementFrameworkRequest:
      type: object
      description: Request body for associating an additional framework with an engagement.
      required:
        - framework_id
        - framework_version
      properties:
        framework_id:
          type: string
          format: uuid
          description: The framework to associate.
          examples:
            - "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
        framework_version:
          type: string
          description: The specific version of the framework to use.
          examples:
            - "2017"

    UpdateClientAcceptanceRequest:
      type: object
      description: Request body for updating the client acceptance record. At least one field must be provided.
      minProperties: 1
      properties:
        quality_risks_identified:
          type: object
          description: Updated quality risk assessments.
          examples:
            - {"litigation_history": false, "management_integrity_concerns": false}
        firm_responses:
          type: object
          description: Updated firm responses to identified risks.
          examples:
            - {"litigation_history": "No pending or threatened litigation identified."}
        independence_confirmed:
          type: boolean
          description: Updated independence confirmation status.
          examples:
            - true

    AssignEQRRequest:
      type: object
      description: Request body for assigning an EQR reviewer to an engagement.
      required:
        - reviewer_id
      properties:
        reviewer_id:
          type: string
          format: uuid
          description: The user to assign as the EQR reviewer. Must have the EQReviewer role.
          examples:
            - "a3b4c5d6-e7f8-9012-abcd-123456789012"

    UpdateEQRRequest:
      type: object
      description: Request body for updating an EQR record. At least one field must be provided.
      minProperties: 1
      properties:
        scope_notes:
          type: string
          description: Updated reviewer scope notes.
          examples:
            - "Focused on CC6.x and CC7.x criteria given prior year findings."
        conclusion:
          $ref: '#/components/schemas/EQRConclusion'

    CreateEQRFindingRequest:
      type: object
      description: Request body for raising a new EQR finding.
      required:
        - description
        - severity
      properties:
        description:
          type: string
          description: Detailed description of the finding.
          examples:
            - "Test procedure for CC6.1 lacks sufficient documentation of the sample selection rationale."
        severity:
          $ref: '#/components/schemas/FindingSeverity'

    UpdateEQRFindingRequest:
      type: object
      description: Request body for updating an EQR finding. At least one field must be provided.
      minProperties: 1
      properties:
        description:
          type: string
          description: Updated finding description.
          examples:
            - "Test procedure for CC6.1 lacks documentation of sample selection rationale and exception resolution."
        severity:
          $ref: '#/components/schemas/FindingSeverity'

    RespondToEQRFindingRequest:
      type: object
      description: Request body for the engagement team to submit a response to an EQR finding.
      required:
        - team_response
      properties:
        team_response:
          type: string
          description: The engagement team's written response addressing the finding.
          examples:
            - "Updated workpaper to include full sample selection rationale and documented resolution of identified exception."

    UpdateControlRequest:
      type: object
      description: Request body for updating mutable control fields. At least one field must be provided.
      minProperties: 1
      properties:
        auditor_assigned_to_id:
          type:
            - string
            - "null"
          format: uuid
          description: The auditor to assign to this control. Pass null to unassign.
          examples:
            - "c9d0e1f2-a3b4-5678-cdef-789012345678"
        control_owner_id:
          type:
            - string
            - "null"
          format: uuid
          description: The client-side control owner. Pass null to unassign.
          examples:
            - null
        status:
          $ref: '#/components/schemas/ControlStatus'
        description:
          type: string
          description: Updated description of the control.
          examples:
            - "Multi-factor authentication is required for all privileged and user accounts accessing production systems."

    UpdateTestProcedureRequest:
      type: object
      description: Request body for updating test procedure fields. At least one field must be provided.
      minProperties: 1
      properties:
        status:
          $ref: '#/components/schemas/ProcedureStatus'
        result:
          type: string
          description: The auditor's documented result of performing the procedure.
          examples:
            - "Inspected 25 of 1,250 access provisioning tickets. All 25 tickets confirmed MFA was enabled prior to access grant."
        exceptions_noted:
          type:
            - string
            - "null"
          description: Description of exceptions found. Pass null to clear.
          examples:
            - null
        conclusion:
          type: string
          description: The auditor's conclusion drawn from the results.
          examples:
            - "The control is operating effectively. No exceptions were noted."
        population_size:
          type: integer
          description: Total population size.
          examples:
            - 1250
        sample_size:
          type: integer
          description: Sample size selected for testing.
          examples:
            - 25
        sampling_method:
          $ref: '#/components/schemas/SamplingMethod'
        performed_by_id:
          type:
            - string
            - "null"
          format: uuid
          description: The auditor who performed this procedure. Pass null to clear.
          examples:
            - "c9d0e1f2-a3b4-5678-cdef-789012345678"
        reviewed_by_id:
          type:
            - string
            - "null"
          format: uuid
          description: The auditor who reviewed this procedure. Pass null to clear.
          examples:
            - null

    CreateEvidenceLinkRequest:
      type: object
      description: Request body for linking an evidence item to a test procedure.
      required:
        - evidence_item_id
        - test_procedure_id
      properties:
        evidence_item_id:
          type: string
          format: uuid
          description: The evidence item to link.
          examples:
            - "d7e8f9a0-b1c2-3456-defa-567890123456"
        test_procedure_id:
          type: string
          format: uuid
          description: The test procedure this evidence supports.
          examples:
            - "c6d7e8f9-a0b1-2345-cdef-456789012345"
        notes:
          type: string
          description: Optional notes explaining the relevance of this evidence to the procedure.
          examples:
            - "Pages 4-7 contain the access provisioning log for the full sample period."
        ai_suggested:
          type: boolean
          description: Whether this link was originally suggested by AI. Defaults to false.
          default: false
          examples:
            - false
        ai_decision_id:
          type: string
          format: uuid
          description: The AI decision that produced this suggestion, if ai_suggested is true.
          examples:
            - null

    CreateDocumentRequestRequest:
      type: object
      description: Request body for creating a new document request to send to the client.
      required:
        - title
        - instructions
      properties:
        title:
          type: string
          description: Short title describing what is being requested.
          examples:
            - "Access Provisioning Logs — Q4 2025"
        instructions:
          type: string
          description: Detailed instructions for the client on what to provide.
          examples:
            - "Please provide all access provisioning records for October 1 through December 31, 2025."
        due_date:
          type: string
          format: date
          description: Optional deadline for the client to submit the document.
          examples:
            - "2026-01-31"
        control_id:
          type: string
          format: uuid
          description: Optional control this request relates to.
          examples:
            - "b5c6d7e8-f9a0-1234-bcde-345678901234"
        test_procedure_id:
          type: string
          format: uuid
          description: Optional specific test procedure this request will fulfill.
          examples:
            - null
        assigned_to_id:
          type: string
          format: uuid
          description: Optional client user to assign responsibility for this request.
          examples:
            - null

    BulkCreateDocumentRequestsRequest:
      type: object
      description: Request body for bulk-creating document requests from a methodology template.
      required:
        - methodology_template_id
      properties:
        methodology_template_id:
          type: string
          format: uuid
          description: The methodology template from which to generate document requests.
          examples:
            - "a1b2c3d4-e5f6-7890-abcd-ef1234567890"

    UpdateDocumentRequestRequest:
      type: object
      description: Request body for updating a document request. At least one field must be provided.
      minProperties: 1
      properties:
        title:
          type: string
          description: Updated title for the request.
          examples:
            - "Access Provisioning Logs — Q4 2025 (Updated)"
        instructions:
          type: string
          description: Updated instructions for the client.
          examples:
            - "Please provide all access provisioning records for October 1 through December 31, 2025, including the approver for each request."
        due_date:
          type:
            - string
            - "null"
          format: date
          description: Updated deadline. Pass null to remove the deadline.
          examples:
            - "2026-02-14"
        assigned_to_id:
          type:
            - string
            - "null"
          format: uuid
          description: Updated client user assignment. Pass null to unassign.
          examples:
            - null

    RejectDocumentRequestRequest:
      type: object
      description: Request body for rejecting a submitted document request.
      required:
        - reason
      properties:
        reason:
          type: string
          description: Explanation of why the submission was rejected and what the client needs to resubmit.
          examples:
            - "The log provided only covers November and December. Please resubmit with October records included."

    CreateClientHubTokenRequest:
      type: object
      description: Request body for generating a new Client Hub access token.
      required:
        - client_id
      properties:
        client_id:
          type: string
          format: uuid
          description: The client organization to generate the token for.
          examples:
            - "a7b8c9d0-e1f2-3456-abcd-567890123456"

    DelegateDocumentRequestRequest:
      type: object
      description: Request body for a client to delegate a document request to a third party via email.
      required:
        - token
        - delegate_email
      properties:
        token:
          type: string
          description: The client's hub token proving they are authorized to delegate this request.
          examples:
            - "abc123xyz"
        delegate_email:
          type: string
          format: email
          description: Email address of the person to whom the request is being delegated.
          examples:
            - "it-compliance@acme.com"
        custom_message:
          type: string
          description: Optional personal message to include in the delegation email.
          examples:
            - "Hi team, please upload the Q4 2025 access logs for our SOC 2 audit."

    ReviewAIDecisionRequest:
      type: object
      description: Request body for a human reviewer to accept, modify, or reject an AI decision.
      required:
        - review_action
      properties:
        review_action:
          type: string
          description: The reviewer's disposition of the AI suggestion.
          enum:
            - Accepted
            - Modified
            - Rejected
          examples:
            - Accepted
        accepted_value:
          type: string
          description: The value to apply. Required when review_action is Modified; optional for Accepted (defaults to suggested_value if omitted).
          examples:
            - "CC6.1"

    CreateAIDecisionInternalRequest:
      type: object
      description: |
        Request body for cross-module AI decision creation. Used by the trial balance,
        workpaper, and reporting modules to persist AI decision records in axiom_db
        after executing AI features.
      required:
        - firm_id
        - context_type
        - context_id
        - context_table
        - model_id
        - raw_output
      properties:
        firm_id:
          type: string
          format: uuid
          description: UUID of the firm this decision belongs to.
        engagement_id:
          type:
            - string
            - "null"
          format: uuid
          description: UUID of the engagement. Null for firm-level decisions.
        context_type:
          $ref: '#/components/schemas/AIContextType'
        context_id:
          type: string
          format: uuid
          description: UUID of the entity being analyzed (e.g., trial_balance_account, workpaper, report).
        context_table:
          type: string
          description: Database table name of the entity identified by context_id.
          examples:
            - trial_balance_accounts
            - workpapers
            - reports
        model_id:
          type: string
          description: Bedrock model identifier used for inference.
          examples:
            - "anthropic.claude-haiku-4-5"
        input_token_count:
          type:
            - integer
            - "null"
          description: Token count for the input prompt.
        output_token_count:
          type:
            - integer
            - "null"
          description: Token count for the model output.
        raw_output:
          type: object
          description: Complete structured model output for audit trail.
        suggested_value:
          type:
            - string
            - "null"
          description: Primary suggested value extracted from model output.
        confidence:
          type:
            - number
            - "null"
          minimum: 0
          maximum: 1
          description: Model confidence score (0.0–1.0).
        explanation:
          type:
            - string
            - "null"
          description: Human-readable explanation of the suggestion.

