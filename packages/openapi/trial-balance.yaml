openapi: 3.1.0

info:
  title: Axiom Trial Balance Service
  version: 1.0.0
  description: |
    Manages trial balance import, account mapping, adjustments, analytics, and population
    analysis for financial audit engagements.

    ## Authentication

    All requests must include the headers `X-User-Id`, `X-Firm-Id`, and `X-User-Role`, which
    are injected by the API Gateway after verifying the caller's JWT. Requests missing these
    headers are rejected with `401 Unauthorized`.

    ## Engagement Access

    `engagement_id` is a plain UUID with no foreign key to `core_db`. Engagement-level access
    is validated at request time via a REST call to Audit Core.

    ## Conventions

    - Monetary values are returned as strings with four decimal places to avoid floating-point
      loss (e.g., `"12345.6789"`). Consumers must treat these as decimal numbers.
    - All timestamps are ISO 8601 in UTC (e.g., `"2025-06-01T12:00:00Z"`).
    - Cursor-based pagination is used on list endpoints that may return large datasets.

servers:
  - url: /api/v1
    description: Trial Balance Service (routed from API Gateway)

tags:
  - name: TrialBalances
    description: Import and manage trial balances within an engagement.
  - name: TrialBalanceAccounts
    description: View and map accounts within a trial balance.
  - name: TrialBalanceAdjustments
    description: Propose, review, and approve audit adjustments.
  - name: Analytics
    description: |
      SQL-computed analytical views of trial balance data. All aggregations are performed
      directly in PostgreSQL — no application-layer computation.
  - name: PopulationAnalysis
    description: |
      Statistical population analysis for audit sampling. Supports Systematic, Random, and
      Monetary Unit Sampling (MUS) methods, Benford's Law distribution testing, sequence gap
      testing, and duplicate detection.
  - name: ColumnMappingProfiles
    description: Reusable column mapping profiles for CSV/XLSX import, scoped to a firm.

paths:

  # ---------------------------------------------------------------------------
  # Trial Balances
  # ---------------------------------------------------------------------------

  /engagements/{engagementId}/trial-balances:
    parameters:
      - $ref: './common.yaml#/components/parameters/X-User-Id'
      - $ref: './common.yaml#/components/parameters/X-Firm-Id'
      - $ref: './common.yaml#/components/parameters/X-User-Role'
      - name: engagementId
        in: path
        required: true
        description: UUID of the engagement. Access is validated against Audit Core.
        schema:
          type: string
          format: uuid

    get:
      operationId: listTrialBalances
      summary: List trial balances for an engagement
      description: |
        Returns all trial balances associated with the given engagement. Result sets are
        expected to be small (typically 1–3 per engagement) so this endpoint is not paginated.

        **Role access:** FirmAdmin, Partner, Manager, Staff, EQReviewer, ViewOnly.
      tags:
        - TrialBalances
      responses:
        '200':
          description: Trial balances retrieved successfully.
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/TrialBalance'
        '400':
          $ref: './common.yaml#/components/responses/BadRequest'
        '401':
          $ref: './common.yaml#/components/responses/Unauthorized'
        '403':
          $ref: './common.yaml#/components/responses/Forbidden'
        '404':
          $ref: './common.yaml#/components/responses/NotFound'
        '500':
          $ref: './common.yaml#/components/responses/InternalServerError'

    post:
      operationId: importTrialBalance
      summary: Import a trial balance
      description: |
        Imports a CSV or XLSX file as a new trial balance for the engagement. The service
        parses the file, applies the specified column mappings (or profile), and creates
        `trial_balance_accounts` rows. An import summary is returned immediately.

        **Accepted file formats:** `text/csv`, `application/vnd.openxmlformats-officedocument.spreadsheetml.sheet`

        **Role access:** FirmAdmin, Partner, Manager, Staff.
      tags:
        - TrialBalances
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
                - period_date
                - import_source
              properties:
                file:
                  type: string
                  format: binary
                  description: The CSV or XLSX trial balance file to import.
                period_date:
                  type: string
                  format: date
                  description: |
                    The balance-sheet date this trial balance represents (e.g., `2024-12-31`).
                import_source:
                  type: string
                  description: |
                    Free-text label identifying the originating accounting system or export
                    (e.g., `"QuickBooks Online"`, `"Sage 50"`).
                  maxLength: 255
                column_mapping_profile_id:
                  type: string
                  format: uuid
                  description: |
                    Optional. UUID of a saved `ColumnMappingProfile` to apply during import.
                    If omitted, the service expects standard column headers or will create
                    accounts with `mapping_status: Unmapped`.
            encoding:
              file:
                contentType: text/csv, application/vnd.openxmlformats-officedocument.spreadsheetml.sheet
      responses:
        '201':
          description: Trial balance imported successfully.
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    $ref: '#/components/schemas/TrialBalanceImportResult'
        '400':
          $ref: './common.yaml#/components/responses/BadRequest'
        '401':
          $ref: './common.yaml#/components/responses/Unauthorized'
        '403':
          $ref: './common.yaml#/components/responses/Forbidden'
        '404':
          $ref: './common.yaml#/components/responses/NotFound'
        '422':
          $ref: './common.yaml#/components/responses/UnprocessableEntity'
        '500':
          $ref: './common.yaml#/components/responses/InternalServerError'

  /trial-balances/{trialBalanceId}:
    parameters:
      - $ref: './common.yaml#/components/parameters/X-User-Id'
      - $ref: './common.yaml#/components/parameters/X-Firm-Id'
      - $ref: './common.yaml#/components/parameters/X-User-Role'
      - name: trialBalanceId
        in: path
        required: true
        description: UUID of the trial balance.
        schema:
          type: string
          format: uuid

    get:
      operationId: getTrialBalance
      summary: Get a trial balance with summary statistics
      description: |
        Returns the trial balance record along with aggregate summary statistics (total debits,
        total credits, net difference, account count, mapping progress).

        **Role access:** FirmAdmin, Partner, Manager, Staff, EQReviewer, ViewOnly.
      tags:
        - TrialBalances
      responses:
        '200':
          description: Trial balance retrieved successfully.
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    $ref: '#/components/schemas/TrialBalanceDetail'
        '401':
          $ref: './common.yaml#/components/responses/Unauthorized'
        '403':
          $ref: './common.yaml#/components/responses/Forbidden'
        '404':
          $ref: './common.yaml#/components/responses/NotFound'
        '500':
          $ref: './common.yaml#/components/responses/InternalServerError'

    delete:
      operationId: deleteTrialBalance
      summary: Delete a trial balance
      description: |
        Permanently deletes a trial balance and all associated accounts and unapproved
        adjustments. Deletion is rejected if any account has `mapping_status: Confirmed` or
        `Overridden`, or if any adjustment has `adjustment_type: Passed`.

        **Role access:** FirmAdmin, Partner, Manager.
      tags:
        - TrialBalances
      responses:
        '204':
          description: Trial balance deleted successfully.
        '401':
          $ref: './common.yaml#/components/responses/Unauthorized'
        '403':
          $ref: './common.yaml#/components/responses/Forbidden'
        '404':
          $ref: './common.yaml#/components/responses/NotFound'
        '422':
          $ref: './common.yaml#/components/responses/UnprocessableEntity'
        '500':
          $ref: './common.yaml#/components/responses/InternalServerError'

  # ---------------------------------------------------------------------------
  # Trial Balance Accounts
  # ---------------------------------------------------------------------------

  /trial-balances/{trialBalanceId}/accounts:
    parameters:
      - $ref: './common.yaml#/components/parameters/X-User-Id'
      - $ref: './common.yaml#/components/parameters/X-Firm-Id'
      - $ref: './common.yaml#/components/parameters/X-User-Role'
      - name: trialBalanceId
        in: path
        required: true
        description: UUID of the trial balance.
        schema:
          type: string
          format: uuid

    get:
      operationId: listTrialBalanceAccounts
      summary: List accounts in a trial balance
      description: |
        Returns a paginated list of accounts. Supports filtering by account type and mapping
        status, free-text search across `account_number` and `account_name`, and sorting.

        **Role access:** FirmAdmin, Partner, Manager, Staff, EQReviewer, ViewOnly.
      tags:
        - TrialBalanceAccounts
      parameters:
        - name: account_type
          in: query
          required: false
          description: Filter by account type.
          schema:
            $ref: '#/components/schemas/AccountType'
        - name: mapping_status
          in: query
          required: false
          description: Filter by mapping status.
          schema:
            $ref: '#/components/schemas/MappingStatus'
        - name: search
          in: query
          required: false
          description: |
            Free-text search. Matches against `account_number` and `account_name`
            (case-insensitive prefix or substring match).
          schema:
            type: string
            maxLength: 255
        - name: sort_by
          in: query
          required: false
          description: Field to sort by.
          schema:
            type: string
            enum:
              - account_number
              - account_name
              - net_balance
            default: account_number
        - name: sort_order
          in: query
          required: false
          description: Sort direction.
          schema:
            type: string
            enum:
              - asc
              - desc
            default: asc
        - $ref: './common.yaml#/components/parameters/CursorParam'
        - $ref: './common.yaml#/components/parameters/LimitParam'
      responses:
        '200':
          description: Accounts retrieved successfully.
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                  - pagination
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/TrialBalanceAccount'
                  pagination:
                    $ref: './common.yaml#/components/schemas/Pagination'
        '400':
          $ref: './common.yaml#/components/responses/BadRequest'
        '401':
          $ref: './common.yaml#/components/responses/Unauthorized'
        '403':
          $ref: './common.yaml#/components/responses/Forbidden'
        '404':
          $ref: './common.yaml#/components/responses/NotFound'
        '500':
          $ref: './common.yaml#/components/responses/InternalServerError'

  /trial-balances/{trialBalanceId}/accounts/{accountId}:
    parameters:
      - $ref: './common.yaml#/components/parameters/X-User-Id'
      - $ref: './common.yaml#/components/parameters/X-Firm-Id'
      - $ref: './common.yaml#/components/parameters/X-User-Role'
      - name: trialBalanceId
        in: path
        required: true
        description: UUID of the trial balance.
        schema:
          type: string
          format: uuid
      - name: accountId
        in: path
        required: true
        description: UUID of the account.
        schema:
          type: string
          format: uuid

    get:
      operationId: getTrialBalanceAccount
      summary: Get an account with adjustments and adjusted balance
      description: |
        Returns the account record including all related adjustments and a computed
        `adjusted_balance` (net_balance plus the sum of all `Passed` adjustments).

        **Role access:** FirmAdmin, Partner, Manager, Staff, EQReviewer, ViewOnly.
      tags:
        - TrialBalanceAccounts
      responses:
        '200':
          description: Account retrieved successfully.
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    $ref: '#/components/schemas/TrialBalanceAccountDetail'
        '401':
          $ref: './common.yaml#/components/responses/Unauthorized'
        '403':
          $ref: './common.yaml#/components/responses/Forbidden'
        '404':
          $ref: './common.yaml#/components/responses/NotFound'
        '500':
          $ref: './common.yaml#/components/responses/InternalServerError'

    patch:
      operationId: updateTrialBalanceAccount
      summary: Update an account's FS line item mapping
      description: |
        Partially updates the account's `mapped_fs_line_item` and/or `mapping_status`.
        Setting `mapping_status` to `Confirmed` or `Overridden` records `confirmed_by_id`
        and `confirmed_at` from the request headers.

        **Role access:** FirmAdmin, Partner, Manager, Staff.
      tags:
        - TrialBalanceAccounts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTrialBalanceAccountRequest'
      responses:
        '200':
          description: Account updated successfully.
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    $ref: '#/components/schemas/TrialBalanceAccount'
        '400':
          $ref: './common.yaml#/components/responses/BadRequest'
        '401':
          $ref: './common.yaml#/components/responses/Unauthorized'
        '403':
          $ref: './common.yaml#/components/responses/Forbidden'
        '404':
          $ref: './common.yaml#/components/responses/NotFound'
        '422':
          $ref: './common.yaml#/components/responses/UnprocessableEntity'
        '500':
          $ref: './common.yaml#/components/responses/InternalServerError'

  /trial-balances/{trialBalanceId}/accounts/bulk-confirm:
    parameters:
      - $ref: './common.yaml#/components/parameters/X-User-Id'
      - $ref: './common.yaml#/components/parameters/X-Firm-Id'
      - $ref: './common.yaml#/components/parameters/X-User-Role'
      - name: trialBalanceId
        in: path
        required: true
        description: UUID of the trial balance.
        schema:
          type: string
          format: uuid

    post:
      operationId: bulkConfirmAIMappings
      summary: Bulk confirm AI-suggested mappings
      description: |
        Confirms AI-suggested mappings (`mapping_status: AISuggested`) in bulk. The caller
        must supply either an explicit list of `account_ids` OR a `min_confidence` threshold;
        providing both or neither is a validation error.

        When `min_confidence` is used, all `AISuggested` accounts whose `ai_confidence`
        meets or exceeds the threshold are confirmed.

        `confirmed_by_id` and `confirmed_at` are set from the gateway-injected headers.

        **Role access:** FirmAdmin, Partner, Manager, Staff.
      tags:
        - TrialBalanceAccounts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkConfirmRequest'
      responses:
        '200':
          description: Bulk confirm completed.
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    type: object
                    required:
                      - confirmed_count
                    properties:
                      confirmed_count:
                        type: integer
                        description: Number of accounts whose mapping was confirmed.
                        examples:
                          - 47
        '400':
          $ref: './common.yaml#/components/responses/BadRequest'
        '401':
          $ref: './common.yaml#/components/responses/Unauthorized'
        '403':
          $ref: './common.yaml#/components/responses/Forbidden'
        '404':
          $ref: './common.yaml#/components/responses/NotFound'
        '422':
          $ref: './common.yaml#/components/responses/UnprocessableEntity'
        '500':
          $ref: './common.yaml#/components/responses/InternalServerError'

  # ---------------------------------------------------------------------------
  # Trial Balance Adjustments
  # ---------------------------------------------------------------------------

  /trial-balances/{trialBalanceId}/adjustments:
    parameters:
      - $ref: './common.yaml#/components/parameters/X-User-Id'
      - $ref: './common.yaml#/components/parameters/X-Firm-Id'
      - $ref: './common.yaml#/components/parameters/X-User-Role'
      - name: trialBalanceId
        in: path
        required: true
        description: UUID of the trial balance.
        schema:
          type: string
          format: uuid

    get:
      operationId: listAdjustments
      summary: List adjustments for a trial balance
      description: |
        Returns a paginated list of adjustments. Supports filtering by adjustment type and
        account. Adjustments cannot be deleted — the full history is always available.

        **Role access:** FirmAdmin, Partner, Manager, Staff, EQReviewer, ViewOnly.
      tags:
        - TrialBalanceAdjustments
      parameters:
        - name: adjustment_type
          in: query
          required: false
          description: Filter by adjustment type.
          schema:
            $ref: '#/components/schemas/AdjustmentType'
        - name: account_id
          in: query
          required: false
          description: Filter to adjustments affecting a specific account UUID.
          schema:
            type: string
            format: uuid
        - $ref: './common.yaml#/components/parameters/CursorParam'
        - $ref: './common.yaml#/components/parameters/LimitParam'
      responses:
        '200':
          description: Adjustments retrieved successfully.
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                  - pagination
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Adjustment'
                  pagination:
                    $ref: './common.yaml#/components/schemas/Pagination'
        '400':
          $ref: './common.yaml#/components/responses/BadRequest'
        '401':
          $ref: './common.yaml#/components/responses/Unauthorized'
        '403':
          $ref: './common.yaml#/components/responses/Forbidden'
        '404':
          $ref: './common.yaml#/components/responses/NotFound'
        '500':
          $ref: './common.yaml#/components/responses/InternalServerError'

    post:
      operationId: createAdjustment
      summary: Propose a new adjustment
      description: |
        Creates a new adjustment against an account in the trial balance.
        `waiver_reason` is required when `adjustment_type` is `Waived`.
        `proposed_by_id` and `proposed_at` are set server-side from the gateway headers and
        current timestamp.

        **Role access:** FirmAdmin, Partner, Manager, Staff.
      tags:
        - TrialBalanceAdjustments
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAdjustmentRequest'
      responses:
        '201':
          description: Adjustment created successfully.
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    $ref: '#/components/schemas/Adjustment'
        '400':
          $ref: './common.yaml#/components/responses/BadRequest'
        '401':
          $ref: './common.yaml#/components/responses/Unauthorized'
        '403':
          $ref: './common.yaml#/components/responses/Forbidden'
        '404':
          $ref: './common.yaml#/components/responses/NotFound'
        '422':
          $ref: './common.yaml#/components/responses/UnprocessableEntity'
        '500':
          $ref: './common.yaml#/components/responses/InternalServerError'

  /trial-balances/{trialBalanceId}/adjustments/{adjustmentId}:
    parameters:
      - $ref: './common.yaml#/components/parameters/X-User-Id'
      - $ref: './common.yaml#/components/parameters/X-Firm-Id'
      - $ref: './common.yaml#/components/parameters/X-User-Role'
      - name: trialBalanceId
        in: path
        required: true
        description: UUID of the trial balance.
        schema:
          type: string
          format: uuid
      - name: adjustmentId
        in: path
        required: true
        description: UUID of the adjustment.
        schema:
          type: string
          format: uuid

    get:
      operationId: getAdjustment
      summary: Get an adjustment
      description: |
        Returns the full adjustment record including approval metadata.

        **Role access:** FirmAdmin, Partner, Manager, Staff, EQReviewer, ViewOnly.
      tags:
        - TrialBalanceAdjustments
      responses:
        '200':
          description: Adjustment retrieved successfully.
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    $ref: '#/components/schemas/Adjustment'
        '401':
          $ref: './common.yaml#/components/responses/Unauthorized'
        '403':
          $ref: './common.yaml#/components/responses/Forbidden'
        '404':
          $ref: './common.yaml#/components/responses/NotFound'
        '500':
          $ref: './common.yaml#/components/responses/InternalServerError'

    patch:
      operationId: updateAdjustment
      summary: Update a proposed adjustment
      description: |
        Partially updates an adjustment's `amount`, `description`, `adjustment_type`, or
        `waiver_reason`. Updates are only permitted while `adjustment_type` is `Proposed`
        (i.e., before it has been approved/passed). Attempting to update a `Passed` or
        `Waived` adjustment returns `422`.

        **Role access:** FirmAdmin, Partner, Manager, Staff (proposer only, or Manager+).
      tags:
        - TrialBalanceAdjustments
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAdjustmentRequest'
      responses:
        '200':
          description: Adjustment updated successfully.
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    $ref: '#/components/schemas/Adjustment'
        '400':
          $ref: './common.yaml#/components/responses/BadRequest'
        '401':
          $ref: './common.yaml#/components/responses/Unauthorized'
        '403':
          $ref: './common.yaml#/components/responses/Forbidden'
        '404':
          $ref: './common.yaml#/components/responses/NotFound'
        '422':
          $ref: './common.yaml#/components/responses/UnprocessableEntity'
        '500':
          $ref: './common.yaml#/components/responses/InternalServerError'

  /trial-balances/{trialBalanceId}/adjustments/{adjustmentId}/approve:
    parameters:
      - $ref: './common.yaml#/components/parameters/X-User-Id'
      - $ref: './common.yaml#/components/parameters/X-Firm-Id'
      - $ref: './common.yaml#/components/parameters/X-User-Role'
      - name: trialBalanceId
        in: path
        required: true
        description: UUID of the trial balance.
        schema:
          type: string
          format: uuid
      - name: adjustmentId
        in: path
        required: true
        description: UUID of the adjustment.
        schema:
          type: string
          format: uuid

    post:
      operationId: approveAdjustment
      summary: Approve a proposed adjustment
      description: |
        Transitions an adjustment from `Proposed` to `Passed` (or confirms a `Waived`
        decision). Sets `approved_by_id` from `X-User-Id` and `approved_at` to the current
        timestamp. A user may not approve their own adjustment.

        **Role access:** Partner, Manager.
      tags:
        - TrialBalanceAdjustments
      responses:
        '200':
          description: Adjustment approved successfully.
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    $ref: '#/components/schemas/Adjustment'
        '401':
          $ref: './common.yaml#/components/responses/Unauthorized'
        '403':
          $ref: './common.yaml#/components/responses/Forbidden'
        '404':
          $ref: './common.yaml#/components/responses/NotFound'
        '409':
          $ref: './common.yaml#/components/responses/Conflict'
        '422':
          $ref: './common.yaml#/components/responses/UnprocessableEntity'
        '500':
          $ref: './common.yaml#/components/responses/InternalServerError'

  # ---------------------------------------------------------------------------
  # Analytics
  # ---------------------------------------------------------------------------

  /trial-balances/{trialBalanceId}/analytics/summary:
    parameters:
      - $ref: './common.yaml#/components/parameters/X-User-Id'
      - $ref: './common.yaml#/components/parameters/X-Firm-Id'
      - $ref: './common.yaml#/components/parameters/X-User-Role'
      - name: trialBalanceId
        in: path
        required: true
        description: UUID of the trial balance.
        schema:
          type: string
          format: uuid

    get:
      operationId: getAnalyticsSummary
      summary: Get aggregated trial balance summary
      description: |
        Returns a SQL-computed summary of the trial balance: totals broken down by account
        type, overall debit and credit totals, net difference, and the aggregate impact of
        all `Passed` adjustments. No application-layer computation is performed.

        **Role access:** FirmAdmin, Partner, Manager, Staff, EQReviewer, ViewOnly.
      tags:
        - Analytics
      responses:
        '200':
          description: Summary retrieved successfully.
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    $ref: '#/components/schemas/AnalyticsSummary'
        '401':
          $ref: './common.yaml#/components/responses/Unauthorized'
        '403':
          $ref: './common.yaml#/components/responses/Forbidden'
        '404':
          $ref: './common.yaml#/components/responses/NotFound'
        '500':
          $ref: './common.yaml#/components/responses/InternalServerError'

  /trial-balances/{trialBalanceId}/analytics/lead-schedules:
    parameters:
      - $ref: './common.yaml#/components/parameters/X-User-Id'
      - $ref: './common.yaml#/components/parameters/X-Firm-Id'
      - $ref: './common.yaml#/components/parameters/X-User-Role'
      - name: trialBalanceId
        in: path
        required: true
        description: UUID of the trial balance.
        schema:
          type: string
          format: uuid

    get:
      operationId: getLeadSchedules
      summary: Get lead schedules grouped by FS line item
      description: |
        Returns SQL-computed lead schedules: accounts grouped by their `mapped_fs_line_item`,
        with subtotals per group. Only accounts with `mapping_status` of `Confirmed` or
        `Overridden` appear in lead schedule groups. Unmapped accounts are listed separately.
        No application-layer computation is performed.

        **Role access:** FirmAdmin, Partner, Manager, Staff, EQReviewer, ViewOnly.
      tags:
        - Analytics
      responses:
        '200':
          description: Lead schedules retrieved successfully.
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/LeadScheduleSection'
        '401':
          $ref: './common.yaml#/components/responses/Unauthorized'
        '403':
          $ref: './common.yaml#/components/responses/Forbidden'
        '404':
          $ref: './common.yaml#/components/responses/NotFound'
        '500':
          $ref: './common.yaml#/components/responses/InternalServerError'

  /trial-balances/{trialBalanceId}/analytics/variance:
    parameters:
      - $ref: './common.yaml#/components/parameters/X-User-Id'
      - $ref: './common.yaml#/components/parameters/X-Firm-Id'
      - $ref: './common.yaml#/components/parameters/X-User-Role'
      - name: trialBalanceId
        in: path
        required: true
        description: UUID of the current-period trial balance.
        schema:
          type: string
          format: uuid

    get:
      operationId: getVarianceAnalysis
      summary: Get period-over-period variance analysis
      description: |
        Returns a SQL-computed account-by-account variance between the current trial balance
        and a prior-period trial balance. Accounts are matched by `account_number`. Accounts
        present in only one period are included with null values for the absent period.
        No application-layer computation is performed.

        **Role access:** FirmAdmin, Partner, Manager, Staff, EQReviewer, ViewOnly.
      tags:
        - Analytics
      parameters:
        - name: prior_trial_balance_id
          in: query
          required: true
          description: UUID of the prior-period trial balance to compare against.
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Variance analysis retrieved successfully.
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/VarianceRow'
        '400':
          $ref: './common.yaml#/components/responses/BadRequest'
        '401':
          $ref: './common.yaml#/components/responses/Unauthorized'
        '403':
          $ref: './common.yaml#/components/responses/Forbidden'
        '404':
          $ref: './common.yaml#/components/responses/NotFound'
        '500':
          $ref: './common.yaml#/components/responses/InternalServerError'

  /trial-balances/{trialBalanceId}/analytics/ratios:
    parameters:
      - $ref: './common.yaml#/components/parameters/X-User-Id'
      - $ref: './common.yaml#/components/parameters/X-Firm-Id'
      - $ref: './common.yaml#/components/parameters/X-User-Role'
      - name: trialBalanceId
        in: path
        required: true
        description: UUID of the trial balance.
        schema:
          type: string
          format: uuid

    get:
      operationId: getFinancialRatios
      summary: Get computed financial ratios
      description: |
        Returns SQL-computed financial ratios derived from the trial balance balances (e.g.,
        current ratio, debt-to-equity, gross margin). Ratios require that sufficient accounts
        be mapped to standard FS line items; unmapped accounts are excluded from ratio
        calculations. No application-layer computation is performed.

        **Role access:** FirmAdmin, Partner, Manager, Staff, EQReviewer, ViewOnly.
      tags:
        - Analytics
      responses:
        '200':
          description: Financial ratios retrieved successfully.
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    $ref: '#/components/schemas/FinancialRatios'
        '401':
          $ref: './common.yaml#/components/responses/Unauthorized'
        '403':
          $ref: './common.yaml#/components/responses/Forbidden'
        '404':
          $ref: './common.yaml#/components/responses/NotFound'
        '500':
          $ref: './common.yaml#/components/responses/InternalServerError'

  /trial-balances/{trialBalanceId}/analytics/anomalies:
    parameters:
      - $ref: './common.yaml#/components/parameters/X-User-Id'
      - $ref: './common.yaml#/components/parameters/X-Firm-Id'
      - $ref: './common.yaml#/components/parameters/X-User-Role'
      - name: trialBalanceId
        in: path
        required: true
        description: UUID of the trial balance.
        schema:
          type: string
          format: uuid

    get:
      operationId: getAnomalies
      summary: Get AI-flagged account anomalies
      description: |
        Returns anomalies flagged by the AI anomaly detection job (AWS Bedrock, Claude Haiku).
        Anomalies are computed by a nightly River background job and on initial TB import.

        **PCAOB tier behavior:** For nonissuer engagements, anomaly flags are informational
        (Tier 1) — no `AIDecision` record is created. For PCAOB engagements (`FinancialAudit_Public`),
        each flag creates an `AIDecision` record in core_db via internal REST call (Tier 2),
        and the auditor must document their investigation response. The `ai_decision_id` field
        on each anomaly record is populated only for PCAOB engagements.

        **Role access:** FirmAdmin, Partner, Manager, Staff, EQReviewer, ViewOnly.
      tags:
        - Analytics
      responses:
        '200':
          description: Anomalies retrieved successfully.
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/AnomalyRecord'
        '401':
          $ref: './common.yaml#/components/responses/Unauthorized'
        '403':
          $ref: './common.yaml#/components/responses/Forbidden'
        '404':
          $ref: './common.yaml#/components/responses/NotFound'
        '500':
          $ref: './common.yaml#/components/responses/InternalServerError'

  # ---------------------------------------------------------------------------
  # Population Analysis
  # ---------------------------------------------------------------------------

  /trial-balances/{trialBalanceId}/population:
    parameters:
      - $ref: './common.yaml#/components/parameters/X-User-Id'
      - $ref: './common.yaml#/components/parameters/X-Firm-Id'
      - $ref: './common.yaml#/components/parameters/X-User-Role'
      - name: trialBalanceId
        in: path
        required: true
        description: UUID of the trial balance.
        schema:
          type: string
          format: uuid

    get:
      operationId: listPopulation
      summary: List population data for audit sampling
      description: |
        Returns the full population of accounts available for statistical sampling, with
        optional filters for account type and balance range. Use the sample endpoint to
        compute a statistically valid sample from this population.

        **Role access:** FirmAdmin, Partner, Manager, Staff, EQReviewer.
      tags:
        - PopulationAnalysis
      parameters:
        - name: account_type
          in: query
          required: false
          description: Filter population to a specific account type.
          schema:
            $ref: '#/components/schemas/AccountType'
        - name: min_amount
          in: query
          required: false
          description: Minimum absolute net_balance to include (inclusive).
          schema:
            type: string
            pattern: '^-?\d+(\.\d{1,4})?$'
            examples:
              - '1000.0000'
        - name: max_amount
          in: query
          required: false
          description: Maximum absolute net_balance to include (inclusive).
          schema:
            type: string
            pattern: '^-?\d+(\.\d{1,4})?$'
            examples:
              - '500000.0000'
        - $ref: './common.yaml#/components/parameters/CursorParam'
        - $ref: './common.yaml#/components/parameters/LimitParam'
      responses:
        '200':
          description: Population data retrieved successfully.
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                  - pagination
                  - population_summary
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/PopulationItem'
                  pagination:
                    $ref: './common.yaml#/components/schemas/Pagination'
                  population_summary:
                    $ref: '#/components/schemas/PopulationSummary'
        '400':
          $ref: './common.yaml#/components/responses/BadRequest'
        '401':
          $ref: './common.yaml#/components/responses/Unauthorized'
        '403':
          $ref: './common.yaml#/components/responses/Forbidden'
        '404':
          $ref: './common.yaml#/components/responses/NotFound'
        '500':
          $ref: './common.yaml#/components/responses/InternalServerError'

  /trial-balances/{trialBalanceId}/population/sample:
    parameters:
      - $ref: './common.yaml#/components/parameters/X-User-Id'
      - $ref: './common.yaml#/components/parameters/X-Firm-Id'
      - $ref: './common.yaml#/components/parameters/X-User-Role'
      - name: trialBalanceId
        in: path
        required: true
        description: UUID of the trial balance.
        schema:
          type: string
          format: uuid

    post:
      operationId: computePopulationSample
      summary: Compute an audit sample from the population
      description: |
        Computes a statistically valid sample using the specified method:

        - **Systematic** — every Nth item from a randomly determined starting point.
        - **Random** — items selected via a cryptographically seeded pseudo-random number
          generator. Each item has an equal probability of selection.
        - **MonetaryUnit** (MUS) — probability proportional to recorded amount. Higher-value
          items have a greater probability of selection; guarantees the sample value covers a
          specified monetary coverage.

        The server computes the required sample size using standard audit sampling formulas
        (AICPA AU-C §530) based on `population_size`, `confidence_level`, and
        `expected_misstatement_rate`. The response includes the calculated `sample_size` and
        the `selected_items`.

        **Role access:** FirmAdmin, Partner, Manager, Staff.
      tags:
        - PopulationAnalysis
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ComputeSampleRequest'
      responses:
        '200':
          description: Sample computed successfully.
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    $ref: '#/components/schemas/SampleResult'
        '400':
          $ref: './common.yaml#/components/responses/BadRequest'
        '401':
          $ref: './common.yaml#/components/responses/Unauthorized'
        '403':
          $ref: './common.yaml#/components/responses/Forbidden'
        '404':
          $ref: './common.yaml#/components/responses/NotFound'
        '422':
          $ref: './common.yaml#/components/responses/UnprocessableEntity'
        '500':
          $ref: './common.yaml#/components/responses/InternalServerError'

  /trial-balances/{trialBalanceId}/population/benfords-law:
    parameters:
      - $ref: './common.yaml#/components/parameters/X-User-Id'
      - $ref: './common.yaml#/components/parameters/X-Firm-Id'
      - $ref: './common.yaml#/components/parameters/X-User-Role'
      - name: trialBalanceId
        in: path
        required: true
        description: UUID of the trial balance.
        schema:
          type: string
          format: uuid

    get:
      operationId: getBenfordsLawAnalysis
      summary: Get Benford's Law first-digit distribution
      description: |
        Returns the first-digit frequency distribution of absolute account balances compared
        to the expected Benford's Law distribution. A high chi-squared statistic or large
        deviation in specific digits may indicate data fabrication or error and warrants
        further investigation.

        Computed entirely in PostgreSQL using a single aggregation query.

        **Role access:** FirmAdmin, Partner, Manager, Staff, EQReviewer.
      tags:
        - PopulationAnalysis
      responses:
        '200':
          description: Benford's Law analysis retrieved successfully.
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    $ref: '#/components/schemas/BenfordsLawResult'
        '401':
          $ref: './common.yaml#/components/responses/Unauthorized'
        '403':
          $ref: './common.yaml#/components/responses/Forbidden'
        '404':
          $ref: './common.yaml#/components/responses/NotFound'
        '500':
          $ref: './common.yaml#/components/responses/InternalServerError'

  /trial-balances/{trialBalanceId}/population/gap-test:
    parameters:
      - $ref: './common.yaml#/components/parameters/X-User-Id'
      - $ref: './common.yaml#/components/parameters/X-Firm-Id'
      - $ref: './common.yaml#/components/parameters/X-User-Role'
      - name: trialBalanceId
        in: path
        required: true
        description: UUID of the trial balance.
        schema:
          type: string
          format: uuid

    get:
      operationId: getGapTest
      summary: Get sequence gap analysis
      description: |
        Detects gaps in the numeric sequence of `account_number` values within the trial
        balance. Gaps may indicate missing accounts, deleted records, or numbering
        irregularities requiring audit attention.

        Computed entirely in PostgreSQL using window functions.

        **Role access:** FirmAdmin, Partner, Manager, Staff, EQReviewer.
      tags:
        - PopulationAnalysis
      parameters:
        - name: account_type
          in: query
          required: false
          description: Restrict gap analysis to a specific account type.
          schema:
            $ref: '#/components/schemas/AccountType'
      responses:
        '200':
          description: Gap test results retrieved successfully.
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    $ref: '#/components/schemas/GapTestResult'
        '400':
          $ref: './common.yaml#/components/responses/BadRequest'
        '401':
          $ref: './common.yaml#/components/responses/Unauthorized'
        '403':
          $ref: './common.yaml#/components/responses/Forbidden'
        '404':
          $ref: './common.yaml#/components/responses/NotFound'
        '500':
          $ref: './common.yaml#/components/responses/InternalServerError'

  /trial-balances/{trialBalanceId}/population/duplicates:
    parameters:
      - $ref: './common.yaml#/components/parameters/X-User-Id'
      - $ref: './common.yaml#/components/parameters/X-Firm-Id'
      - $ref: './common.yaml#/components/parameters/X-User-Role'
      - name: trialBalanceId
        in: path
        required: true
        description: UUID of the trial balance.
        schema:
          type: string
          format: uuid

    get:
      operationId: getDuplicateDetection
      summary: Get duplicate account detection results
      description: |
        Identifies accounts that may represent duplicate entries based on balance proximity
        and account name similarity. The `threshold_amount` parameter controls the monetary
        tolerance for near-duplicate balance detection.

        Computed entirely in PostgreSQL using self-joins and similarity functions.

        **Role access:** FirmAdmin, Partner, Manager, Staff, EQReviewer.
      tags:
        - PopulationAnalysis
      parameters:
        - name: threshold_amount
          in: query
          required: false
          description: |
            Monetary tolerance for near-duplicate balance matching (e.g., `"100.0000"` means
            accounts with balances within $100 of each other are candidates). Defaults to `"0"`.
          schema:
            type: string
            pattern: '^-?\d+(\.\d{1,4})?$'
            default: '0.0000'
        - name: date_range_days
          in: query
          required: false
          description: |
            Not applicable to static trial balance accounts (no transaction dates). Reserved
            for future use with transaction-level population analysis.
          schema:
            type: integer
            minimum: 1
            maximum: 365
      responses:
        '200':
          description: Duplicate detection results retrieved successfully.
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    $ref: '#/components/schemas/DuplicateDetectionResult'
        '400':
          $ref: './common.yaml#/components/responses/BadRequest'
        '401':
          $ref: './common.yaml#/components/responses/Unauthorized'
        '403':
          $ref: './common.yaml#/components/responses/Forbidden'
        '404':
          $ref: './common.yaml#/components/responses/NotFound'
        '500':
          $ref: './common.yaml#/components/responses/InternalServerError'

  # ---------------------------------------------------------------------------
  # Column Mapping Profiles
  # ---------------------------------------------------------------------------

  /column-mapping-profiles:
    parameters:
      - $ref: './common.yaml#/components/parameters/X-User-Id'
      - $ref: './common.yaml#/components/parameters/X-Firm-Id'
      - $ref: './common.yaml#/components/parameters/X-User-Role'

    get:
      operationId: listColumnMappingProfiles
      summary: List column mapping profiles for the firm
      description: |
        Returns all column mapping profiles belonging to the authenticated user's firm
        (`X-Firm-Id`). Result sets are expected to be small so this endpoint is not paginated.

        **Role access:** FirmAdmin, Partner, Manager, Staff.
      tags:
        - ColumnMappingProfiles
      responses:
        '200':
          description: Profiles retrieved successfully.
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ColumnMappingProfile'
        '401':
          $ref: './common.yaml#/components/responses/Unauthorized'
        '403':
          $ref: './common.yaml#/components/responses/Forbidden'
        '500':
          $ref: './common.yaml#/components/responses/InternalServerError'

    post:
      operationId: createColumnMappingProfile
      summary: Create a column mapping profile
      description: |
        Creates a new reusable column mapping profile for the firm. Profiles are used during
        trial balance import to translate source file column headers to the expected schema.

        **Role access:** FirmAdmin, Partner, Manager.
      tags:
        - ColumnMappingProfiles
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateColumnMappingProfileRequest'
      responses:
        '201':
          description: Profile created successfully.
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    $ref: '#/components/schemas/ColumnMappingProfile'
        '400':
          $ref: './common.yaml#/components/responses/BadRequest'
        '401':
          $ref: './common.yaml#/components/responses/Unauthorized'
        '403':
          $ref: './common.yaml#/components/responses/Forbidden'
        '409':
          $ref: './common.yaml#/components/responses/Conflict'
        '422':
          $ref: './common.yaml#/components/responses/UnprocessableEntity'
        '500':
          $ref: './common.yaml#/components/responses/InternalServerError'

  /column-mapping-profiles/{profileId}:
    parameters:
      - $ref: './common.yaml#/components/parameters/X-User-Id'
      - $ref: './common.yaml#/components/parameters/X-Firm-Id'
      - $ref: './common.yaml#/components/parameters/X-User-Role'
      - name: profileId
        in: path
        required: true
        description: UUID of the column mapping profile.
        schema:
          type: string
          format: uuid

    get:
      operationId: getColumnMappingProfile
      summary: Get a column mapping profile
      description: |
        Returns the full profile including the `column_mappings` JSON object.

        **Role access:** FirmAdmin, Partner, Manager, Staff.
      tags:
        - ColumnMappingProfiles
      responses:
        '200':
          description: Profile retrieved successfully.
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    $ref: '#/components/schemas/ColumnMappingProfile'
        '401':
          $ref: './common.yaml#/components/responses/Unauthorized'
        '403':
          $ref: './common.yaml#/components/responses/Forbidden'
        '404':
          $ref: './common.yaml#/components/responses/NotFound'
        '500':
          $ref: './common.yaml#/components/responses/InternalServerError'

    patch:
      operationId: updateColumnMappingProfile
      summary: Update a column mapping profile
      description: |
        Partially updates a profile's `name`, `accounting_system`, or `column_mappings`.

        **Role access:** FirmAdmin, Partner, Manager.
      tags:
        - ColumnMappingProfiles
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateColumnMappingProfileRequest'
      responses:
        '200':
          description: Profile updated successfully.
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    $ref: '#/components/schemas/ColumnMappingProfile'
        '400':
          $ref: './common.yaml#/components/responses/BadRequest'
        '401':
          $ref: './common.yaml#/components/responses/Unauthorized'
        '403':
          $ref: './common.yaml#/components/responses/Forbidden'
        '404':
          $ref: './common.yaml#/components/responses/NotFound'
        '409':
          $ref: './common.yaml#/components/responses/Conflict'
        '422':
          $ref: './common.yaml#/components/responses/UnprocessableEntity'
        '500':
          $ref: './common.yaml#/components/responses/InternalServerError'

    delete:
      operationId: deleteColumnMappingProfile
      summary: Delete a column mapping profile
      description: |
        Permanently deletes a column mapping profile. Deletion is rejected if the profile is
        referenced by any existing trial balance (`column_mapping_profile_id` is set).

        **Role access:** FirmAdmin, Partner, Manager.
      tags:
        - ColumnMappingProfiles
      responses:
        '204':
          description: Profile deleted successfully.
        '401':
          $ref: './common.yaml#/components/responses/Unauthorized'
        '403':
          $ref: './common.yaml#/components/responses/Forbidden'
        '404':
          $ref: './common.yaml#/components/responses/NotFound'
        '409':
          $ref: './common.yaml#/components/responses/Conflict'
        '500':
          $ref: './common.yaml#/components/responses/InternalServerError'

# =============================================================================
# Components
# =============================================================================

components:
  schemas:

    # -------------------------------------------------------------------------
    # Enumerations
    # -------------------------------------------------------------------------

    AccountType:
      type: string
      enum:
        - Asset
        - Liability
        - Equity
        - Revenue
        - Expense
      description: Classification of the account on the chart of accounts.

    MappingStatus:
      type: string
      enum:
        - Unmapped
        - AISuggested
        - Confirmed
        - Overridden
      description: |
        Lifecycle status of an account's FS line item mapping.
        - `Unmapped` — no mapping has been assigned.
        - `AISuggested` — the AI layer has proposed a mapping pending human review.
        - `Confirmed` — a user has accepted the AI suggestion or assigned a mapping.
        - `Overridden` — a user has manually overridden a previously confirmed or suggested mapping.

    AdjustmentType:
      type: string
      enum:
        - Proposed
        - Passed
        - Waived
      description: |
        Lifecycle status of an audit adjustment.
        - `Proposed` — created but not yet reviewed by a Partner or Manager.
        - `Passed` — approved; counted in adjusted balances and lead schedules.
        - `Waived` — intentionally not posted; `waiver_reason` is required.

    SamplingMethod:
      type: string
      enum:
        - Systematic
        - Random
        - MonetaryUnit
      description: |
        Statistical sampling method for population analysis.
        - `Systematic` — fixed interval selection from a random start.
        - `Random` — equal-probability random selection.
        - `MonetaryUnit` — probability proportional to recorded amount (MUS/PPS).

    # -------------------------------------------------------------------------
    # Trial Balance
    # -------------------------------------------------------------------------

    TrialBalance:
      type: object
      required:
        - id
        - engagement_id
        - firm_id
        - period_date
        - import_source
        - imported_at
        - imported_by_id
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for the trial balance.
        engagement_id:
          type: string
          format: uuid
          description: UUID of the parent engagement (validated against Audit Core at request time).
        firm_id:
          type: string
          format: uuid
          description: UUID of the firm that owns this trial balance.
        period_date:
          type: string
          format: date
          description: Balance-sheet date (e.g., `2024-12-31`).
        import_source:
          type: string
          description: Label identifying the originating accounting system.
        column_mapping_profile_id:
          type:
            - string
            - "null"
          format: uuid
          description: UUID of the column mapping profile used during import, if any.
        imported_at:
          type: string
          format: date-time
          description: Timestamp when the import completed.
        imported_by_id:
          type: string
          format: uuid
          description: UUID of the user who performed the import.

    TrialBalanceDetail:
      allOf:
        - $ref: '#/components/schemas/TrialBalance'
        - type: object
          required:
            - summary
          properties:
            summary:
              $ref: '#/components/schemas/TrialBalanceSummaryStats'

    TrialBalanceSummaryStats:
      type: object
      required:
        - account_count
        - total_debit
        - total_credit
        - difference
        - mapping_progress
      properties:
        account_count:
          type: integer
          description: Total number of accounts in the trial balance.
          examples:
            - 142
        total_debit:
          type: string
          description: Sum of all `balance_debit` values across accounts (4dp string).
          examples:
            - '2500000.0000'
        total_credit:
          type: string
          description: Sum of all `balance_credit` values across accounts (4dp string).
          examples:
            - '2500000.0000'
        difference:
          type: string
          description: |
            `total_debit - total_credit`. A non-zero value indicates an out-of-balance
            trial balance.
          examples:
            - '0.0000'
        mapping_progress:
          $ref: '#/components/schemas/MappingProgress'

    MappingProgress:
      type: object
      required:
        - unmapped_count
        - ai_suggested_count
        - confirmed_count
        - overridden_count
        - total_count
      properties:
        unmapped_count:
          type: integer
        ai_suggested_count:
          type: integer
        confirmed_count:
          type: integer
        overridden_count:
          type: integer
        total_count:
          type: integer

    TrialBalanceImportResult:
      allOf:
        - $ref: '#/components/schemas/TrialBalance'
        - type: object
          required:
            - import_summary
          properties:
            import_summary:
              type: object
              required:
                - account_count
                - total_debit
                - total_credit
                - difference
              properties:
                account_count:
                  type: integer
                  description: Number of accounts parsed and created from the file.
                  examples:
                    - 87
                total_debit:
                  type: string
                  description: Sum of all parsed debit balances (4dp string).
                  examples:
                    - '1234567.8900'
                total_credit:
                  type: string
                  description: Sum of all parsed credit balances (4dp string).
                  examples:
                    - '1234567.8900'
                difference:
                  type: string
                  description: |
                    `total_debit - total_credit`. Non-zero indicates an unbalanced import
                    (accepted but flagged for review).
                  examples:
                    - '0.0000'

    # -------------------------------------------------------------------------
    # Trial Balance Account
    # -------------------------------------------------------------------------

    TrialBalanceAccount:
      type: object
      required:
        - id
        - trial_balance_id
        - account_number
        - account_name
        - account_type
        - balance_debit
        - balance_credit
        - net_balance
        - mapping_status
      properties:
        id:
          type: string
          format: uuid
        trial_balance_id:
          type: string
          format: uuid
        account_number:
          type: string
          description: Chart-of-accounts code from the source file.
          examples:
            - '1010'
        account_name:
          type: string
          description: Display name of the account from the source file.
          examples:
            - 'Cash and Cash Equivalents'
        account_type:
          $ref: '#/components/schemas/AccountType'
        balance_debit:
          type: string
          description: Debit balance (4dp string).
          examples:
            - '50000.0000'
        balance_credit:
          type: string
          description: Credit balance (4dp string).
          examples:
            - '0.0000'
        net_balance:
          type: string
          description: |
            PostgreSQL-generated column: `balance_debit - balance_credit` (4dp string).
          examples:
            - '50000.0000'
        mapped_fs_line_item:
          type:
            - string
            - "null"
          description: The financial statement line item this account maps to.
          examples:
            - 'Cash and Cash Equivalents'
        mapping_status:
          $ref: '#/components/schemas/MappingStatus'
        ai_decision_id:
          type:
            - string
            - "null"
          format: uuid
          description: Reference to the `AIDecision` record in core_db that produced the suggestion.
        confirmed_by_id:
          type:
            - string
            - "null"
          format: uuid
          description: UUID of the user who confirmed or overrode the mapping.
        confirmed_at:
          type:
            - string
            - "null"
          format: date-time
          description: Timestamp when the mapping was confirmed or overridden.

    TrialBalanceAccountDetail:
      allOf:
        - $ref: '#/components/schemas/TrialBalanceAccount'
        - type: object
          required:
            - adjustments
            - adjusted_balance
          properties:
            adjustments:
              type: array
              items:
                $ref: '#/components/schemas/Adjustment'
              description: All adjustments recorded against this account.
            adjusted_balance:
              type: string
              description: |
                `net_balance` plus the sum of all `Passed` adjustments affecting this
                account (4dp string).
              examples:
                - '48500.0000'

    UpdateTrialBalanceAccountRequest:
      type: object
      minProperties: 1
      description: |
        Partially update account mapping fields. At least one field must be provided.
        When `mapping_status` is set to `Confirmed` or `Overridden`, `mapped_fs_line_item`
        must also be present (either in the body or already set on the record).
      properties:
        mapped_fs_line_item:
          type: string
          maxLength: 500
          description: Financial statement line item label.
          examples:
            - 'Cash and Cash Equivalents'
        mapping_status:
          $ref: '#/components/schemas/MappingStatus'

    BulkConfirmRequest:
      type: object
      description: |
        Exactly one of `account_ids` or `min_confidence` must be provided.
      properties:
        account_ids:
          type: array
          description: |
            Explicit list of account UUIDs to confirm. All must have
            `mapping_status: AISuggested`.
          items:
            type: string
            format: uuid
          minItems: 1
          maxItems: 1000
        min_confidence:
          type: number
          format: float
          description: |
            Confidence threshold (0.0–1.0). All `AISuggested` accounts whose recorded
            `ai_confidence` meets or exceeds this value will be confirmed.
          minimum: 0.0
          maximum: 1.0
          examples:
            - 0.85

    # -------------------------------------------------------------------------
    # Adjustments
    # -------------------------------------------------------------------------

    Adjustment:
      type: object
      required:
        - id
        - trial_balance_id
        - account_id
        - amount
        - description
        - adjustment_type
        - proposed_by_id
        - proposed_at
      properties:
        id:
          type: string
          format: uuid
        trial_balance_id:
          type: string
          format: uuid
        account_id:
          type: string
          format: uuid
          description: UUID of the account this adjustment affects.
        amount:
          type: string
          description: |
            Signed adjustment amount (4dp string). Positive increases net_balance;
            negative decreases it.
          examples:
            - '-1500.0000'
        description:
          type: string
          description: Narrative explanation of the adjustment.
          examples:
            - 'Accrual reversal — prepaid insurance Q4'
        adjustment_type:
          $ref: '#/components/schemas/AdjustmentType'
        waiver_reason:
          type:
            - string
            - "null"
          description: Required when `adjustment_type` is `Waived`. Explains why the adjustment was not posted.
          examples:
            - 'Below materiality threshold ($5,000). Documented per firm policy.'
        proposed_by_id:
          type: string
          format: uuid
          description: UUID of the user who proposed the adjustment.
        proposed_at:
          type: string
          format: date-time
          description: Timestamp when the adjustment was proposed.
        approved_by_id:
          type:
            - string
            - "null"
          format: uuid
          description: UUID of the Partner or Manager who approved the adjustment.
        approved_at:
          type:
            - string
            - "null"
          format: date-time
          description: Timestamp when the adjustment was approved.

    CreateAdjustmentRequest:
      type: object
      required:
        - account_id
        - amount
        - description
        - adjustment_type
      properties:
        account_id:
          type: string
          format: uuid
          description: UUID of the account to adjust.
        amount:
          type: string
          description: Signed adjustment amount (4dp string). Use negative to reduce a balance.
          pattern: '^-?\d+(\.\d{1,4})?$'
          examples:
            - '-1500.0000'
        description:
          type: string
          maxLength: 2000
          description: Narrative explanation of the adjustment.
        adjustment_type:
          $ref: '#/components/schemas/AdjustmentType'
        waiver_reason:
          type: string
          maxLength: 2000
          description: Required when `adjustment_type` is `Waived`.

    UpdateAdjustmentRequest:
      type: object
      minProperties: 1
      description: |
        Partially update an adjustment. Only permitted while `adjustment_type` is `Proposed`.
        At least one field must be provided. If changing to `Waived`, `waiver_reason` must be
        included.
      properties:
        amount:
          type: string
          pattern: '^-?\d+(\.\d{1,4})?$'
          description: Updated signed amount (4dp string).
        description:
          type: string
          maxLength: 2000
        adjustment_type:
          $ref: '#/components/schemas/AdjustmentType'
        waiver_reason:
          type: string
          maxLength: 2000
          description: Required when `adjustment_type` is being changed to `Waived`.

    # -------------------------------------------------------------------------
    # Analytics
    # -------------------------------------------------------------------------

    AnalyticsSummary:
      type: object
      required:
        - trial_balance_id
        - period_date
        - total_debit
        - total_credit
        - difference
        - by_account_type
        - adjustment_impact
      properties:
        trial_balance_id:
          type: string
          format: uuid
        period_date:
          type: string
          format: date
        total_debit:
          type: string
          description: Sum of all debit balances (4dp string).
        total_credit:
          type: string
          description: Sum of all credit balances (4dp string).
        difference:
          type: string
          description: total_debit minus total_credit (4dp string). Zero indicates a balanced TB.
        by_account_type:
          type: array
          description: Subtotals broken down by `account_type`.
          items:
            $ref: '#/components/schemas/AccountTypeSummary'
        adjustment_impact:
          $ref: '#/components/schemas/AdjustmentImpactSummary'

    AccountTypeSummary:
      type: object
      required:
        - account_type
        - account_count
        - total_debit
        - total_credit
        - net_balance
      properties:
        account_type:
          $ref: '#/components/schemas/AccountType'
        account_count:
          type: integer
        total_debit:
          type: string
        total_credit:
          type: string
        net_balance:
          type: string

    AdjustmentImpactSummary:
      type: object
      required:
        - passed_count
        - waived_count
        - proposed_count
        - total_passed_amount
        - total_waived_amount
      properties:
        passed_count:
          type: integer
          description: Number of adjustments with type `Passed`.
        waived_count:
          type: integer
          description: Number of adjustments with type `Waived`.
        proposed_count:
          type: integer
          description: Number of adjustments still `Proposed` (pending approval).
        total_passed_amount:
          type: string
          description: Net sum of all `Passed` adjustment amounts (4dp string).
          examples:
            - '-3250.0000'
        total_waived_amount:
          type: string
          description: Net sum of all `Waived` adjustment amounts (4dp string).

    LeadScheduleSection:
      type: object
      required:
        - fs_line_item
        - account_type
        - accounts
        - subtotal_net_balance
        - subtotal_adjusted_balance
      properties:
        fs_line_item:
          type:
            - string
            - "null"
          description: |
            The FS line item label. Null for the special group containing unmapped accounts.
        account_type:
          $ref: '#/components/schemas/AccountType'
        accounts:
          type: array
          items:
            $ref: '#/components/schemas/LeadScheduleAccount'
        subtotal_net_balance:
          type: string
          description: Sum of `net_balance` across accounts in this section (4dp string).
        subtotal_adjusted_balance:
          type: string
          description: |
            Sum of `net_balance + passed_adjustments` across accounts in this section
            (4dp string).

    LeadScheduleAccount:
      type: object
      required:
        - account_id
        - account_number
        - account_name
        - net_balance
        - adjusted_balance
        - mapping_status
      properties:
        account_id:
          type: string
          format: uuid
        account_number:
          type: string
        account_name:
          type: string
        net_balance:
          type: string
        adjusted_balance:
          type: string
        mapping_status:
          $ref: '#/components/schemas/MappingStatus'

    VarianceRow:
      type: object
      required:
        - account_number
        - account_name
      properties:
        account_number:
          type: string
        account_name:
          type: string
        current_net_balance:
          type:
            - string
            - "null"
          description: Net balance in the current period. Null if account absent in current period.
        prior_net_balance:
          type:
            - string
            - "null"
          description: Net balance in the prior period. Null if account absent in prior period.
        variance_amount:
          type:
            - string
            - "null"
          description: |
            `current_net_balance - prior_net_balance` (4dp string). Null if either period
            is absent.
        variance_percent:
          type:
            - number
            - "null"
          format: float
          description: |
            `(variance_amount / abs(prior_net_balance)) * 100`. Null if prior balance is
            zero or absent.
          examples:
            - 12.5
        present_in_current:
          type: boolean
        present_in_prior:
          type: boolean

    FinancialRatios:
      type: object
      description: |
        SQL-computed standard financial ratios. A null value means insufficient mapped accounts
        exist to compute the ratio for this trial balance. Ratios are derived solely from
        account balances mapped to standard FS line items.
      properties:
        current_ratio:
          type:
            - number
            - "null"
          format: float
          description: Current Assets / Current Liabilities.
          examples:
            - 2.14
        quick_ratio:
          type:
            - number
            - "null"
          format: float
          description: (Current Assets - Inventory) / Current Liabilities.
        debt_to_equity:
          type:
            - number
            - "null"
          format: float
          description: Total Liabilities / Total Equity.
        gross_margin_percent:
          type:
            - number
            - "null"
          format: float
          description: (Revenue - Cost of Goods Sold) / Revenue * 100.
        net_profit_margin_percent:
          type:
            - number
            - "null"
          format: float
          description: Net Income / Revenue * 100.
        return_on_assets:
          type:
            - number
            - "null"
          format: float
          description: Net Income / Total Assets * 100.
        return_on_equity:
          type:
            - number
            - "null"
          format: float
          description: Net Income / Total Equity * 100.
        asset_turnover:
          type:
            - number
            - "null"
          format: float
          description: Revenue / Total Assets.

    AnomalyRecord:
      type: object
      required:
        - account_id
        - account_number
        - account_name
        - anomaly_type
        - description
        - ai_decision_id
      properties:
        account_id:
          type: string
          format: uuid
        account_number:
          type: string
        account_name:
          type: string
        anomaly_type:
          type: string
          description: |
            Machine-readable anomaly category (e.g., `"UNUSUAL_BALANCE"`,
            `"UNEXPECTED_ACCOUNT_TYPE"`, `"LARGE_VARIANCE"`, `"BENFORD_DEVIATION"`).
          examples:
            - UNUSUAL_BALANCE
        description:
          type: string
          description: Human-readable explanation of why this account was flagged.
        ai_confidence:
          type:
            - number
            - "null"
          format: float
          description: Model confidence score (0.0–1.0) for this anomaly flag.
          minimum: 0.0
          maximum: 1.0
        ai_decision_id:
          type: string
          format: uuid
          description: |
            Reference to the `AIDecision` record in core_db for full audit trail and
            human-in-the-loop review.
        net_balance:
          type: string
          description: Account net_balance at time of flagging (4dp string).

    # -------------------------------------------------------------------------
    # Population Analysis
    # -------------------------------------------------------------------------

    PopulationItem:
      type: object
      required:
        - account_id
        - account_number
        - account_name
        - account_type
        - net_balance
      properties:
        account_id:
          type: string
          format: uuid
        account_number:
          type: string
        account_name:
          type: string
        account_type:
          $ref: '#/components/schemas/AccountType'
        net_balance:
          type: string
          description: Net balance (4dp string).
        mapped_fs_line_item:
          type:
            - string
            - "null"

    PopulationSummary:
      type: object
      required:
        - total_items
        - total_value
        - mean_value
        - median_value
        - std_deviation
      properties:
        total_items:
          type: integer
          description: Total number of accounts in the (filtered) population.
        total_value:
          type: string
          description: Sum of absolute net_balance values across the population (4dp string).
        mean_value:
          type: string
          description: Arithmetic mean of absolute net_balance values (4dp string).
        median_value:
          type: string
          description: Median absolute net_balance value (4dp string).
        std_deviation:
          type: string
          description: Population standard deviation of absolute net_balance values (4dp string).

    ComputeSampleRequest:
      type: object
      required:
        - sampling_method
        - population_size
        - confidence_level
        - expected_misstatement_rate
      properties:
        sampling_method:
          $ref: '#/components/schemas/SamplingMethod'
        population_size:
          type: integer
          description: |
            Number of items in the population being sampled. Must match the actual
            population count for the trial balance (optionally filtered).
          minimum: 1
        confidence_level:
          type: number
          format: float
          description: |
            Required confidence level as a decimal (e.g., `0.95` for 95%). Standard audit
            values are 0.90, 0.95, or 0.99 (AICPA AU-C §530).
          minimum: 0.5
          maximum: 0.999
          examples:
            - 0.95
        expected_misstatement_rate:
          type: number
          format: float
          description: |
            Expected rate of misstatement in the population as a decimal (e.g., `0.05` for
            5%). Used in sample size calculation. Lower values produce larger samples.
          minimum: 0.0
          maximum: 0.5
          examples:
            - 0.05
        account_type:
          $ref: '#/components/schemas/AccountType'
        min_amount:
          type: string
          pattern: '^-?\d+(\.\d{1,4})?$'
          description: Apply the same balance filter used in the population list.
        max_amount:
          type: string
          pattern: '^-?\d+(\.\d{1,4})?$'

    SampleResult:
      type: object
      required:
        - sampling_method
        - population_size
        - sample_size
        - confidence_level
        - expected_misstatement_rate
        - selected_items
      properties:
        sampling_method:
          $ref: '#/components/schemas/SamplingMethod'
        population_size:
          type: integer
        sample_size:
          type: integer
          description: Calculated required sample size per AICPA AU-C §530 formulas.
        confidence_level:
          type: number
          format: float
        expected_misstatement_rate:
          type: number
          format: float
        selected_items:
          type: array
          description: The accounts selected for the sample.
          items:
            $ref: '#/components/schemas/PopulationItem'
        selection_interval:
          type:
            - number
            - "null"
          format: float
          description: |
            For `Systematic` and `MonetaryUnit` methods: the selection interval used.
            Null for `Random` sampling.
        random_seed:
          type:
            - integer
            - "null"
          description: |
            The seed used for random number generation — included for reproducibility and
            workpaper documentation.

    BenfordsLawResult:
      type: object
      required:
        - trial_balance_id
        - total_accounts_analysed
        - digits
        - chi_squared_statistic
        - chi_squared_p_value
        - conclusion
      properties:
        trial_balance_id:
          type: string
          format: uuid
        total_accounts_analysed:
          type: integer
          description: Number of accounts included in the analysis (zero balances excluded).
        digits:
          type: array
          description: Per-digit frequency data for digits 1–9.
          items:
            $ref: '#/components/schemas/BenfordsLawDigit'
        chi_squared_statistic:
          type: number
          format: float
          description: Chi-squared goodness-of-fit statistic comparing observed vs. expected frequencies.
        chi_squared_p_value:
          type: number
          format: float
          description: |
            P-value for the chi-squared test. Values below 0.05 suggest a statistically
            significant deviation from Benford's Law.
        conclusion:
          type: string
          description: |
            Interpretive summary (e.g., `"Conforms to Benford's Law"` or
            `"Significant deviation detected — further investigation recommended"`).

    BenfordsLawDigit:
      type: object
      required:
        - digit
        - observed_count
        - observed_frequency
        - expected_frequency
        - deviation
      properties:
        digit:
          type: integer
          minimum: 1
          maximum: 9
        observed_count:
          type: integer
          description: Number of accounts whose absolute net_balance begins with this digit.
        observed_frequency:
          type: number
          format: float
          description: Observed proportion (0.0–1.0).
        expected_frequency:
          type: number
          format: float
          description: Expected Benford proportion for this digit (log10(1 + 1/d)).
        deviation:
          type: number
          format: float
          description: observed_frequency minus expected_frequency.

    GapTestResult:
      type: object
      required:
        - trial_balance_id
        - account_type_filter
        - accounts_analysed
        - gaps_detected
        - gaps
      properties:
        trial_balance_id:
          type: string
          format: uuid
        account_type_filter:
          $ref: '#/components/schemas/AccountType'
        accounts_analysed:
          type: integer
          description: Number of accounts included in the sequence analysis.
        gaps_detected:
          type: integer
          description: Total number of gaps found in the account number sequence.
        gaps:
          type: array
          description: List of detected sequence gaps.
          items:
            $ref: '#/components/schemas/SequenceGap'

    SequenceGap:
      type: object
      required:
        - preceding_account_number
        - following_account_number
        - gap_size
      properties:
        preceding_account_number:
          type: string
          description: The last account number before the gap.
        following_account_number:
          type: string
          description: The first account number after the gap.
        gap_size:
          type: integer
          description: Number of missing sequence positions between the two account numbers.
          examples:
            - 3

    DuplicateDetectionResult:
      type: object
      required:
        - trial_balance_id
        - accounts_analysed
        - duplicate_groups_found
        - groups
      properties:
        trial_balance_id:
          type: string
          format: uuid
        accounts_analysed:
          type: integer
        duplicate_groups_found:
          type: integer
          description: Number of candidate duplicate groups detected.
        groups:
          type: array
          description: Groups of accounts that may represent duplicates.
          items:
            $ref: '#/components/schemas/DuplicateGroup'

    DuplicateGroup:
      type: object
      required:
        - accounts
        - match_reason
      properties:
        accounts:
          type: array
          minItems: 2
          items:
            $ref: '#/components/schemas/PopulationItem'
        match_reason:
          type: string
          description: |
            Explanation of why these accounts are flagged as potential duplicates
            (e.g., `"Identical net_balance"`, `"Net balance within threshold; similar account name"`).
          examples:
            - 'Net balance within threshold; similar account name'

    # -------------------------------------------------------------------------
    # Column Mapping Profiles
    # -------------------------------------------------------------------------

    ColumnMappingProfile:
      type: object
      required:
        - id
        - firm_id
        - name
        - accounting_system
        - column_mappings
        - created_at
      properties:
        id:
          type: string
          format: uuid
        firm_id:
          type: string
          format: uuid
        name:
          type: string
          description: Human-readable profile name (unique within a firm).
          examples:
            - 'QuickBooks Online — Standard Export'
        accounting_system:
          type: string
          description: Label identifying the accounting system this profile targets.
          examples:
            - 'QuickBooks Online'
        column_mappings:
          type: object
          description: |
            JSON object mapping source column headers (as they appear in the CSV/XLSX) to
            canonical trial balance fields. Required target keys are: `account_number`,
            `account_name`, `account_type`, `balance_debit`, `balance_credit`.
          additionalProperties:
            type: string
          examples:
            - account_number: 'Acct. #'
              account_name: 'Account Name'
              account_type: 'Type'
              balance_debit: 'Debit'
              balance_credit: 'Credit'
        created_at:
          type: string
          format: date-time

    CreateColumnMappingProfileRequest:
      type: object
      required:
        - name
        - accounting_system
        - column_mappings
      properties:
        name:
          type: string
          maxLength: 255
          description: Profile name. Must be unique within the firm.
        accounting_system:
          type: string
          maxLength: 255
          description: Accounting system this profile targets.
        column_mappings:
          type: object
          description: |
            Source-to-canonical column header mapping. Must include keys for all required
            target fields: `account_number`, `account_name`, `account_type`, `balance_debit`,
            `balance_credit`.
          additionalProperties:
            type: string

    UpdateColumnMappingProfileRequest:
      type: object
      minProperties: 1
      description: Partially update a profile. At least one field must be provided.
      properties:
        name:
          type: string
          maxLength: 255
          description: Updated profile name. Must be unique within the firm.
        accounting_system:
          type: string
          maxLength: 255
        column_mappings:
          type: object
          description: Replaces the entire `column_mappings` object.
          additionalProperties:
            type: string
