<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Axiom — Profile Setup</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --font-sans: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
      --text-xs: 0.64rem; --text-sm: 0.8rem; --text-base: 1rem; --text-lg: 1.25rem;
      --text-xl: 1.563rem; --text-2xl: 1.953rem;
      --color-primary-50: oklch(97% 0.01 250); --color-primary-100: oklch(93% 0.03 250);
      --color-primary-500: oklch(50% 0.15 250); --color-primary-600: oklch(43% 0.14 250);
      --color-neutral-0: #fff; --color-neutral-50: oklch(98% 0.003 250);
      --color-neutral-200: oklch(90% 0.006 250); --color-neutral-300: oklch(82% 0.006 250);
      --color-neutral-400: oklch(70% 0.006 250); --color-neutral-600: oklch(45% 0.006 250);
      --color-neutral-700: oklch(35% 0.006 250); --color-neutral-800: oklch(25% 0.008 250);
      --color-neutral-900: oklch(15% 0.01 250);
      --space-2: 8px; --space-3: 12px; --space-4: 16px; --space-5: 20px;
      --space-6: 24px; --space-8: 32px; --space-10: 40px;
      --radius-sm: 6px; --radius-lg: 12px;
    }
    body { font-family: var(--font-sans); font-size: var(--text-base); line-height: 1.5; color: var(--color-neutral-800); background: var(--color-neutral-50); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: var(--space-6); -webkit-font-smoothing: antialiased; }

    .container { width: 100%; max-width: 440px; display: flex; flex-direction: column; align-items: center; gap: var(--space-10); }
    .logo { display: flex; align-items: center; gap: var(--space-3); }
    .logo-mark { width: 36px; height: 36px; background: var(--color-primary-500); border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; color: white; font-weight: 800; font-size: var(--text-lg); }
    .logo-text { font-size: var(--text-xl); font-weight: 700; color: var(--color-neutral-900); letter-spacing: -0.03em; }

    .card { width: 100%; background: var(--color-neutral-0); border: 1px solid var(--color-neutral-200); border-radius: var(--radius-lg); padding: var(--space-10); display: flex; flex-direction: column; gap: var(--space-6); }
    .card h1 { font-size: var(--text-2xl); font-weight: 700; color: var(--color-neutral-900); letter-spacing: -0.02em; line-height: 1.2; text-align: center; }
    .card p.subtitle { color: var(--color-neutral-600); text-align: center; margin-top: calc(-1 * var(--space-2)); }

    .form-group { display: flex; flex-direction: column; gap: var(--space-2); }
    .form-group label { font-size: var(--text-sm); font-weight: 600; color: var(--color-neutral-700); }
    .form-group input, .form-group select { height: 44px; border: 1px solid var(--color-neutral-200); border-radius: var(--radius-sm); padding: 0 var(--space-3); font-family: var(--font-sans); font-size: var(--text-base); color: var(--color-neutral-800); outline: none; background: var(--color-neutral-0); }
    .form-group input:focus { border-color: var(--color-primary-500); box-shadow: 0 0 0 3px oklch(50% 0.15 250 / 0.12); }
    .form-group .hint { font-size: var(--text-sm); color: var(--color-neutral-400); }

    .role-display { padding: var(--space-4); background: var(--color-neutral-50); border-radius: var(--radius-sm); border: 1px solid var(--color-neutral-200); }
    .role-display .role-name { font-size: var(--text-base); font-weight: 600; color: var(--color-neutral-800); display: flex; align-items: center; gap: var(--space-2); }
    .role-display .role-name .badge { font-size: var(--text-xs); font-weight: 600; background: var(--color-primary-50); color: oklch(40% 0.12 250); padding: 2px 8px; border-radius: 100px; }
    .role-display .role-desc { font-size: var(--text-sm); color: var(--color-neutral-600); margin-top: var(--space-2); }

    .radio-group { display: flex; flex-direction: column; gap: var(--space-3); }
    .radio-item { display: flex; align-items: center; gap: var(--space-3); padding: var(--space-3) var(--space-4); border: 1px solid var(--color-neutral-200); border-radius: var(--radius-sm); cursor: pointer; transition: border-color 0.15s; }
    .radio-item:hover { border-color: var(--color-neutral-300); }
    .radio-item.selected { border-color: var(--color-primary-500); background: oklch(99% 0.005 250); }
    .radio-item input[type="radio"] { width: 18px; height: 18px; accent-color: oklch(50% 0.15 250); cursor: pointer; }
    .radio-item .radio-content { flex: 1; }
    .radio-item .radio-label { font-size: var(--text-sm); font-weight: 600; color: var(--color-neutral-700); }
    .radio-item .radio-desc { font-size: var(--text-xs); color: var(--color-neutral-400); }
    .radio-item .recommended { font-size: var(--text-xs); color: oklch(35% 0.10 145); background: oklch(95% 0.03 145); padding: 1px 6px; border-radius: 100px; font-weight: 500; margin-left: var(--space-2); }

    .btn-primary { height: 44px; background: var(--color-primary-500); color: white; border: none; border-radius: var(--radius-sm); font-family: var(--font-sans); font-size: var(--text-base); font-weight: 600; cursor: pointer; width: 100%; margin-top: var(--space-2); }
    .btn-primary:hover { background: var(--color-primary-600); }

    /* ============================================================
       DEMO NAVIGATION — not part of the final product
       For design walkthroughs and feedback sessions only.
       ============================================================ */
    .demo-nav { position: fixed; bottom: 24px; right: 24px; display: flex; flex-direction: column; align-items: flex-end; gap: 6px; z-index: 9999; }
    .demo-nav-label { font-family: monospace; font-size: 10px; color: #aaa; text-transform: uppercase; letter-spacing: 0.06em; background: #fffde7; border: 1px dashed #ddd; padding: 2px 8px; border-radius: 4px; }
    .demo-nav-arrows { display: flex; gap: 8px; }
    .demo-nav-btn { font-family: monospace; font-size: 13px; font-weight: 600; color: #666; background: #fffde7; border: 1.5px dashed #bbb; border-radius: 8px; padding: 8px 18px; text-decoration: none; box-shadow: 0 2px 8px rgba(0,0,0,0.10); display: inline-flex; align-items: center; gap: 6px; }
    .demo-nav-btn:hover { background: #fff9c4; border-color: #aaa; color: #333; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo"><div class="logo-mark">A</div><span class="logo-text">Axiom</span></div>

    <div class="card">
      <h1>Set up your profile</h1>
      <p class="subtitle">Just three things and you're in.</p>

      <div class="form-group">
        <label for="name">Display name</label>
        <input type="text" id="name" value="Emily Park">
      </div>

      <div class="form-group">
        <label>Your role</label>
        <div class="role-display">
          <div class="role-name">Staff Auditor <span class="badge">Assigned by admin</span></div>
          <div class="role-desc">As Staff, you prepare workpapers, test controls, and manage document requests. Your work is reviewed by Managers and Partners.</div>
        </div>
      </div>

      <div class="form-group">
        <label>Notification preferences</label>
        <div class="radio-group">
          <label class="radio-item">
            <input type="radio" name="notif" value="realtime">
            <div class="radio-content">
              <div class="radio-label">Real-time</div>
              <div class="radio-desc">Instant notification for every event</div>
            </div>
          </label>
          <label class="radio-item selected">
            <input type="radio" name="notif" value="daily" checked>
            <div class="radio-content">
              <div class="radio-label">Daily digest <span class="recommended">Recommended</span></div>
              <div class="radio-desc">One summary email each morning at 8:00 AM</div>
            </div>
          </label>
          <label class="radio-item">
            <input type="radio" name="notif" value="weekly">
            <div class="radio-content">
              <div class="radio-label">Weekly digest</div>
              <div class="radio-desc">Summary every Monday morning</div>
            </div>
          </label>
        </div>
      </div>

      <button class="btn-primary">Save &amp; Continue</button>
    </div>
  </div>
  <!-- ============================================================
       DEMO NAVIGATION — not part of the final product
       For design walkthroughs and feedback sessions only.
       ============================================================ -->
  <div class="demo-nav">
    <span class="demo-nav-label">Demo nav &mdash; not in product</span>
    <div class="demo-nav-arrows">
      <a href="02-magic-link-landing.html" class="demo-nav-btn">&#8592; Prev</a>
      <a href="04-guided-tour-step.html" class="demo-nav-btn">Next &#8594;</a>
    </div>
  </div>
</body>
</html>
