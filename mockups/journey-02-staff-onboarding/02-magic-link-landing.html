<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Axiom — Welcome</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --font-sans: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
      --text-xs: 0.64rem; --text-sm: 0.8rem; --text-base: 1rem; --text-lg: 1.25rem;
      --text-xl: 1.563rem; --text-2xl: 1.953rem;
      --color-primary-50: oklch(97% 0.01 250); --color-primary-100: oklch(93% 0.03 250);
      --color-primary-500: oklch(50% 0.15 250); --color-primary-600: oklch(43% 0.14 250);
      --color-neutral-0: #fff; --color-neutral-50: oklch(98% 0.003 250);
      --color-neutral-200: oklch(90% 0.006 250); --color-neutral-300: oklch(82% 0.006 250);
      --color-neutral-400: oklch(70% 0.006 250); --color-neutral-600: oklch(45% 0.006 250);
      --color-neutral-700: oklch(35% 0.006 250); --color-neutral-800: oklch(25% 0.008 250);
      --color-neutral-900: oklch(15% 0.01 250);
      --space-1: 4px; --space-2: 8px; --space-3: 12px; --space-4: 16px;
      --space-5: 20px; --space-6: 24px; --space-8: 32px; --space-10: 40px;
      --radius-sm: 6px; --radius-md: 8px; --radius-lg: 12px;
    }
    body { font-family: var(--font-sans); font-size: var(--text-base); line-height: 1.5; color: var(--color-neutral-800); background: var(--color-neutral-50); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: var(--space-6); -webkit-font-smoothing: antialiased; }

    .container { width: 100%; max-width: 440px; display: flex; flex-direction: column; align-items: center; gap: var(--space-10); }

    .logo { display: flex; align-items: center; gap: var(--space-3); }
    .logo-mark { width: 36px; height: 36px; background: var(--color-primary-500); border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; color: white; font-weight: 800; font-size: var(--text-lg); }
    .logo-text { font-size: var(--text-xl); font-weight: 700; color: var(--color-neutral-900); letter-spacing: -0.03em; }

    .card { width: 100%; background: var(--color-neutral-0); border: 1px solid var(--color-neutral-200); border-radius: var(--radius-lg); padding: var(--space-10); display: flex; flex-direction: column; gap: var(--space-6); text-align: center; }

    .card h1 { font-size: var(--text-2xl); font-weight: 700; color: var(--color-neutral-900); letter-spacing: -0.02em; line-height: 1.2; }
    .card p.subtitle { color: var(--color-neutral-600); margin-top: calc(-1 * var(--space-2)); }

    .firm-info { display: flex; align-items: center; gap: var(--space-3); padding: var(--space-4); background: var(--color-neutral-50); border-radius: var(--radius-md); justify-content: center; }
    .firm-icon { width: 40px; height: 40px; background: var(--color-primary-100); border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; font-size: var(--text-sm); font-weight: 700; color: var(--color-primary-600); flex-shrink: 0; }
    .firm-details { text-align: left; }
    .firm-details .name { font-size: var(--text-sm); font-weight: 600; color: var(--color-neutral-800); }
    .firm-details .role { font-size: var(--text-xs); color: var(--color-neutral-400); }

    .sso-buttons { display: flex; flex-direction: column; gap: var(--space-3); }
    .btn-sso { height: 44px; background: var(--color-neutral-0); border: 1px solid var(--color-neutral-200); border-radius: var(--radius-sm); font-family: var(--font-sans); font-size: var(--text-base); font-weight: 500; color: var(--color-neutral-700); cursor: pointer; display: flex; align-items: center; justify-content: center; gap: var(--space-3); transition: border-color 0.15s; }
    .btn-sso:hover { border-color: var(--color-neutral-300); background: var(--color-neutral-50); }
    .btn-sso svg { width: 20px; height: 20px; flex-shrink: 0; }

    .divider { display: flex; align-items: center; gap: var(--space-4); color: var(--color-neutral-300); font-size: var(--text-sm); }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--color-neutral-200); }

    .password-section { display: flex; flex-direction: column; gap: var(--space-4); text-align: left; }
    .form-group { display: flex; flex-direction: column; gap: var(--space-2); }
    .form-group label { font-size: var(--text-sm); font-weight: 600; color: var(--color-neutral-700); }
    .form-group input { height: 44px; border: 1px solid var(--color-neutral-200); border-radius: var(--radius-sm); padding: 0 var(--space-3); font-family: var(--font-sans); font-size: var(--text-base); color: var(--color-neutral-800); outline: none; }
    .form-group input:focus { border-color: var(--color-primary-500); box-shadow: 0 0 0 3px oklch(50% 0.15 250 / 0.12); }

    .btn-primary { height: 44px; background: var(--color-primary-500); color: white; border: none; border-radius: var(--radius-sm); font-family: var(--font-sans); font-size: var(--text-base); font-weight: 600; cursor: pointer; width: 100%; }
    .btn-primary:hover { background: var(--color-primary-600); }

    .tos { display: flex; align-items: flex-start; gap: var(--space-3); text-align: left; font-size: var(--text-sm); color: var(--color-neutral-600); }
    .tos input { margin-top: 3px; width: 18px; height: 18px; accent-color: oklch(50% 0.15 250); flex-shrink: 0; }
    .tos a { color: var(--color-primary-500); text-decoration: none; }

    /* ============================================================
       DEMO NAVIGATION — not part of the final product
       For design walkthroughs and feedback sessions only.
       ============================================================ */
    .demo-nav { position: fixed; bottom: 24px; right: 24px; display: flex; flex-direction: column; align-items: flex-end; gap: 6px; z-index: 9999; }
    .demo-nav-label { font-family: monospace; font-size: 10px; color: #aaa; text-transform: uppercase; letter-spacing: 0.06em; background: #fffde7; border: 1px dashed #ddd; padding: 2px 8px; border-radius: 4px; }
    .demo-nav-arrows { display: flex; gap: 8px; }
    .demo-nav-btn { font-family: monospace; font-size: 13px; font-weight: 600; color: #666; background: #fffde7; border: 1.5px dashed #bbb; border-radius: 8px; padding: 8px 18px; text-decoration: none; box-shadow: 0 2px 8px rgba(0,0,0,0.10); display: inline-flex; align-items: center; gap: 6px; }
    .demo-nav-btn:hover { background: #fff9c4; border-color: #aaa; color: #333; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <div class="logo-mark">A</div>
      <span class="logo-text">Axiom</span>
    </div>

    <div class="card">
      <h1>Welcome to Axiom</h1>
      <p class="subtitle">Set up your account to get started</p>

      <div class="firm-info">
        <div class="firm-icon">MA</div>
        <div class="firm-details">
          <div class="name">Meridian & Associates CPAs</div>
          <div class="role">Joining as Staff Auditor</div>
        </div>
      </div>

      <div class="sso-buttons">
        <button class="btn-sso">
          <svg viewBox="0 0 24 24" fill="none"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
          Continue with Google
        </button>
        <button class="btn-sso">
          <svg viewBox="0 0 24 24" fill="none"><path d="M11.4 24H0V12.6L11.4 0v7.2H24v5.4H11.4V24z" fill="#00A4EF"/><path d="M24 12.6V24H11.4V12.6H24z" fill="#FFB900"/><path d="M11.4 0H0v12.6h11.4V7.2H24V0H11.4z" fill="#F25022"/><path d="M0 12.6V24h11.4V12.6H0z" fill="#7FBA00"/></svg>
          Continue with Microsoft
        </button>
      </div>

      <div class="divider">or set a password</div>

      <div class="password-section">
        <div class="form-group">
          <label for="password">Create password</label>
          <input type="password" id="password" placeholder="At least 12 characters">
        </div>
        <div class="form-group">
          <label for="confirm">Confirm password</label>
          <input type="password" id="confirm" placeholder="Repeat password">
        </div>
      </div>

      <label class="tos">
        <input type="checkbox" checked>
        <span>I agree to the Axiom <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></span>
      </label>

      <button class="btn-primary">Create Account</button>
    </div>
  </div>
  <!-- ============================================================
       DEMO NAVIGATION — not part of the final product
       For design walkthroughs and feedback sessions only.
       ============================================================ -->
  <div class="demo-nav">
    <span class="demo-nav-label">Demo nav &mdash; not in product</span>
    <div class="demo-nav-arrows">
      <a href="01-invitation-email.html" class="demo-nav-btn">&#8592; Prev</a>
      <a href="03-profile-setup.html" class="demo-nav-btn">Next &#8594;</a>
    </div>
  </div>
</body>
</html>
