<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Axiom — Tell Us About Your Firm</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --font-sans: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
      --text-xs: 0.64rem; --text-sm: 0.8rem; --text-base: 1rem; --text-lg: 1.25rem;
      --text-xl: 1.563rem; --text-2xl: 1.953rem;
      --color-primary-50: oklch(97% 0.01 250); --color-primary-100: oklch(93% 0.03 250);
      --color-primary-500: oklch(50% 0.15 250); --color-primary-600: oklch(43% 0.14 250);
      --color-primary-700: oklch(36% 0.12 250);
      --color-neutral-0: #fff; --color-neutral-50: oklch(98% 0.003 250);
      --color-neutral-100: oklch(95% 0.005 250); --color-neutral-200: oklch(90% 0.006 250);
      --color-neutral-300: oklch(82% 0.006 250); --color-neutral-400: oklch(70% 0.006 250);
      --color-neutral-600: oklch(45% 0.006 250); --color-neutral-700: oklch(35% 0.006 250);
      --color-neutral-800: oklch(25% 0.008 250); --color-neutral-900: oklch(15% 0.01 250);
      --space-1: 4px; --space-2: 8px; --space-3: 12px; --space-4: 16px;
      --space-5: 20px; --space-6: 24px; --space-8: 32px; --space-10: 40px;
      --radius-sm: 6px; --radius-md: 8px; --radius-lg: 12px;
    }

    body {
      font-family: var(--font-sans);
      font-size: var(--text-base);
      line-height: 1.5;
      color: var(--color-neutral-800);
      background: var(--color-neutral-50);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: var(--space-6);
      -webkit-font-smoothing: antialiased;
    }

    .container {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-10);
    }

    .logo {
      display: flex; align-items: center; gap: var(--space-3);
    }

    .logo-mark {
      width: 36px; height: 36px; background: var(--color-primary-500);
      border-radius: var(--radius-sm); display: flex; align-items: center;
      justify-content: center; color: white; font-weight: 800;
      font-size: var(--text-lg); letter-spacing: -0.02em;
    }

    .logo-text {
      font-size: var(--text-xl); font-weight: 700;
      color: var(--color-neutral-900); letter-spacing: -0.03em;
    }

    .card {
      width: 100%;
      background: var(--color-neutral-0);
      border: 1px solid var(--color-neutral-200);
      border-radius: var(--radius-lg);
      padding: var(--space-10);
      display: flex;
      flex-direction: column;
      gap: var(--space-6);
    }

    .card-header {
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
    }

    .card-header h1 {
      font-size: var(--text-2xl); font-weight: 700;
      color: var(--color-neutral-900); letter-spacing: -0.02em; line-height: 1.2;
    }

    .card-header p {
      color: var(--color-neutral-600); font-size: var(--text-base);
    }

    .step-indicator {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-2);
      font-size: var(--text-sm);
      color: var(--color-neutral-400);
      font-weight: 500;
    }

    .step-indicator .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--color-neutral-200);
    }

    .step-indicator .dot.active {
      background: var(--color-primary-500);
    }

    form {
      display: flex;
      flex-direction: column;
      gap: var(--space-5);
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
    }

    .form-group label {
      font-size: var(--text-sm); font-weight: 600;
      color: var(--color-neutral-700);
    }

    .form-group input,
    .form-group select {
      height: 44px;
      border: 1px solid var(--color-neutral-200);
      border-radius: var(--radius-sm);
      padding: 0 var(--space-3);
      font-family: var(--font-sans);
      font-size: var(--text-base);
      color: var(--color-neutral-800);
      background: var(--color-neutral-0);
      outline: none;
      transition: border-color 0.15s ease;
      appearance: none;
      -webkit-appearance: none;
    }

    .form-group select {
      background-image: url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1.5L6 6.5L11 1.5' stroke='%23888' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
      background-repeat: no-repeat;
      background-position: right 12px center;
      padding-right: var(--space-10);
    }

    .form-group input:focus,
    .form-group select:focus {
      border-color: var(--color-primary-500);
      box-shadow: 0 0 0 3px oklch(50% 0.15 250 / 0.12);
    }

    .form-group input::placeholder {
      color: var(--color-neutral-300);
    }

    .checkbox-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-3);
    }

    .checkbox-item {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-3) var(--space-4);
      border: 1px solid var(--color-neutral-200);
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: border-color 0.15s ease, background 0.15s ease;
    }

    .checkbox-item:hover {
      border-color: var(--color-neutral-300);
    }

    .checkbox-item.selected {
      border-color: var(--color-primary-500);
      background: var(--color-primary-50);
    }

    .checkbox-item input[type="checkbox"] {
      width: 18px; height: 18px;
      accent-color: oklch(50% 0.15 250);
      cursor: pointer;
    }

    .checkbox-item span {
      font-size: var(--text-sm);
      font-weight: 500;
      color: var(--color-neutral-700);
    }

    .btn-primary {
      height: 44px;
      background: var(--color-primary-500);
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      font-family: var(--font-sans);
      font-size: var(--text-base);
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s ease;
      margin-top: var(--space-2);
    }

    .btn-primary:hover { background: var(--color-primary-600); }
    .btn-primary:active { background: var(--color-primary-700); }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <div class="logo-mark">A</div>
      <span class="logo-text">Axiom</span>
    </div>

    <div class="card">
      <div class="step-indicator">
        <span class="dot active"></span>
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
      </div>

      <div class="card-header">
        <h1>Tell us about your firm</h1>
        <p>This helps us tailor your setup. Takes under a minute.</p>
      </div>

      <form>
        <div class="form-group">
          <label for="firm-name">Firm name</label>
          <input type="text" id="firm-name" placeholder="e.g. Meridian & Associates CPAs" value="Meridian & Associates CPAs">
        </div>

        <div class="form-group">
          <label for="staff-count">How many audit staff?</label>
          <select id="staff-count">
            <option value="" disabled>Select range</option>
            <option value="1-10">1 &ndash; 10</option>
            <option value="11-20" selected>11 &ndash; 20</option>
            <option value="21-40">21 &ndash; 40</option>
            <option value="41-60">41 &ndash; 60</option>
            <option value="60+">60+</option>
          </select>
        </div>

        <div class="form-group">
          <label>Primary audit types</label>
          <div class="checkbox-grid">
            <label class="checkbox-item selected">
              <input type="checkbox" checked>
              <span>Financial Audit</span>
            </label>
            <label class="checkbox-item selected">
              <input type="checkbox" checked>
              <span>SOC 2</span>
            </label>
            <label class="checkbox-item">
              <input type="checkbox">
              <span>ISO 27001</span>
            </label>
            <label class="checkbox-item">
              <input type="checkbox">
              <span>HIPAA</span>
            </label>
          </div>
        </div>

        <div class="form-group">
          <label for="country">Country</label>
          <select id="country">
            <option value="US" selected>United States</option>
            <option value="CA">Canada</option>
          </select>
        </div>

        <button type="submit" class="btn-primary">Continue</button>
      </form>
    </div>
  </div>
</body>
</html>
