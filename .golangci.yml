run:
  timeout: 5m
  tests: true

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - gofmt
    - goimports
    - misspell
    - bodyclose
    - rowserrcheck
    - sqlclosecheck

linters-settings:
  goimports:
    local-prefixes: github.com/axiom-platform/axiom
